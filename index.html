<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Tracker 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .overflow-x-auto::-webkit-scrollbar { height: 8px; }
        .overflow-x-auto::-webkit-scrollbar-track { background: #f1f5f9; }
        .overflow-x-auto::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .overflow-x-auto::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .table-row-hover:hover td { background-color: #f8fafc !important; }
        .sticky-po { position: sticky; left: 0; background: white; z-index: 10; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('dashboard'); // 'dashboard' or 'recap'
            const [articles, setArticles] = useState([
                {
                    id: '1',
                    noPo: 'PO-2026-001',
                    brand: 'NIKE',
                    artikel: 'AIR MAX 90',
                    color: 'BLACK/RED',
                    size: '42',
                    qtyPo: 500,
                    arrivals: { '2026-03-01': { online: 50, offline: 20 } }
                }
            ]);

            const [currentDate, setCurrentDate] = useState(new Date(2026, 2, 1)); 
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [isArrivalModalOpen, setIsArrivalModalOpen] = useState(false);
            
            const [formArticle, setFormArticle] = useState({ 
                noPo: '', brand: '', artikel: '', color: '', size: '', qtyPo: 0,
                initDate: '2026-03-01', initOnline: 0, initOffline: 0
            });

            const [editData, setEditData] = useState({
                id: '', noPo: '', brand: '', artikel: '', color: '', size: '', qtyPo: 0
            });

            const [formArrival, setFormArrival] = useState({
                targetPo: '', date: '2026-03-01', online: 0, offline: 0
            });

            const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
            const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));

            const daysInMonth = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const date = new Date(year, month, 1);
                const days = [];
                while (date.getMonth() === month) {
                    days.push(new Date(date));
                    date.setDate(date.getDate() + 1);
                }
                return days;
            }, [currentDate]);

            // Derivasi Data untuk Rekap (Tampilan List)
            const recapData = useMemo(() => {
                const list = [];
                articles.forEach(art => {
                    Object.keys(art.arrivals).forEach(dateStr => {
                        const data = art.arrivals[dateStr];
                        if (data.online > 0 || data.offline > 0) {
                            list.push({
                                ...art,
                                arrivalDate: dateStr,
                                qtyOnline: data.online,
                                qtyOffline: data.offline
                            });
                        }
                    });
                });
                return list.sort((a, b) => new Date(b.arrivalDate) - new Date(a.arrivalDate));
            }, [articles]);

            const handleSaveArticle = () => {
                if (!formArticle.noPo || !formArticle.brand || !formArticle.artikel) {
                    alert("Mohon lengkapi data wajib (No. PO, Brand, Artikel)");
                    return;
                }
                const newEntry = {
                    id: Date.now().toString(),
                    noPo: formArticle.noPo.toUpperCase(),
                    brand: formArticle.brand.toUpperCase(),
                    artikel: formArticle.artikel.toUpperCase(),
                    color: formArticle.color.toUpperCase(),
                    size: formArticle.size.toUpperCase(),
                    qtyPo: formArticle.qtyPo,
                    arrivals: {
                        [formArticle.initDate]: {
                            online: parseInt(formArticle.initOnline) || 0,
                            offline: parseInt(formArticle.initOffline) || 0
                        }
                    }
                };
                setArticles([...articles, newEntry]);
                setIsModalOpen(false);
                setFormArticle({ noPo: '', brand: '', artikel: '', color: '', size: '', qtyPo: 0, initDate: '2026-03-01', initOnline: 0, initOffline: 0 });
            };

            const handleUpdateArticle = () => {
                setArticles(articles.map(art => 
                    art.id === editData.id ? { ...art, ...editData } : art
                ));
                setIsEditModalOpen(false);
            };

            const handleDeleteArticle = (id) => {
                if (window.confirm("Apakah Anda yakin ingin menghapus artikel ini? Semua data kedatangan akan ikut terhapus.")) {
                    setArticles(articles.filter(art => art.id !== id));
                }
            };

            const handleUpdateArrival = () => {
                if (!formArrival.targetPo) return;
                setArticles(articles.map(art => {
                    if (art.noPo === formArrival.targetPo) {
                        const updated = { ...art.arrivals };
                        const existing = updated[formArrival.date] || { online: 0, offline: 0 };
                        updated[formArrival.date] = {
                            online: existing.online + (parseInt(formArrival.online) || 0),
                            offline: existing.offline + (parseInt(formArrival.offline) || 0)
                        };
                        return { ...art, arrivals: updated };
                    }
                    return art;
                }));
                setIsArrivalModalOpen(false);
                setFormArrival({ ...formArrival, online: 0, offline: 0 });
            };

            const calculateTotal = (arrivals) => Object.values(arrivals).reduce((t, d) => t + d.online + d.offline, 0);

            const handleExportCSV = () => {
                if (articles.length === 0) return;
                let csvContent = "No. PO,Brand,Artikel,Size,Qty PO,Total Arrival,";
                daysInMonth.forEach(day => {
                    const d = day.getDate();
                    csvContent += `${d} (ON),${d} (OFF),`;
                });
                csvContent += "\n";
                articles.forEach(art => {
                    const total = calculateTotal(art.arrivals);
                    csvContent += `"${art.noPo}","${art.brand}","${art.artikel}","${art.size}",${art.qtyPo},${total},`;
                    daysInMonth.forEach(day => {
                        const k = day.toISOString().split('T')[0];
                        const d = art.arrivals[k] || { online: 0, offline: 0 };
                        csvContent += `${d.online || 0},${d.offline || 0},`;
                    });
                    csvContent += "\n";
                });
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `Inventory_Report_2026.csv`);
                link.click();
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-6 font-sans text-slate-900">
                    <div className="max-w-[98vw] mx-auto">
                        
                        {/* Header Section */}
                        <div className="mb-6 flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-indigo-600 p-3 rounded-2xl shadow-lg text-white">
                                    <Icon name="package-check" size={28} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black uppercase tracking-tight">Inventory Tracker 2026</h1>
                                    <p className="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em]">PT. LESTARI LOGISTIK</p>
                                </div>
                            </div>
                            
                            {/* Navigation Tabs */}
                            <div className="flex bg-white p-1.5 rounded-2xl border border-slate-200 shadow-sm">
                                <button 
                                    onClick={() => setView('dashboard')}
                                    className={`px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${view === 'dashboard' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-600'}`}
                                >
                                    Monitoring Kalender
                                </button>
                                <button 
                                    onClick={() => setView('recap')}
                                    className={`px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${view === 'recap' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-600'}`}
                                >
                                    Rekap Kedatangan
                                </button>
                            </div>

                            <div className="flex flex-wrap items-center gap-3">
                                {view === 'dashboard' && (
                                    <div className="flex items-center bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm mr-2">
                                        <button onClick={prevMonth} className="p-2 hover:bg-slate-50 border-r border-slate-200"><Icon name="chevron-left" /></button>
                                        <div className="px-4 py-2 font-bold text-slate-700 min-w-[150px] text-center uppercase text-xs tracking-widest">
                                            {currentDate.toLocaleString('id-ID', { month: 'long', year: 'numeric' })}
                                        </div>
                                        <button onClick={nextMonth} className="p-2 hover:bg-slate-50 border-l border-slate-200"><Icon name="chevron-right" /></button>
                                    </div>
                                )}

                                <button onClick={handleExportCSV} className="flex items-center gap-2 bg-emerald-50 text-emerald-700 border-2 border-emerald-200 px-5 py-2.5 rounded-xl font-black hover:bg-emerald-100 transition-all text-[10px] uppercase tracking-widest">
                                    <Icon name="download" size={14} /> Export CSV
                                </button>
                                
                                <button onClick={() => setIsModalOpen(true)} className="flex items-center gap-2 bg-white border-2 border-slate-800 text-slate-800 px-5 py-2.5 rounded-xl font-black hover:bg-slate-50 transition-all text-[10px] uppercase tracking-widest">
                                    <Icon name="plus" size={14} /> Tambah Artikel
                                </button>
                                
                                <button onClick={() => setIsArrivalModalOpen(true)} className="flex items-center gap-2 bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-black hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 text-[10px] uppercase tracking-widest">
                                    <Icon name="truck" size={14} /> Input Arrival
                                </button>
                            </div>
                        </div>

                        {/* VIEW 1: DASHBOARD MONITORING (CALENDAR STYLE) */}
                        {view === 'dashboard' ? (
                            <div className="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
                                <div className="overflow-x-auto max-h-[75vh]">
                                    <table className="w-full border-collapse text-[10px]">
                                        <thead className="sticky top-0 z-30 shadow-sm">
                                            <tr className="bg-slate-800 text-white">
                                                <th rowSpan="3" className="w-20 border border-slate-700 p-3 text-center uppercase font-bold bg-slate-900 sticky top-0">Aksi</th>
                                                <th rowSpan="3" className="w-32 border border-slate-700 p-3 text-center uppercase font-bold sticky-po bg-slate-800">No. PO</th>
                                                <th rowSpan="3" className="w-32 border border-slate-700 p-3 text-center uppercase font-bold bg-slate-800">Brand</th>
                                                <th rowSpan="3" className="w-40 border border-slate-700 p-3 text-center uppercase font-bold bg-slate-800">Artikel</th>
                                                <th rowSpan="3" className="w-16 border border-slate-700 p-3 text-center uppercase font-bold bg-slate-800">Size</th>
                                                <th rowSpan="3" className="w-20 border border-slate-700 p-3 text-center uppercase font-bold bg-slate-800">Qty PO</th>
                                                <th rowSpan="3" className="w-24 border border-slate-700 p-3 text-center uppercase font-bold bg-emerald-600">Total</th>
                                                <th colSpan={daysInMonth.length * 2} className="border border-slate-700 p-2 text-center font-bold bg-slate-900 tracking-widest uppercase italic">Log Kedatangan Per Tanggal</th>
                                            </tr>
                                            <tr className="bg-slate-50 text-slate-700 font-black">
                                                {daysInMonth.map(date => (
                                                    <th key={date.toISOString()} colSpan="2" className="border border-slate-200 p-1 text-center min-w-[80px]">
                                                        {date.getDate()}
                                                    </th>
                                                ))}
                                            </tr>
                                            <tr className="bg-slate-100 uppercase font-black">
                                                {daysInMonth.map(date => (
                                                    <React.Fragment key={`h-${date.toISOString()}`}>
                                                        <th className="border border-slate-200 p-1 text-center text-indigo-600">ON</th>
                                                        <th className="border border-slate-200 p-1 text-center text-amber-600">OFF</th>
                                                    </React.Fragment>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {articles.map((art) => (
                                                <tr key={art.id} className="table-row-hover transition-colors">
                                                    <td className="border border-slate-200 p-2 text-center">
                                                        <div className="flex items-center justify-center gap-2">
                                                            <button onClick={() => { setEditData(art); setIsEditModalOpen(true); }} className="p-1.5 text-blue-600 hover:bg-blue-50 rounded-lg transition-colors"><Icon name="edit-3" size={14}/></button>
                                                            <button onClick={() => handleDeleteArticle(art.id)} className="p-1.5 text-red-600 hover:bg-red-50 rounded-lg transition-colors"><Icon name="trash-2" size={14}/></button>
                                                        </div>
                                                    </td>
                                                    <td className="border border-slate-200 p-2 font-bold text-slate-500 text-center sticky-po">{art.noPo}</td>
                                                    <td className="border border-slate-200 p-2 font-bold uppercase">{art.brand}</td>
                                                    <td className="border border-slate-200 p-2 font-medium uppercase">{art.artikel}</td>
                                                    <td className="border border-slate-200 p-2 text-center font-bold">{art.size}</td>
                                                    <td className="border border-slate-200 p-2 text-center font-bold">{art.qtyPo}</td>
                                                    <td className="border border-slate-200 p-2 text-center font-black bg-emerald-50 text-emerald-700">{calculateTotal(art.arrivals)}</td>
                                                    {daysInMonth.map(date => {
                                                        const k = date.toISOString().split('T')[0];
                                                        const d = art.arrivals[k] || { online: 0, offline: 0 };
                                                        return (
                                                            <React.Fragment key={`${art.id}-${k}`}>
                                                                <td className="border border-slate-100 p-1 text-center font-bold text-indigo-600">{d.online || '-'}</td>
                                                                <td className="border border-slate-100 p-1 text-center font-bold text-amber-600">{d.offline || '-'}</td>
                                                            </React.Fragment>
                                                        );
                                                    })}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : (
                            /* VIEW 2: REKAP KEDATANGAN (VERTICAL LIST) */
                            <div className="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden animate-in fade-in slide-in-from-bottom-4">
                                <div className="p-4 bg-slate-800 text-white flex justify-between items-center">
                                    <h2 className="font-black text-xs uppercase tracking-[0.2em] flex items-center gap-2">
                                        <Icon name="list" size={16} /> Riwayat Seluruh Kedatangan
                                    </h2>
                                    <span className="text-[9px] bg-slate-700 px-3 py-1 rounded-full uppercase font-bold tracking-widest">Total: {recapData.length} Transaksi</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full border-collapse text-[10px]">
                                        <thead>
                                            <tr className="bg-slate-100 text-slate-600 uppercase font-black text-center">
                                                <th className="border p-4 w-32">Tanggal</th>
                                                <th className="border p-4 w-32">Brand</th>
                                                <th className="border p-4 w-32">No. PO</th>
                                                <th className="border p-4">Artikel</th>
                                                <th className="border p-4 w-28">Color</th>
                                                <th className="border p-4 w-20">Size</th>
                                                <th className="border p-4 w-20 bg-slate-200/50">Qty PO</th>
                                                <th className="border p-4 w-24 bg-indigo-50 text-indigo-700">Online</th>
                                                <th className="border p-4 w-24 bg-amber-50 text-amber-700">Offline</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {recapData.map((item, idx) => (
                                                <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                    <td className="border p-3 text-center font-bold text-slate-500">
                                                        {new Date(item.arrivalDate).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' })}
                                                    </td>
                                                    <td className="border p-3 font-black text-center">{item.brand}</td>
                                                    <td className="border p-3 text-center font-bold text-indigo-600">{item.noPo}</td>
                                                    <td className="border p-3 font-medium uppercase px-4">{item.artikel}</td>
                                                    <td className="border p-3 text-center">{item.color}</td>
                                                    <td className="border p-3 text-center font-black">{item.size}</td>
                                                    <td className="border p-3 text-center font-bold bg-slate-50">{item.qtyPo}</td>
                                                    <td className="border p-3 text-center font-black text-indigo-600 bg-indigo-50/30">{item.qtyOnline}</td>
                                                    <td className="border p-3 text-center font-black text-amber-600 bg-amber-50/30">{item.qtyOffline}</td>
                                                </tr>
                                            ))}
                                            {recapData.length === 0 && (
                                                <tr>
                                                    <td colSpan="9" className="p-10 text-center text-slate-400 font-bold uppercase tracking-widest">Belum ada data kedatangan</td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* MODAL: TAMBAH ARTIKEL */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-4xl overflow-hidden border border-white/20">
                                <div className="bg-indigo-600 p-6 text-white flex justify-between items-center">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-white/20 p-2 rounded-xl"><Icon name="plus-circle" size={24} /></div>
                                        <div>
                                            <h3 className="text-xl font-black uppercase tracking-tight">Tambah Artikel Baru</h3>
                                            <p className="text-[10px] text-indigo-100 font-medium uppercase tracking-widest">Input Data Master & Kedatangan Awal</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setIsModalOpen(false)}><Icon name="x" size={24} /></button>
                                </div>
                                <div className="p-8 grid grid-cols-1 lg:grid-cols-2 gap-10">
                                    <div className="space-y-4">
                                        <div className="border-b pb-2"><span className="text-[11px] font-black text-indigo-600 uppercase tracking-widest">Informasi Produk</span></div>
                                        <div className="grid grid-cols-1 gap-4">
                                            <input placeholder="NO. PO" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold uppercase" value={formArticle.noPo} onChange={e => setFormArticle({...formArticle, noPo: e.target.value})} />
                                            <input placeholder="BRAND" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold uppercase" value={formArticle.brand} onChange={e => setFormArticle({...formArticle, brand: e.target.value})} />
                                            <input placeholder="ARTIKEL" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold uppercase" value={formArticle.artikel} onChange={e => setFormArticle({...formArticle, artikel: e.target.value})} />
                                            <div className="grid grid-cols-2 gap-4">
                                                <input placeholder="COLOR" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold uppercase" value={formArticle.color} onChange={e => setFormArticle({...formArticle, color: e.target.value})} />
                                                <input placeholder="SIZE" className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold uppercase" value={formArticle.size} onChange={e => setFormArticle({...formArticle, size: e.target.value})} />
                                            </div>
                                            <input type="number" placeholder="QTY PO" className="w-full p-3.5 bg-emerald-50/50 border-2 border-emerald-50 rounded-2xl outline-none font-black text-emerald-700" value={formArticle.qtyPo || ''} onChange={e => setFormArticle({...formArticle, qtyPo: parseInt(e.target.value) || 0})} />
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-[2rem] space-y-4">
                                        <div className="border-b pb-2"><span className="text-[11px] font-black text-indigo-600 uppercase tracking-widest">Log Kedatangan Awal</span></div>
                                        <input type="date" className="w-full p-3.5 bg-white border border-slate-200 rounded-2xl font-bold" value={formArticle.initDate} onChange={e => setFormArticle({...formArticle, initDate: e.target.value})} />
                                        <div className="grid grid-cols-2 gap-4">
                                            <input type="number" placeholder="QTY ON" className="w-full p-3.5 bg-white border-2 border-indigo-50 rounded-2xl outline-none font-black text-indigo-700 text-center" value={formArticle.initOnline || ''} onChange={e => setFormArticle({...formArticle, initOnline: e.target.value})} />
                                            <input type="number" placeholder="QTY OFF" className="w-full p-3.5 bg-white border-2 border-amber-50 rounded-2xl outline-none font-black text-amber-700 text-center" value={formArticle.initOffline || ''} onChange={e => setFormArticle({...formArticle, initOffline: e.target.value})} />
                                        </div>
                                    </div>
                                </div>
                                <div className="p-8 bg-slate-50 flex gap-4">
                                    <button onClick={() => setIsModalOpen(false)} className="flex-1 p-4 bg-white border border-slate-200 rounded-2xl font-black text-slate-400 uppercase text-[10px]">Batal</button>
                                    <button onClick={handleSaveArticle} className="flex-1 p-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-[10px] shadow-lg">Simpan Artikel</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: EDIT ARTIKEL */}
                    {isEditModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden">
                                <div className="bg-blue-600 p-6 text-white flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <Icon name="edit-3" />
                                        <h3 className="font-black uppercase tracking-widest text-sm">Edit Info Produk</h3>
                                    </div>
                                    <button onClick={() => setIsEditModalOpen(false)}><Icon name="x" size={20}/></button>
                                </div>
                                <div className="p-8 space-y-4">
                                    <input className="w-full p-3 bg-slate-50 border rounded-xl font-bold uppercase" value={editData.noPo} onChange={e => setEditData({...editData, noPo: e.target.value.toUpperCase()})} />
                                    <input className="w-full p-3 bg-slate-50 border rounded-xl font-bold uppercase" value={editData.brand} onChange={e => setEditData({...editData, brand: e.target.value.toUpperCase()})} />
                                    <input className="w-full p-3 bg-slate-50 border rounded-xl font-bold uppercase" value={editData.artikel} onChange={e => setEditData({...editData, artikel: e.target.value.toUpperCase()})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input className="w-full p-3 bg-slate-50 border rounded-xl font-bold uppercase" value={editData.color} onChange={e => setEditData({...editData, color: e.target.value.toUpperCase()})} />
                                        <input className="w-full p-3 bg-slate-50 border rounded-xl font-bold uppercase" value={editData.size} onChange={e => setEditData({...editData, size: e.target.value.toUpperCase()})} />
                                    </div>
                                    <input type="number" className="w-full p-3 bg-emerald-50 border-2 border-emerald-100 rounded-xl font-black text-emerald-700" value={editData.qtyPo} onChange={e => setEditData({...editData, qtyPo: parseInt(e.target.value) || 0})} />
                                    <button onClick={handleUpdateArticle} className="w-full py-4 bg-blue-600 text-white rounded-xl font-black uppercase text-[10px] tracking-widest mt-4">Simpan Perubahan</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: TAMBAH KEDATANGAN */}
                    {isArrivalModalOpen && (
                        <div className="fixed inset-0 bg-indigo-900/40 backdrop-blur-md flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden">
                                <div className="p-6 border-b flex justify-between items-center text-indigo-600">
                                    <h3 className="font-black text-xs uppercase tracking-widest flex items-center gap-2"><Icon name="truck" /> Log Kedatangan Baru</h3>
                                    <button onClick={() => setIsArrivalModalOpen(false)}><Icon name="x" size={20} /></button>
                                </div>
                                <div className="p-6 space-y-4">
                                    <select className="w-full p-4 bg-indigo-50 border border-indigo-100 rounded-2xl font-black text-indigo-700 text-sm" value={formArrival.targetPo} onChange={e => setFormArrival({...formArrival, targetPo: e.target.value})}>
                                        <option value="">-- PILIH NOMOR PO --</option>
                                        {articles.map(a => <option key={a.id} value={a.noPo}>{a.noPo} - {a.artikel}</option>)}
                                    </select>
                                    <input type="date" className="w-full p-3.5 bg-slate-50 border rounded-2xl font-bold" value={formArrival.date} onChange={e => setFormArrival({...formArrival, date: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="number" placeholder="ONLINE" className="w-full p-4 bg-white border-2 border-indigo-100 rounded-2xl font-black text-indigo-600 text-center" value={formArrival.online || ''} onChange={e => setFormArrival({...formArrival, online: e.target.value})} />
                                        <input type="number" placeholder="OFFLINE" className="w-full p-4 bg-white border-2 border-amber-100 rounded-2xl font-black text-amber-600 text-center" value={formArrival.offline || ''} onChange={e => setFormArrival({...formArrival, offline: e.target.value})} />
                                    </div>
                                    <button onClick={handleUpdateArrival} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest mt-4 shadow-lg">Update Kedatangan</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
