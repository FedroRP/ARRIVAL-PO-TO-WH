<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Tracker 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .overflow-x-auto::-webkit-scrollbar { height: 8px; }
        .overflow-x-auto::-webkit-scrollbar-track { background: #f1f5f9; }
        .overflow-x-auto::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .overflow-x-auto::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .table-row-hover:hover td {
            background-color: #f8fafc !important;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);

            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [articles, setArticles] = useState([
                {
                    id: '1',
                    noPo: 'PO-001',
                    brand: 'NIKE',
                    artikel: 'AIR MAX 90',
                    color: 'BLACK/RED',
                    size: '42',
                    qtyPo: 500,
                    arrivals: { 
                        '2026-03-01': { online: 50, offline: 50 }
                    }
                }
            ]);

            const [currentDate, setCurrentDate] = useState(new Date(2026, 2, 1)); 
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingArticle, setEditingArticle] = useState(null);
            
            // State Form yang diperluas
            const [formData, setFormData] = useState({ 
                noPo: '', 
                brand: '', 
                artikel: '', 
                color: '', 
                size: '', 
                qtyPo: 0,
                inputDate: '2026-03-01',
                inputOnline: 0,
                inputOffline: 0
            });

            const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
            const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));

            const monthLabel = currentDate.toLocaleString('id-ID', { month: 'long' }).toUpperCase();
            const yearLabel = currentDate.getFullYear();

            const daysInMonth = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const date = new Date(year, month, 1);
                const days = [];
                while (date.getMonth() === month) {
                    days.push(new Date(date));
                    date.setDate(date.getDate() + 1);
                }
                return days;
            }, [currentDate]);

            const openAddModal = () => {
                setEditingArticle(null);
                setFormData({ 
                    noPo: '', brand: '', artikel: '', color: '', size: '', qtyPo: 0,
                    inputDate: '2026-03-01', inputOnline: 0, inputOffline: 0 
                });
                setIsModalOpen(true);
            };

            const openEditModal = (article) => {
                setEditingArticle(article.id);
                setFormData({ 
                    noPo: article.noPo, 
                    brand: article.brand, 
                    artikel: article.artikel, 
                    color: article.color, 
                    size: article.size, 
                    qtyPo: article.qtyPo,
                    inputDate: '2026-03-01',
                    inputOnline: 0,
                    inputOffline: 0
                });
                setIsModalOpen(true);
            };

            const deleteArticle = (id) => {
                setArticles(articles.filter(art => art.id !== id));
            };

            const calculateTotalArrival = (arrivals) => {
                return Object.values(arrivals).reduce((total, dailyData) => {
                    return total + (dailyData.online || 0) + (dailyData.offline || 0);
                }, 0);
            };

            const handleSubmit = () => {
                if (!formData.noPo || !formData.brand || !formData.artikel) {
                    alert("Mohon lengkapi No. PO, Brand, dan Artikel.");
                    return;
                }
                
                // Cek No. PO Unik (Hanya jika tambah baru)
                if (!editingArticle) {
                    const isDuplicate = articles.some(art => art.noPo === formData.noPo);
                    if (isDuplicate) {
                        alert(`No. PO ${formData.noPo} sudah terdaftar! Gunakan No. PO yang berbeda.`);
                        return;
                    }
                }

                const arrivalData = {
                    online: parseInt(formData.inputOnline) || 0,
                    offline: parseInt(formData.inputOffline) || 0
                };

                if (editingArticle) {
                    setArticles(articles.map(art => {
                        if (art.id === editingArticle) {
                            const updatedArrivals = { ...art.arrivals };
                            // Timpa data kedatangan pada tanggal yang dipilih
                            updatedArrivals[formData.inputDate] = arrivalData;
                            return { ...art, ...formData, arrivals: updatedArrivals };
                        }
                        return art;
                    }));
                } else {
                    setArticles([...articles, { 
                        id: Date.now().toString(),
                        noPo: formData.noPo,
                        brand: formData.brand,
                        artikel: formData.artikel,
                        color: formData.color,
                        size: formData.size,
                        qtyPo: formData.qtyPo,
                        arrivals: { [formData.inputDate]: arrivalData } 
                    }]);
                }
                
                setIsModalOpen(false);
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-6 font-sans text-slate-900">
                    <div className="max-w-[98vw] mx-auto">
                        
                        <div className="mb-8 flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-indigo-600 p-3 rounded-2xl shadow-lg shadow-indigo-200 text-white">
                                    <Icon name="package-check" size={28} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black tracking-tight text-slate-800 uppercase leading-none">Arrival Tracking 2026</h1>
                                    <p className="text-slate-500 text-sm font-medium italic mt-1">Sistem Rekapitulasi Kedatangan Artikel</p>
                                </div>
                            </div>
                            
                            <div className="flex flex-wrap items-center gap-4">
                                <div className="flex items-center bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                    <button onClick={prevMonth} className="p-2.5 hover:bg-slate-50 transition-colors border-r border-slate-200 text-slate-600">
                                        <Icon name="chevron-left" />
                                    </button>
                                    <div className="px-6 py-2 flex items-center gap-3">
                                        <Icon name="calendar" className="text-indigo-600" />
                                        <span className="font-bold text-slate-700 min-w-[160px] text-center uppercase tracking-wider">{monthLabel} {yearLabel}</span>
                                    </div>
                                    <button onClick={nextMonth} className="p-2.5 hover:bg-slate-50 transition-colors border-l border-slate-200 text-slate-600">
                                        <Icon name="chevron-right" />
                                    </button>
                                </div>
                                
                                <button 
                                    onClick={openAddModal}
                                    className="flex items-center gap-2 bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 uppercase text-sm"
                                >
                                    <Icon name="plus" size={18} /> Tambah Artikel
                                </button>
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-2xl shadow-slate-200/60 border border-slate-200 overflow-hidden">
                            <div className="overflow-x-auto max-h-[75vh]">
                                <table className="w-full border-collapse text-[11px]">
                                    <thead className="sticky top-0 z-30 shadow-sm">
                                        <tr className="bg-slate-800 text-white">
                                            <th rowSpan="3" className="w-24 border border-slate-700 p-4 text-center uppercase font-bold bg-slate-800">Aksi</th>
                                            <th rowSpan="3" className="w-24 border border-slate-700 p-4 text-center uppercase font-bold bg-slate-800">No. PO</th>
                                            <th rowSpan="3" className="w-32 border border-slate-700 p-4 text-center uppercase font-bold bg-slate-800">Brand</th>
                                            <th rowSpan="3" className="w-40 border border-slate-700 p-4 text-center uppercase font-bold bg-slate-800">Artikel</th>
                                            <th rowSpan="3" className="w-32 border border-slate-700 p-3 text-center uppercase font-bold bg-slate-800">Color</th>
                                            <th rowSpan="3" className="w-16 border border-slate-700 p-3 text-center uppercase font-bold bg-slate-800">Size</th>
                                            <th rowSpan="3" className="w-20 border border-slate-700 p-3 text-center uppercase font-bold bg-slate-800">Qty PO</th>
                                            <th rowSpan="3" className="w-28 border border-slate-700 p-3 text-center uppercase font-bold bg-emerald-600">Total Kedatangan</th>
                                            <th colSpan={daysInMonth.length * 2} className="border border-slate-700 p-2 text-center font-black bg-slate-900 tracking-[0.2em] italic text-xs">
                                                {monthLabel} {yearLabel}
                                            </th>
                                        </tr>
                                        <tr className="bg-slate-50 text-slate-700 font-black">
                                            {daysInMonth.map(date => (
                                                <th key={date.toISOString()} colSpan="2" className="border border-slate-200 p-2 text-center text-sm min-w-[110px]">
                                                    {date.getDate()}
                                                </th>
                                            ))}
                                        </tr>
                                        <tr className="bg-slate-100 uppercase">
                                            {daysInMonth.map(date => (
                                                <React.Fragment key={`sub-${date.toISOString()}`}>
                                                    <th className="border border-slate-200 p-1.5 text-center font-bold text-indigo-700 bg-indigo-50/50">ON</th>
                                                    <th className="border border-slate-200 p-1.5 text-center font-bold text-amber-700 bg-amber-50/50">OFF</th>
                                                </React.Fragment>
                                            ))}
                                        </tr>
                                    </thead>
                                    
                                    <tbody className="divide-y divide-slate-100">
                                        {articles.map((art, idx) => {
                                            const totalArrival = calculateTotalArrival(art.arrivals);
                                            const isCompleted = totalArrival >= art.qtyPo;
                                            const rowBg = idx % 2 === 0 ? 'bg-white' : 'bg-slate-50/40';
                                            
                                            return (
                                                <tr key={art.id} className={`${rowBg} table-row-hover transition-colors`}>
                                                    <td className="border border-slate-200 p-2 text-center">
                                                        <div className="flex items-center justify-center gap-1">
                                                            <button 
                                                                onClick={() => openEditModal(art)}
                                                                className="p-1.5 text-indigo-500 hover:bg-indigo-50 rounded-lg transition-colors"
                                                                title="Update Kedatangan"
                                                            >
                                                                <Icon name="pencil" size={14} />
                                                            </button>
                                                            <button 
                                                                onClick={() => deleteArticle(art.id)}
                                                                className="p-1.5 text-rose-500 hover:bg-rose-50 rounded-lg transition-colors"
                                                                title="Hapus Artikel"
                                                            >
                                                                <Icon name="trash-2" size={14} />
                                                            </button>
                                                        </div>
                                                    </td>
                                                    <td className="border border-slate-200 p-3 font-mono font-bold text-slate-600">{art.noPo}</td>
                                                    <td className="border border-slate-200 p-3 font-bold uppercase text-slate-700">{art.brand}</td>
                                                    <td className="border border-slate-200 p-3 font-semibold text-slate-700">{art.artikel}</td>
                                                    <td className="border border-slate-200 p-3 text-slate-500 font-medium">{art.color}</td>
                                                    <td className="border border-slate-200 p-3 text-center font-mono font-bold text-slate-700">{art.size}</td>
                                                    <td className="border border-slate-200 p-3 text-center font-bold text-slate-800">{art.qtyPo.toLocaleString()}</td>
                                                    
                                                    <td className={`border border-slate-200 p-3 text-center font-black text-[13px] ${isCompleted ? 'text-emerald-700 bg-emerald-50' : 'text-indigo-800 bg-indigo-50/50'}`}>
                                                        {totalArrival.toLocaleString()}
                                                    </td>
                                                    
                                                    {daysInMonth.map(date => {
                                                        const dateKey = date.toISOString().split('T')[0];
                                                        const daily = art.arrivals[dateKey] || { online: 0, offline: 0 };
                                                        return (
                                                            <React.Fragment key={`${art.id}-${dateKey}`}>
                                                                <td className="border border-slate-200 p-2 text-center font-bold text-indigo-700 bg-indigo-50/20">
                                                                    {daily.online || '-'}
                                                                </td>
                                                                <td className="border border-slate-200 p-2 text-center font-bold text-amber-700 bg-amber-50/20">
                                                                    {daily.offline || '-'}
                                                                </td>
                                                            </React.Fragment>
                                                        );
                                                    })}
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div className="mt-6 flex flex-wrap items-center justify-end gap-6 text-[10px] font-black uppercase tracking-widest text-slate-400">
                            <div className="flex items-center gap-2 italic">
                                <Icon name="lock" size={12} /> Input hanya melalui tombol Tambah/Edit
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="w-3.5 h-3.5 rounded bg-indigo-500 shadow-sm shadow-indigo-200"></span> Online
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="w-3.5 h-3.5 rounded bg-amber-500 shadow-sm shadow-amber-200"></span> Offline
                            </div>
                        </div>
                    </div>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden transform animate-in fade-in zoom-in duration-200">
                                <div className="bg-indigo-600 p-6 text-white flex justify-between items-center">
                                    <div>
                                        <h3 className="text-xl font-black flex items-center gap-3 uppercase tracking-tighter">
                                            <Icon name={editingArticle ? "pencil" : "plus-circle"} size={24} /> 
                                            {editingArticle ? "Update Kedatangan" : "Tambah Artikel Baru"}
                                        </h3>
                                        <p className="text-indigo-100 text-[10px] mt-1 font-medium uppercase tracking-widest">Detail Produk & Log Kedatangan</p>
                                    </div>
                                    <button onClick={() => setIsModalOpen(false)} className="p-2 hover:bg-indigo-500 rounded-full transition-colors">
                                        <Icon name="x" size={20} />
                                    </button>
                                </div>
                                
                                <div className="p-6 grid grid-cols-1 md:grid-cols-2 gap-6 max-h-[70vh] overflow-y-auto">
                                    {/* Kolom Kiri: Informasi Artikel */}
                                    <div className="space-y-4">
                                        <h4 className="text-[10px] font-black text-indigo-600 uppercase tracking-[0.2em] border-b pb-2">Informasi Produk</h4>
                                        <div className="space-y-3 text-xs font-bold text-slate-500">
                                            <div className="space-y-1">
                                                <label className="uppercase ml-1 tracking-wider">No. PO (Unique)</label>
                                                <input 
                                                    disabled={editingArticle}
                                                    placeholder="Contoh: PO-2026-001"
                                                    className={`w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold uppercase transition-all ${editingArticle ? 'opacity-50 cursor-not-allowed' : ''}`} 
                                                    value={formData.noPo} 
                                                    onChange={e => setFormData({...formData, noPo: e.target.value.toUpperCase()})} 
                                                />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="uppercase ml-1 tracking-wider">Brand</label>
                                                <input 
                                                    placeholder="NIKE / ADIDAS"
                                                    className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold uppercase transition-all" 
                                                    value={formData.brand} 
                                                    onChange={e => setFormData({...formData, brand: e.target.value.toUpperCase()})} 
                                                />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="uppercase ml-1 tracking-wider text-indigo-600">Artikel</label>
                                                <input 
                                                    placeholder="MODEL PRODUK"
                                                    className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold uppercase transition-all" 
                                                    value={formData.artikel} 
                                                    onChange={e => setFormData({...formData, artikel: e.target.value.toUpperCase()})} 
                                                />
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div className="space-y-1">
                                                    <label className="uppercase ml-1 tracking-wider">Color</label>
                                                    <input 
                                                        placeholder="WARNA"
                                                        className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold uppercase transition-all" 
                                                        value={formData.color} 
                                                        onChange={e => setFormData({...formData, color: e.target.value.toUpperCase()})} 
                                                    />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="uppercase ml-1 tracking-wider">Size</label>
                                                    <input 
                                                        placeholder="UKURAN"
                                                        className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold uppercase transition-all" 
                                                        value={formData.size} 
                                                        onChange={e => setFormData({...formData, size: e.target.value.toUpperCase()})} 
                                                    />
                                                </div>
                                            </div>
                                            <div className="space-y-1">
                                                <label className="uppercase ml-1 tracking-wider text-emerald-600">Quantity PO</label>
                                                <input 
                                                    type="number" 
                                                    className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 font-black transition-all" 
                                                    value={formData.qtyPo || ''}
                                                    onChange={e => setFormData({...formData, qtyPo: parseInt(e.target.value) || 0})} 
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    {/* Kolom Kanan: Input Kedatangan */}
                                    <div className="bg-slate-50 p-4 rounded-2xl space-y-4 border border-slate-200">
                                        <h4 className="text-[10px] font-black text-indigo-600 uppercase tracking-[0.2em] border-b border-slate-200 pb-2">Log Kedatangan</h4>
                                        <div className="space-y-4 text-xs font-bold text-slate-500">
                                            <div className="space-y-1">
                                                <label className="uppercase ml-1 tracking-wider">Tanggal Kedatangan</label>
                                                <input 
                                                    type="date"
                                                    className="w-full p-3 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold transition-all" 
                                                    value={formData.inputDate}
                                                    onChange={e => setFormData({...formData, inputDate: e.target.value})}
                                                />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="uppercase ml-1 tracking-wider text-indigo-600">Kedatangan Online</label>
                                                <input 
                                                    type="number" 
                                                    placeholder="Qty Unit"
                                                    className="w-full p-3 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-black text-indigo-700 transition-all" 
                                                    value={formData.inputOnline || ''}
                                                    onChange={e => setFormData({...formData, inputOnline: parseInt(e.target.value) || 0})} 
                                                />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="uppercase ml-1 tracking-wider text-amber-600">Kedatangan Offline</label>
                                                <input 
                                                    type="number" 
                                                    placeholder="Qty Unit"
                                                    className="w-full p-3 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-amber-500 font-black text-amber-700 transition-all" 
                                                    value={formData.inputOffline || ''}
                                                    onChange={e => setFormData({...formData, inputOffline: parseInt(e.target.value) || 0})} 
                                                />
                                            </div>
                                            <div className="p-4 bg-indigo-50 rounded-xl border border-indigo-100 flex items-start gap-3 mt-4">
                                                <Icon name="info" size={16} className="text-indigo-600 mt-0.5" />
                                                <p className="text-[10px] leading-relaxed text-indigo-800 italic">
                                                    Data kedatangan akan otomatis masuk ke kolom tanggal <b>{new Date(formData.inputDate).getDate()} {new Date(formData.inputDate).toLocaleString('id-ID', {month: 'short'})}</b> di tabel utama.
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="p-6 bg-slate-100 flex gap-4">
                                    <button 
                                        onClick={() => setIsModalOpen(false)} 
                                        className="flex-1 p-4 bg-white border border-slate-200 rounded-2xl font-bold text-slate-500 hover:bg-slate-200 transition-colors uppercase tracking-widest text-[10px]"
                                    >
                                        Tutup
                                    </button>
                                    <button 
                                        onClick={handleSubmit} 
                                        className="flex-1 p-4 bg-indigo-600 text-white rounded-2xl font-black shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all uppercase tracking-widest text-[10px]"
                                    >
                                        {editingArticle ? "Update & Simpan" : "Simpan Artikel"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
