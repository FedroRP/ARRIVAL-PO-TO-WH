<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Tracker 2026 - PT. NAD INTI DISTRIBUSI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .overflow-x-auto::-webkit-scrollbar { height: 8px; }
        .overflow-x-auto::-webkit-scrollbar-track { background: #f1f5f9; }
        .overflow-x-auto::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .overflow-x-auto::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .table-row-hover:hover td { background-color: #f8fafc !important; }
        .sticky-po { position: sticky; left: 0; background: white; z-index: 10; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            
            // Filter States
            const [filterBrand, setFilterBrand] = useState('');
            const [filterPo, setFilterPo] = useState('');
            const [filterArtikel, setFilterArtikel] = useState('');

            const [articles, setArticles] = useState([
                {
                    id: '1',
                    noPo: 'PO-2026-001',
                    brand: 'NIKE',
                    artikel: 'AIR MAX 90',
                    color: 'BLACK/RED',
                    size: '42',
                    qtyPo: 500,
                    arrivals: { '2026-03-01': { online: 50, offline: 20 } }
                }
            ]);

            const [currentDate, setCurrentDate] = useState(new Date(2026, 2, 1)); 
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [isArrivalModalOpen, setIsArrivalModalOpen] = useState(false);
            
            const [formArticle, setFormArticle] = useState({ 
                noPo: '', brand: '', artikel: '', color: '', size: '', qtyPo: 0,
                initDate: '2026-03-01', initOnline: 0, initOffline: 0
            });

            const [editData, setEditData] = useState({
                id: '', noPo: '', brand: '', artikel: '', color: '', size: '', qtyPo: 0
            });

            const [formArrival, setFormArrival] = useState({
                targetPo: '', date: '2026-03-01', online: 0, offline: 0
            });

            // Get Unique values for Dropdowns
            const uniqueBrands = useMemo(() => [...new Set(articles.map(a => a.brand))].sort(), [articles]);
            const uniquePos = useMemo(() => [...new Set(articles.map(a => a.noPo))].sort(), [articles]);
            const uniqueArtikels = useMemo(() => [...new Set(articles.map(a => a.artikel))].sort(), [articles]);

            const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
            const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));

            const daysInMonth = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const date = new Date(year, month, 1);
                const days = [];
                while (date.getMonth() === month) {
                    days.push(new Date(date));
                    date.setDate(date.getDate() + 1);
                }
                return days;
            }, [currentDate]);

            // Logic Filter
            const filteredArticles = useMemo(() => {
                return articles.filter(art => {
                    const matchBrand = filterBrand === '' || art.brand === filterBrand;
                    const matchPo = filterPo === '' || art.noPo === filterPo;
                    const matchArtikel = filterArtikel === '' || art.artikel === filterArtikel;
                    return matchBrand && matchPo && matchArtikel;
                });
            }, [articles, filterBrand, filterPo, filterArtikel]);

            const handleSaveArticle = () => {
                if (!formArticle.noPo || !formArticle.brand || !formArticle.artikel) {
                    alert("Mohon lengkapi data wajib (No. PO, Brand, Artikel)");
                    return;
                }
                const newEntry = {
                    id: Date.now().toString(),
                    noPo: formArticle.noPo.toUpperCase(),
                    brand: formArticle.brand.toUpperCase(),
                    artikel: formArticle.artikel.toUpperCase(),
                    color: formArticle.color.toUpperCase(),
                    size: formArticle.size.toUpperCase(),
                    qtyPo: formArticle.qtyPo,
                    arrivals: {
                        [formArticle.initDate]: {
                            online: parseInt(formArticle.initOnline) || 0,
                            offline: parseInt(formArticle.initOffline) || 0
                        }
                    }
                };
                setArticles([...articles, newEntry]);
                setIsModalOpen(false);
                setFormArticle({ noPo: '', brand: '', artikel: '', color: '', size: '', qtyPo: 0, initDate: '2026-03-01', initOnline: 0, initOffline: 0 });
            };

            const handleUpdateArticle = () => {
                setArticles(articles.map(art => 
                    art.id === editData.id ? { ...art, ...editData } : art
                ));
                setIsEditModalOpen(false);
            };

            const handleDeleteArticle = (id) => {
                if (window.confirm("Hapus artikel ini?")) {
                    setArticles(articles.filter(art => art.id !== id));
                }
            };

            const handleUpdateArrival = () => {
                if (!formArrival.targetPo) return;
                setArticles(articles.map(art => {
                    if (art.noPo === formArrival.targetPo) {
                        const updated = { ...art.arrivals };
                        const existing = updated[formArrival.date] || { online: 0, offline: 0 };
                        updated[formArrival.date] = {
                            online: existing.online + (parseInt(formArrival.online) || 0),
                            offline: existing.offline + (parseInt(formArrival.offline) || 0)
                        };
                        return { ...art, arrivals: updated };
                    }
                    return art;
                }));
                setIsArrivalModalOpen(false);
                setFormArrival({ ...formArrival, online: 0, offline: 0 });
            };

            const calculateTotal = (arrivals) => Object.values(arrivals).reduce((t, d) => t + d.online + d.offline, 0);

            const handleExportCSV = () => {
                if (articles.length === 0) return;
                let csvContent = "No. PO,Brand,Artikel,Size,Qty PO,Total Arrival\n";
                articles.forEach(art => {
                    csvContent += `"${art.noPo}","${art.brand}","${art.artikel}","${art.size}",${art.qtyPo},${calculateTotal(art.arrivals)}\n`;
                });
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "Inventory_Report.csv";
                link.click();
            };

            const resetFilters = () => {
                setFilterBrand('');
                setFilterPo('');
                setFilterArtikel('');
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-6 font-sans text-slate-900">
                    <div className="max-w-[98vw] mx-auto">
                        
                        {/* Header & Main Controls */}
                        <div className="mb-6 flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-indigo-600 p-3 rounded-2xl shadow-lg text-white">
                                    <Icon name="package-check" size={28} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black uppercase tracking-tight leading-none mb-1">Inventory Tracker 2026</h1>
                                    <p className="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em]">PT. NAD INTI DISTRIBUSI</p>
                                </div>
                            </div>
                            
                            <div className="flex flex-wrap items-center gap-3">
                                {/* Navigasi View */}
                                <div className="flex bg-white p-1 rounded-xl border border-slate-200 shadow-sm">
                                    <button 
                                        onClick={() => setView('dashboard')}
                                        className={`px-6 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all ${view === 'dashboard' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400'}`}
                                    >
                                        Kalender
                                    </button>
                                    <button 
                                        onClick={() => setView('recap')}
                                        className={`px-6 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all ${view === 'recap' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400'}`}
                                    >
                                        Rekap
                                    </button>
                                </div>

                                {/* Tombol Aksi Utama */}
                                <button onClick={handleExportCSV} className="flex items-center gap-2 bg-emerald-50 text-emerald-700 border border-emerald-200 px-4 py-2.5 rounded-xl font-black hover:bg-emerald-100 transition-all text-[10px] uppercase tracking-widest">
                                    <Icon name="download" size={14} /> Export
                                </button>
                                
                                <button onClick={() => setIsModalOpen(true)} className="flex items-center gap-2 bg-white border-2 border-slate-800 text-slate-800 px-4 py-2.5 rounded-xl font-black hover:bg-slate-50 transition-all text-[10px] uppercase tracking-widest">
                                    <Icon name="plus" size={14} /> Artikel
                                </button>
                                
                                <button onClick={() => setIsArrivalModalOpen(true)} className="flex items-center gap-2 bg-indigo-600 text-white px-4 py-2.5 rounded-xl font-black hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 text-[10px] uppercase tracking-widest">
                                    <Icon name="truck" size={14} /> Arrival
                                </button>
                            </div>
                        </div>

                        {/* FILTER PANEL */}
                        <div className="mb-6 flex flex-wrap items-center gap-3 bg-white p-3 rounded-2xl border border-slate-200 shadow-sm">
                            <div className="flex items-center gap-2 px-3 border-r border-slate-100">
                                <Icon name="filter" size={16} className="text-indigo-600" />
                                <span className="text-[10px] font-black uppercase text-slate-500 tracking-wider">Filter :</span>
                            </div>
                            
                            <select 
                                className="bg-slate-50 border border-slate-100 outline-none text-[10px] font-bold uppercase px-4 py-2 rounded-xl text-slate-600 focus:ring-2 focus:ring-indigo-500/20 min-w-[150px]"
                                value={filterBrand}
                                onChange={(e) => setFilterBrand(e.target.value)}
                            >
                                <option value="">Semua Brand</option>
                                {uniqueBrands.map(b => <option key={b} value={b}>{b}</option>)}
                            </select>

                            <select 
                                className="bg-slate-50 border border-slate-100 outline-none text-[10px] font-bold uppercase px-4 py-2 rounded-xl text-slate-600 focus:ring-2 focus:ring-indigo-500/20 min-w-[150px]"
                                value={filterPo}
                                onChange={(e) => setFilterPo(e.target.value)}
                            >
                                <option value="">Semua No. PO</option>
                                {uniquePos.map(p => <option key={p} value={p}>{p}</option>)}
                            </select>

                            <select 
                                className="bg-slate-50 border border-slate-100 outline-none text-[10px] font-bold uppercase px-4 py-2 rounded-xl text-slate-600 focus:ring-2 focus:ring-indigo-500/20 min-w-[150px]"
                                value={filterArtikel}
                                onChange={(e) => setFilterArtikel(e.target.value)}
                            >
                                <option value="">Semua Artikel</option>
                                {uniqueArtikels.map(a => <option key={a} value={a}>{a}</option>)}
                            </select>

                            {(filterBrand || filterPo || filterArtikel) && (
                                <button 
                                    onClick={resetFilters}
                                    className="flex items-center gap-2 px-4 py-2 text-red-600 bg-red-50 hover:bg-red-100 rounded-xl transition-all text-[10px] font-bold uppercase"
                                >
                                    <Icon name="rotate-ccw" size={12} /> Reset
                                </button>
                            )}
                        </div>

                        {/* Calendar Month Controls */}
                        {view === 'dashboard' && (
                            <div className="mb-4 flex items-center justify-between bg-white p-2 rounded-2xl border border-slate-200 shadow-sm">
                                <div className="flex items-center overflow-hidden">
                                    <button onClick={prevMonth} className="p-2 hover:bg-slate-50 rounded-lg"><Icon name="chevron-left" /></button>
                                    <div className="px-6 font-black text-slate-700 min-w-[180px] text-center uppercase text-xs tracking-[0.2em]">
                                        {currentDate.toLocaleString('id-ID', { month: 'long', year: 'numeric' })}
                                    </div>
                                    <button onClick={nextMonth} className="p-2 hover:bg-slate-50 rounded-lg"><Icon name="chevron-right" /></button>
                                </div>
                                <div className="flex gap-4 pr-4">
                                    <div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-indigo-600"></div><span className="text-[9px] font-black uppercase text-indigo-700">Online</span></div>
                                    <div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-amber-600"></div><span className="text-[9px] font-black uppercase text-amber-700">Offline</span></div>
                                </div>
                            </div>
                        )}

                        {/* TABLE VIEW */}
                        <div className="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden animate-fade-in">
                            <div className="overflow-x-auto max-h-[65vh]">
                                <table className="w-full border-collapse text-[10px]">
                                    <thead className="sticky top-0 z-30 shadow-sm">
                                        <tr className="bg-slate-800 text-white">
                                            <th rowSpan="3" className="w-20 border border-slate-700 p-3 text-center uppercase font-bold bg-slate-900 sticky top-0">Aksi</th>
                                            <th rowSpan="3" className="w-32 border border-slate-700 p-3 text-center uppercase font-bold sticky-po bg-slate-800">No. PO</th>
                                            <th rowSpan="3" className="w-32 border border-slate-700 p-3 text-center uppercase font-bold bg-slate-800">Brand</th>
                                            <th rowSpan="3" className="w-40 border border-slate-700 p-3 text-center uppercase font-bold bg-slate-800">Artikel</th>
                                            <th rowSpan="3" className="w-16 border border-slate-700 p-3 text-center uppercase font-bold bg-slate-800">Size</th>
                                            <th rowSpan="3" className="w-20 border border-slate-700 p-3 text-center uppercase font-bold bg-slate-800">Qty PO</th>
                                            <th rowSpan="3" className="w-24 border border-slate-700 p-3 text-center uppercase font-bold bg-emerald-600">Total</th>
                                            <th colSpan={daysInMonth.length * 2} className="border border-slate-700 p-2 text-center font-bold bg-slate-900 tracking-widest uppercase italic">Monitoring Kedatangan</th>
                                        </tr>
                                        <tr className="bg-slate-50 text-slate-700 font-black">
                                            {daysInMonth.map(date => (
                                                <th key={date.toISOString()} colSpan="2" className="border border-slate-200 p-1 text-center min-w-[70px]">
                                                    {date.getDate()}
                                                </th>
                                            ))}
                                        </tr>
                                        <tr className="bg-slate-100 uppercase font-black">
                                            {daysInMonth.map(date => (
                                                <React.Fragment key={`h-${date.toISOString()}`}>
                                                    <th className="border border-slate-200 p-1 text-center text-indigo-600">ON</th>
                                                    <th className="border border-slate-200 p-1 text-center text-amber-600">OFF</th>
                                                </React.Fragment>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredArticles.map((art) => (
                                            <tr key={art.id} className="table-row-hover transition-colors">
                                                <td className="border border-slate-200 p-2 text-center">
                                                    <div className="flex items-center justify-center gap-1">
                                                        <button onClick={() => { setEditData(art); setIsEditModalOpen(true); }} className="p-1.5 text-blue-600 hover:bg-blue-50 rounded-lg transition-colors"><Icon name="edit-3" size={13}/></button>
                                                        <button onClick={() => handleDeleteArticle(art.id)} className="p-1.5 text-red-600 hover:bg-red-50 rounded-lg transition-colors"><Icon name="trash-2" size={13}/></button>
                                                    </div>
                                                </td>
                                                <td className="border border-slate-200 p-3 font-bold text-slate-500 text-center sticky-po">{art.noPo}</td>
                                                <td className="border border-slate-200 p-3 font-bold uppercase">{art.brand}</td>
                                                <td className="border border-slate-200 p-3 font-medium uppercase">{art.artikel}</td>
                                                <td className="border border-slate-200 p-3 text-center font-bold">{art.size}</td>
                                                <td className="border border-slate-200 p-3 text-center font-bold">{art.qtyPo}</td>
                                                <td className="border border-slate-200 p-3 text-center font-black bg-emerald-50 text-emerald-700">
                                                    {calculateTotal(art.arrivals)}
                                                </td>
                                                {daysInMonth.map(date => {
                                                    const k = date.toISOString().split('T')[0];
                                                    const d = art.arrivals[k] || { online: 0, offline: 0 };
                                                    return (
                                                        <React.Fragment key={`${art.id}-${k}`}>
                                                            <td className="border border-slate-100 p-1 text-center font-bold text-indigo-600">{d.online || '-'}</td>
                                                            <td className="border border-slate-100 p-1 text-center font-bold text-amber-600">{d.offline || '-'}</td>
                                                        </React.Fragment>
                                                    );
                                                })}
                                            </tr>
                                        ))}
                                        {filteredArticles.length === 0 && (
                                            <tr>
                                                <td colSpan={7 + daysInMonth.length * 2} className="p-24 text-center bg-slate-50">
                                                    <div className="flex flex-col items-center gap-4 opacity-30">
                                                        <Icon name="package-search" size={64} />
                                                        <span className="font-black uppercase tracking-[0.5em] text-xs">Data Tidak Ditemukan</span>
                                                        <button onClick={resetFilters} className="text-indigo-600 underline font-bold text-[11px] tracking-widest uppercase mt-2">Tampilkan Semua</button>
                                                    </div>
                                                </td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* MODAL: TAMBAH ARTIKEL */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-2xl overflow-hidden animate-fade-in">
                                <div className="bg-indigo-600 p-6 text-white flex justify-between items-center">
                                    <h3 className="text-xl font-black uppercase tracking-tight">Input Artikel</h3>
                                    <button onClick={() => setIsModalOpen(false)}><Icon name="x" size={24} /></button>
                                </div>
                                <div className="p-8 grid grid-cols-2 gap-5">
                                    <input placeholder="NO. PO" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold uppercase" value={formArticle.noPo} onChange={e => setFormArticle({...formArticle, noPo: e.target.value})} />
                                    <input placeholder="BRAND" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold uppercase" value={formArticle.brand} onChange={e => setFormArticle({...formArticle, brand: e.target.value})} />
                                    <input placeholder="ARTIKEL" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold uppercase col-span-2" value={formArticle.artikel} onChange={e => setFormArticle({...formArticle, artikel: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4 col-span-2">
                                        <input placeholder="SIZE" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold uppercase" value={formArticle.size} onChange={e => setFormArticle({...formArticle, size: e.target.value})} />
                                        <input type="number" placeholder="QTY PO" className="w-full p-4 bg-emerald-50 border border-emerald-100 rounded-2xl outline-none font-black text-emerald-700" value={formArticle.qtyPo || ''} onChange={e => setFormArticle({...formArticle, qtyPo: parseInt(e.target.value) || 0})} />
                                    </div>
                                    <div className="col-span-2 flex gap-4 mt-8">
                                        <button onClick={() => setIsModalOpen(false)} className="flex-1 p-4 bg-slate-100 rounded-2xl font-black text-slate-400 uppercase text-[10px]">Batal</button>
                                        <button onClick={handleSaveArticle} className="flex-1 p-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-[10px] shadow-lg">Simpan Data</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: EDIT ARTIKEL */}
                    {isEditModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden animate-fade-in">
                                <div className="bg-blue-600 p-6 text-white flex justify-between items-center">
                                    <h3 className="font-black uppercase tracking-widest text-sm">Edit Artikel</h3>
                                    <button onClick={() => setIsEditModalOpen(false)}><Icon name="x" size={20}/></button>
                                </div>
                                <div className="p-8 space-y-4">
                                    <input className="w-full p-4 bg-slate-50 border rounded-2xl font-bold uppercase" value={editData.noPo} onChange={e => setEditData({...editData, noPo: e.target.value.toUpperCase()})} />
                                    <input className="w-full p-4 bg-slate-50 border rounded-2xl font-bold uppercase" value={editData.brand} onChange={e => setEditData({...editData, brand: e.target.value.toUpperCase()})} />
                                    <input className="w-full p-4 bg-slate-50 border rounded-2xl font-bold uppercase" value={editData.artikel} onChange={e => setEditData({...editData, artikel: e.target.value.toUpperCase()})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input className="w-full p-4 bg-slate-50 border rounded-2xl font-bold uppercase" value={editData.size} onChange={e => setEditData({...editData, size: e.target.value.toUpperCase()})} />
                                        <input type="number" className="w-full p-4 bg-emerald-50 border rounded-2xl font-black text-emerald-700" value={editData.qtyPo} onChange={e => setEditData({...editData, qtyPo: parseInt(e.target.value) || 0})} />
                                    </div>
                                    <button onClick={handleUpdateArticle} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest mt-6">Update Perubahan</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: INPUT ARRIVAL */}
                    {isArrivalModalOpen && (
                        <div className="fixed inset-0 bg-indigo-900/40 backdrop-blur-md flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden animate-fade-in">
                                <div className="p-6 border-b flex justify-between items-center text-indigo-600">
                                    <h3 className="font-black text-xs uppercase tracking-widest flex items-center gap-2"><Icon name="truck" /> Update Arrival</h3>
                                    <button onClick={() => setIsArrivalModalOpen(false)}><Icon name="x" size={20} /></button>
                                </div>
                                <div className="p-8 space-y-4">
                                    <select className="w-full p-4 bg-indigo-50 border border-indigo-100 rounded-2xl font-black text-indigo-700 text-sm outline-none" value={formArrival.targetPo} onChange={e => setFormArrival({...formArrival, targetPo: e.target.value})}>
                                        <option value="">-- PILIH NOMOR PO --</option>
                                        {articles.map(a => <option key={a.id} value={a.noPo}>{a.noPo} - {a.artikel}</option>)}
                                    </select>
                                    <input type="date" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold" value={formArrival.date} onChange={e => setFormArrival({...formArrival, date: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[9px] font-black uppercase text-indigo-500 mb-1 ml-1 block">Online</label>
                                            <input type="number" className="w-full p-4 bg-white border-2 border-indigo-50 rounded-2xl font-black text-indigo-600 text-center" value={formArrival.online || ''} onChange={e => setFormArrival({...formArrival, online: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-black uppercase text-amber-500 mb-1 ml-1 block">Offline</label>
                                            <input type="number" className="w-full p-4 bg-white border-2 border-amber-50 rounded-2xl font-black text-amber-600 text-center" value={formArrival.offline || ''} onChange={e => setFormArrival({...formArrival, offline: e.target.value})} />
                                        </div>
                                    </div>
                                    <button onClick={handleUpdateArrival} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest mt-6 shadow-lg">Simpan Kedatangan</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
