<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Tracker 2026 - PT. NAD INTI DISTRIBUSI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .overflow-x-auto::-webkit-scrollbar { height: 8px; }
        .overflow-x-auto::-webkit-scrollbar-track { background: #f1f5f9; }
        .overflow-x-auto::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .overflow-x-auto::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .table-row-hover:hover td { background-color: #f8fafc !important; }
        .sticky-action { position: sticky; left: 0; background: white; z-index: 20; }
        .sticky-po { position: sticky; left: 60px; background: white; z-index: 10; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const SPREADSHEET_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzdXHMawSG2gz3UVdsCjC3eryAQeKwRr_722AtkCbF-rVOtxxVVlrHJfHRG4tlUulwG/exec"; 

        const BRAND_LIST = ["HEYMALE", "PREPSTUDIO", "ZOMA BASIC", "HEYLOCAL", "SHUWA MODEST", "BOONABOO", "ANSHARIYA", "NOSTALGY"];
        const COLOR_LIST = ["ROSETTE", "SYCAMORE", "BLACK", "COLE", "BLUSH", "CLAY", "DAISY", "FLOYD", "GARNET", "JET BLACK", "POWDER", "IVORY", "BROWN", "NAVY", "GREY", "MIDNIGHT", "WHITE", "ASH GREY", "CARAMEL", "CASHMERE", "SAGE GREEN", "SAND", "VIOLET", "BUTTERSCOTCH", "CHARCOAL", "BEIGE", "COFFEE", "LIGHT TAUPE", "CREAM", "CANYON", "COASTAL", "LINEN", "ONYX", "PEONY", "ROYAL", "SEPHIA", "GOLD", "NUDE", "VANILLA", "LATTE", "BURGUNDY", "CHOCO", "TAUPE", "CORAL", "TEAL", "SAGE", "TERRACOTA", "GREIGE", "JADE", "PORCELAIN", "ROSEAT", "TRUFFLE", "FOREST", "LEAF", "SEASALT", "SUNDIAL", "STARLIGHT", "BLUE", "DENIM", "LIGHT GREY", "SKY BLUE", "ARMY", "DARK GREY", "MOCCA", "WINE", "DARK BLUE", "KELP", "OATMEAL", "DARK OLIVE", "MUSTARD", "OXIDE", "VERDIGN", "KHAKI", "RED WINE", "DARK BROWN", "FOREST GREEN", "GREEN", "MISTY", "PURPLE", "RED", "SEAGREEN", "YELLOW", "TAN", "CYAN", "LIGHT BLUE", "OLIVE", "STONE", "HAZELNUT", "ALL COLOUR", "DARK DENIM", "DARK CHOCO"];
        const SIZE_LIST = ["L", "XL", "LX", "S", "SX", "M", "ALL SIZE", "SQUARE", "MEDIUM", "36", "37", "38", "39", "40", "41", "MINI", "WALLET", "50 ML", "80 GR", "10 GR", "28", "29", "30", "31", "32", "33", "34", "115 CM", "6", "12", "8", "4", "10"];

        const toLocalDateString = (date) => {
            const d = new Date(date);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const SearchableDropdown = ({ label, options, value, onChange, placeholder }) => {
            const [search, setSearch] = useState('');
            const [isOpen, setIsOpen] = useState(false);
            const dropdownRef = useRef(null);
            const filteredOptions = useMemo(() => options.filter(opt => opt.toUpperCase().includes(search.toUpperCase())), [options, search]);

            useEffect(() => {
                const handleClickOutside = (e) => { if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setIsOpen(false); };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            return (
                <div className="relative" ref={dropdownRef}>
                    <label className="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 block">{label}</label>
                    <div className="w-full p-4 bg-slate-50 border rounded-2xl font-bold uppercase text-xs cursor-pointer flex justify-between items-center transition-all hover:bg-slate-100" onClick={() => setIsOpen(!isOpen)}>
                        <span className={value ? 'text-slate-900' : 'text-slate-400'}>{value || placeholder}</span>
                        <Icon name="chevron-down" size={14} className="text-slate-400" />
                    </div>
                    {isOpen && (
                        <div className="absolute top-full left-0 right-0 mt-2 bg-white border border-slate-200 rounded-2xl shadow-2xl z-[110] overflow-hidden animate-fade-in">
                            <div className="p-3 border-b bg-slate-50 sticky top-0">
                                <div className="relative">
                                    <Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input autoFocus className="w-full pl-9 pr-4 py-2 bg-white border border-slate-200 rounded-xl text-[10px] uppercase font-bold outline-none" placeholder="CARI..." value={search} onChange={(e) => setSearch(e.target.value)} />
                                </div>
                            </div>
                            <div className="max-h-[200px] overflow-y-auto">
                                {filteredOptions.length > 0 ? filteredOptions.map(opt => (
                                    <div key={opt} className="px-4 py-3 hover:bg-indigo-50 cursor-pointer text-[10px] font-black uppercase border-b border-slate-50" onClick={() => { onChange(opt); setIsOpen(false); setSearch(''); }}>{opt}</div>
                                )) : <div className="p-4 text-center text-[10px] text-slate-400 font-bold uppercase">Tidak Ditemukan</div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [dbStatus, setDbStatus] = useState('idle');
            const [currentDate, setCurrentDate] = useState(new Date());
            const [articles, setArticles] = useState([]);
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isArrivalModalOpen, setIsArrivalModalOpen] = useState(false);
            const [editMode, setEditMode] = useState(false);
            const [selectedId, setSelectedId] = useState(null);

            const [formArticle, setFormArticle] = useState({ noPo: '', tglPo: '', brand: '', artikel: '', qtyPo: 0 });
            const [formArrival, setFormArrival] = useState({ targetId: '', date: toLocalDateString(new Date()), color: '', size: '', online: 0, offline: 0 });

            const fetchDataFromSheets = async () => {
                setDbStatus('loading');
                try {
                    const response = await fetch(`${SPREADSHEET_WEB_APP_URL}?action=read&t=${Date.now()}`);
                    const result = await response.json();
                    if (Array.isArray(result)) {
                        setArticles(result);
                        localStorage.setItem('inventory_db_2026', JSON.stringify(result));
                        setDbStatus('connected');
                    }
                } catch (err) {
                    const saved = localStorage.getItem('inventory_db_2026');
                    if (saved) setArticles(JSON.parse(saved));
                    setDbStatus('error');
                }
            };

            useEffect(() => { fetchDataFromSheets(); }, []);

            const syncToSheets = async (latestData) => {
                setDbStatus('syncing');
                try {
                    const payload = encodeURIComponent(JSON.stringify(latestData));
                    await fetch(`${SPREADSHEET_WEB_APP_URL}?action=sync&data=${payload}`, { 
                        method: 'GET',
                        mode: 'no-cors' 
                    });
                    setDbStatus('connected');
                } catch (err) {
                    setDbStatus('error');
                }
            };

            const calculateMetrics = (art) => {
                let online = 0, offline = 0;
                if (art.arrivals) {
                    Object.values(art.arrivals).forEach(d => {
                        online += (parseInt(d.online) || 0);
                        offline += (parseInt(d.offline) || 0);
                    });
                }
                const total = online + offline;
                const sisa = (parseInt(art.qtyPo) || 0) - total;
                return { online, offline, total, sisa };
            };

            const daysInMonth = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const days = [];
                const date = new Date(year, month, 1);
                while (date.getMonth() === month) {
                    days.push(new Date(date));
                    date.setDate(date.getDate() + 1);
                }
                return days;
            }, [currentDate]);

            const changeMonth = (offset) => {
                setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + offset, 1));
            };

            const handleSaveArticle = () => {
                let updated;
                if (editMode) {
                    updated = articles.map(art => art.id === selectedId ? { ...art, ...formArticle } : art);
                } else {
                    const newEntry = {
                        id: Date.now().toString(),
                        ...formArticle,
                        color: '-', 
                        size: '-',  
                        arrivals: {}
                    };
                    updated = [...articles, newEntry];
                }
                setArticles(updated);
                syncToSheets(updated);
                setIsModalOpen(false);
                setEditMode(false);
                setFormArticle({ noPo: '', tglPo: '', brand: '', artikel: '', qtyPo: 0 });
            };

            const handleEdit = (art) => {
                setEditMode(true);
                setSelectedId(art.id);
                setFormArticle({ ...art });
                setIsModalOpen(true);
            };

            const handleDelete = (id) => {
                if (confirm("Hapus data ini dari Cloud?")) {
                    const updated = articles.filter(a => a.id !== id);
                    setArticles(updated);
                    syncToSheets(updated);
                }
            };

            const handleUpdateArrival = () => {
                const updated = articles.map(art => {
                    if (art.id === formArrival.targetId) {
                        const newArrivals = { ...art.arrivals };
                        const key = formArrival.date;
                        newArrivals[key] = {
                            online: (parseInt(newArrivals[key]?.online) || 0) + (parseInt(formArrival.online) || 0),
                            offline: (parseInt(newArrivals[key]?.offline) || 0) + (parseInt(formArrival.offline) || 0)
                        };
                        return { ...art, color: formArrival.color, size: formArrival.size, arrivals: newArrivals };
                    }
                    return art;
                });
                setArticles(updated);
                syncToSheets(updated);
                setIsArrivalModalOpen(false);
                setFormArrival({ ...formArrival, online: 0, offline: 0 });
            };

            const exportToCSV = () => {
                // Header sesuai permintaan: NOMOR PO, TGL, BRAND, ARTIKEL, COLOR, SIZE, QTY PO, ON, OFF, TOTAL, SISA
                const headers = "NOMOR PO,TGL,BRAND,ARTIKEL,COLOR,SIZE,QTY PO,ON,OFF,TOTAL,SISA";
                
                const rows = articles.map(a => {
                    const m = calculateMetrics(a);
                    const rowData = [
                        `"${a.noPo}"`,
                        `"${a.tglPo}"`,
                        `"${a.brand}"`,
                        `"${a.artikel}"`,
                        `"${a.color}"`,
                        `"${a.size}"`,
                        a.qtyPo,
                        m.online,
                        m.offline,
                        m.total,
                        m.sisa
                    ];
                    return rowData.join(",");
                }).join("\n");

                const blob = new Blob([headers + "\n" + rows], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `Recap_Inventory_${currentDate.getFullYear()}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="min-h-screen p-4 md:p-10">
                    <div className="max-w-[98vw] mx-auto">
                        
                        {/* Header Section */}
                        <div className="mb-10 flex flex-col lg:flex-row lg:items-center justify-between gap-8">
                            <div className="flex items-center gap-6">
                                <div className="bg-indigo-600 p-5 rounded-[2.2rem] shadow-2xl text-white transform hover:rotate-6 transition-transform">
                                    <Icon name="package" size={36} />
                                </div>
                                <div>
                                    <h1 className="text-4xl font-black uppercase tracking-tighter text-slate-900 leading-none">Inventory Cloud 2026</h1>
                                    <div className="flex items-center gap-2 mt-2">
                                        <span className={`w-2 h-2 rounded-full ${dbStatus === 'connected' ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]' : 'bg-amber-500 animate-pulse'}`}></span>
                                        <p className="text-slate-500 text-[10px] font-black uppercase tracking-widest">
                                            Status: {dbStatus === 'connected' ? 'Synced to Cloud' : dbStatus.toUpperCase()} 
                                        </p>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex flex-wrap items-center gap-4 bg-white p-3 rounded-[1.8rem] shadow-sm border border-slate-100">
                                <div className="flex items-center bg-slate-50 rounded-xl px-2">
                                    <button onClick={() => changeMonth(-1)} className="p-2 hover:bg-white rounded-lg transition-all text-slate-400 hover:text-indigo-600"><Icon name="chevron-left" size={16}/></button>
                                    <span className="px-5 text-[11px] font-black uppercase text-slate-700 min-w-[140px] text-center">
                                        {currentDate.toLocaleString('id-ID', { month: 'long', year: 'numeric' })}
                                    </span>
                                    <button onClick={() => changeMonth(1)} className="p-2 hover:bg-white rounded-lg transition-all text-slate-400 hover:text-indigo-600"><Icon name="chevron-right" size={16}/></button>
                                </div>

                                <div className="h-8 w-[1px] bg-slate-200 mx-1"></div>

                                <button onClick={() => setView('dashboard')} className={`px-6 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${view === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'text-slate-400 hover:bg-slate-50'}`}>Timeline</button>
                                <button onClick={() => setView('recap')} className={`px-6 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${view === 'recap' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'text-slate-400 hover:bg-slate-50'}`}>Recap</button>
                                
                                <button onClick={exportToCSV} className="flex items-center gap-2 px-5 py-2.5 bg-emerald-50 text-emerald-600 rounded-xl text-[10px] font-black uppercase hover:bg-emerald-600 hover:text-white transition-all border border-emerald-100">
                                    <Icon name="download" size={16} /> Export CSV
                                </button>
                            </div>

                            <div className="flex gap-4">
                                <button onClick={() => { setEditMode(false); setIsModalOpen(true); }} className="flex items-center gap-2 bg-white border-2 border-slate-900 text-slate-900 px-7 py-4 rounded-2xl font-black text-xs uppercase hover:bg-slate-900 hover:text-white transition-all shadow-md">
                                    <Icon name="plus" size={16} /> Master PO
                                </button>
                                <button onClick={() => setIsArrivalModalOpen(true)} className="flex items-center gap-2 bg-indigo-600 text-white px-7 py-4 rounded-2xl font-black shadow-xl shadow-indigo-100 text-xs uppercase hover:bg-indigo-700 transition-all">
                                    <Icon name="truck" size={16} /> Kedatangan
                                </button>
                            </div>
                        </div>

                        {/* Inventory Table */}
                        <div className="bg-white rounded-[2.5rem] shadow-2xl border border-slate-200 overflow-hidden animate-fade-in">
                            <div className="overflow-x-auto max-h-[72vh]">
                                <table className="w-full border-collapse text-[11px] font-bold">
                                    <thead className="sticky top-0 z-30">
                                        <tr className="bg-slate-900 text-white uppercase tracking-tighter">
                                            <th rowSpan="3" className="p-3 border border-slate-800 sticky-action bg-slate-900 w-[60px]">Aksi</th>
                                            <th rowSpan="3" className="p-5 border border-slate-800 sticky-po bg-slate-900 min-w-[120px]">Nomor PO</th>
                                            <th rowSpan="3" className="p-5 border border-slate-800 bg-slate-900 min-w-[110px]">Tgl PO</th>
                                            <th rowSpan="3" className="p-5 border border-slate-800 bg-slate-900 min-w-[120px]">Brand</th>
                                            <th rowSpan="3" className="p-5 border border-slate-800 bg-slate-900 text-left min-w-[180px]">Artikel</th>
                                            <th rowSpan="3" className="p-5 border border-slate-800 bg-slate-900 min-w-[110px]">Color</th>
                                            <th rowSpan="3" className="p-5 border border-slate-800 bg-slate-900 min-w-[60px]">Size</th>
                                            <th rowSpan="3" className="p-5 border border-slate-800 bg-slate-900 text-indigo-300 min-w-[80px]">Qty PO</th>
                                            {view === 'dashboard' ? (
                                                <th colSpan={daysInMonth.length * 2} className="border border-slate-800 p-2 text-center bg-slate-950">Arus Kedatangan Barang</th>
                                            ) : (
                                                <>
                                                    <th rowSpan="3" className="p-5 border border-slate-800 bg-indigo-950 text-indigo-300">On</th>
                                                    <th rowSpan="3" className="p-5 border border-slate-800 bg-amber-950 text-amber-300">Off</th>
                                                    <th rowSpan="3" className="p-5 border border-slate-800 bg-emerald-900 text-emerald-300">Total</th>
                                                    <th rowSpan="3" className="p-5 border border-slate-800 bg-rose-950 text-rose-300">Sisa</th>
                                                </>
                                            )}
                                        </tr>
                                        {view === 'dashboard' && (
                                            <>
                                                <tr className="bg-slate-100 text-slate-500">
                                                    {daysInMonth.map(date => <th key={date.toISOString()} colSpan="2" className="border border-slate-200 p-1.5 text-center">{date.getDate()}</th>)}
                                                </tr>
                                                <tr className="bg-slate-50 text-[9px]">
                                                    {daysInMonth.map(date => (
                                                        <React.Fragment key={`sub-${date.toISOString()}`}>
                                                            <th className="border border-slate-200 p-1 text-indigo-500">ON</th>
                                                            <th className="border border-slate-200 p-1 text-amber-600">OFF</th>
                                                        </React.Fragment>
                                                    ))}
                                                </tr>
                                            </>
                                        )}
                                    </thead>
                                    <tbody className="divide-y divide-slate-100 text-center">
                                        {articles.map((art) => {
                                            const m = calculateMetrics(art);
                                            return (
                                                <tr key={art.id} className="table-row-hover group">
                                                    <td className="p-2 border border-slate-50 sticky-action group-hover:bg-slate-50">
                                                        <div className="flex gap-1 justify-center">
                                                            <button onClick={() => handleEdit(art)} className="p-2 text-indigo-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors"><Icon name="edit-3" size={14}/></button>
                                                            <button onClick={() => handleDelete(art.id)} className="p-2 text-rose-300 hover:text-rose-600 hover:bg-rose-50 rounded-lg transition-colors"><Icon name="trash-2" size={14}/></button>
                                                        </div>
                                                    </td>
                                                    <td className="p-5 border border-slate-50 sticky-po group-hover:bg-slate-50 uppercase font-black text-slate-900">{art.noPo}</td>
                                                    <td className="p-5 border border-slate-50 text-slate-400">{art.tglPo}</td>
                                                    <td className="p-5 border border-slate-50 uppercase text-slate-500">{art.brand}</td>
                                                    <td className="p-5 border border-slate-50 uppercase text-left text-slate-800">{art.artikel}</td>
                                                    <td className="p-5 border border-slate-50 uppercase text-slate-400">{art.color}</td>
                                                    <td className="p-5 border border-slate-50">{art.size}</td>
                                                    <td className="p-5 border border-slate-50 font-black bg-indigo-50/30 text-indigo-700">{art.qtyPo}</td>
                                                    {view === 'dashboard' ? (
                                                        daysInMonth.map(date => {
                                                            const dStr = toLocalDateString(date);
                                                            const val = art.arrivals?.[dStr] || { online: 0, offline: 0 };
                                                            return (
                                                                <React.Fragment key={`${art.id}-${dStr}`}>
                                                                    <td className={`p-2 border border-slate-50 font-bold ${val.online ? 'bg-indigo-50/50 text-indigo-600' : 'text-slate-200'}`}>{val.online || 0}</td>
                                                                    <td className={`p-2 border border-slate-50 font-bold ${val.offline ? 'bg-amber-50/50 text-amber-600' : 'text-slate-200'}`}>{val.offline || 0}</td>
                                                                </React.Fragment>
                                                            );
                                                        })
                                                    ) : (
                                                        <>
                                                            <td className="p-5 border border-slate-50 text-indigo-600 font-bold">{m.online}</td>
                                                            <td className="p-5 border border-slate-50 text-amber-600 font-bold">{m.offline}</td>
                                                            <td className="p-5 border border-slate-50 bg-emerald-50 text-emerald-700 font-black">{m.total}</td>
                                                            <td className={`p-5 border border-slate-50 font-black ${m.sisa > 0 ? 'text-rose-600 bg-rose-50' : 'text-emerald-500'}`}>{m.sisa}</td>
                                                        </>
                                                    )}
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* Master PO Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md flex items-center justify-center z-[100] p-4 animate-fade-in">
                            <div className="bg-white rounded-[2.8rem] shadow-2xl w-full max-w-lg overflow-hidden border border-slate-100">
                                <div className="bg-slate-900 p-8 text-white flex justify-between items-center">
                                    <h3 className="text-2xl font-black uppercase tracking-tight">{editMode ? 'Update Master PO' : 'Input Master PO'}</h3>
                                    <button onClick={() => { setIsModalOpen(false); setEditMode(false); }} className="bg-white/10 p-2 rounded-full hover:bg-white/20 transition-all"><Icon name="x" size={24} /></button>
                                </div>
                                <div className="p-8 space-y-6">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 block">Nomor PO</label>
                                            <input placeholder="Contoh: PO-001" className="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl font-black uppercase outline-none transition-all" value={formArticle.noPo} onChange={e => setFormArticle({...formArticle, noPo: e.target.value.toUpperCase()})} />
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 block">Tanggal PO</label>
                                            <input type="date" className="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl font-black outline-none transition-all" value={formArticle.tglPo} onChange={e => setFormArticle({...formArticle, tglPo: e.target.value})} />
                                        </div>
                                    </div>
                                    <SearchableDropdown label="Pilih Brand" options={BRAND_LIST} value={formArticle.brand} onChange={v => setFormArticle({...formArticle, brand: v})} placeholder="CARI BRAND..." />
                                    <div>
                                        <label className="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 block">Nama Artikel</label>
                                        <input placeholder="Contoh: KEMEJA POLOS" className="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl font-black uppercase outline-none transition-all" value={formArticle.artikel} onChange={e => setFormArticle({...formArticle, artikel: e.target.value.toUpperCase()})} />
                                    </div>
                                    <div>
                                        <label className="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 block">Quantity Target PO</label>
                                        <input type="number" placeholder="0" className="w-full p-5 bg-indigo-50 border-2 border-indigo-100 focus:border-indigo-500 rounded-2xl font-black text-3xl text-indigo-700 outline-none transition-all text-center" value={formArticle.qtyPo || ''} onChange={e => setFormArticle({...formArticle, qtyPo: parseInt(e.target.value) || 0})} />
                                    </div>
                                    <button onClick={handleSaveArticle} className="w-full py-5 bg-indigo-600 text-white rounded-[1.8rem] font-black uppercase text-xs mt-4 hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all">
                                        {editMode ? 'Simpan Perubahan Cloud' : 'Kirim ke Database Cloud'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Arrival Modal */}
                    {isArrivalModalOpen && (
                        <div className="fixed inset-0 bg-indigo-950/70 backdrop-blur-md flex items-center justify-center z-[100] p-4 animate-fade-in">
                            <div className="bg-white rounded-[2.8rem] shadow-2xl w-full max-w-md overflow-hidden">
                                <div className="p-8 border-b border-slate-50 flex justify-between items-center bg-indigo-50/30">
                                    <h3 className="text-xl font-black uppercase text-indigo-950 tracking-tight">Update Kedatangan</h3>
                                    <button onClick={() => setIsArrivalModalOpen(false)} className="text-slate-300 hover:text-rose-500 transition-all"><Icon name="x" size={24} /></button>
                                </div>
                                <div className="p-8 space-y-5">
                                    <div>
                                        <label className="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 block">Pilih Artikel PO</label>
                                        <select className="w-full p-4 bg-slate-50 border rounded-2xl font-black text-xs outline-none cursor-pointer" value={formArrival.targetId} onChange={e => setFormArrival({...formArrival, targetId: e.target.value})}>
                                            <option value="">-- PILIH DATA PO --</option>
                                            {articles.map(a => <option key={a.id} value={a.id}>{a.noPo} - {a.artikel}</option>)}
                                        </select>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <SearchableDropdown label="Warna" options={COLOR_LIST} value={formArrival.color} onChange={v => setFormArrival({...formArrival, color: v})} placeholder="WARNA" />
                                        <SearchableDropdown label="Size" options={SIZE_LIST} value={formArrival.size} onChange={v => setFormArrival({...formArrival, size: v})} placeholder="SIZE" />
                                    </div>
                                    <div>
                                        <label className="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 block">Tanggal Kedatangan</label>
                                        <input type="date" className="w-full p-4 bg-slate-50 border rounded-2xl font-black outline-none" value={formArrival.date} onChange={e => setFormArrival({...formArrival, date: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] font-black uppercase text-indigo-500 ml-2 mb-2 block text-center">Qty Online</label>
                                            <input type="number" placeholder="0" className="w-full p-4 bg-white border-2 border-indigo-100 rounded-2xl font-black text-center text-xl text-indigo-600 outline-none" value={formArrival.online || ''} onChange={e => setFormArrival({...formArrival, online: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black uppercase text-amber-500 ml-2 mb-2 block text-center">Qty Offline</label>
                                            <input type="number" placeholder="0" className="w-full p-4 bg-white border-2 border-amber-100 rounded-2xl font-black text-center text-xl text-amber-600 outline-none" value={formArrival.offline || ''} onChange={e => setFormArrival({...formArrival, offline: e.target.value})} />
                                        </div>
                                    </div>
                                    <button onClick={handleUpdateArrival} className="w-full py-5 bg-indigo-600 text-white rounded-[1.8rem] font-black uppercase text-xs mt-4 hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all">
                                        Update Kedatangan Cloud
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
