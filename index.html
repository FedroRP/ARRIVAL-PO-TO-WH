<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Tracker 2026 - Local Storage</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .overflow-x-auto::-webkit-scrollbar { height: 8px; }
        .overflow-x-auto::-webkit-scrollbar-track { background: #f1f5f9; }
        .overflow-x-auto::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        /* Definisi Lebar Kolom Sticky (dalam pixel) */
        :root {
            --w-aksi: 50px;
            --w-brand: 100px;
            --w-artikel: 160px;
            --w-color: 120px;
            --w-size: 60px;
            --w-qtypo: 80px;
            --w-total: 100px;
        }

        /* Kelas Sticky Custom dengan kalkulasi akumulatif */
        .sticky-col-1 { left: 0; z-index: 40; width: var(--w-aksi); }
        .sticky-col-2 { left: var(--w-aksi); z-index: 40; width: var(--w-brand); }
        .sticky-col-3 { left: calc(var(--w-aksi) + var(--w-brand)); z-index: 40; width: var(--w-artikel); }
        .sticky-col-4 { left: calc(var(--w-aksi) + var(--w-brand) + var(--w-artikel)); z-index: 40; width: var(--w-color); }
        .sticky-col-5 { left: calc(var(--w-aksi) + var(--w-brand) + var(--w-artikel) + var(--w-color)); z-index: 40; width: var(--w-size); }
        .sticky-col-6 { left: calc(var(--w-aksi) + var(--w-brand) + var(--w-artikel) + var(--w-color) + var(--w-size)); z-index: 40; width: var(--w-qtypo); }
        .sticky-col-7 { left: calc(var(--w-aksi) + var(--w-brand) + var(--w-artikel) + var(--w-color) + var(--w-size) + var(--w-qtypo)); z-index: 40; width: var(--w-total); }

        /* Garis pembatas tebal antara kolom beku dan kalender */
        .freeze-border { border-right: 3px solid #cbd5e1 !important; }

        /* Memastikan header tetap di atas saat scroll */
        thead th.sticky { top: 0; z-index: 50; }
        
        .sticky { position: sticky !important; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            // Load initial data from localStorage
            const [articles, setArticles] = useState(() => {
                const saved = localStorage.getItem('inventory_data_2026');
                return saved ? JSON.parse(saved) : [];
            });
            
            const [currentDate, setCurrentDate] = useState(new Date(2026, 2, 1)); // Maret 2026
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingArticle, setEditingArticle] = useState(null);
            const [formData, setFormData] = useState({ brand: '', artikel: '', color: '', size: '', qtyPo: 0 });

            // Sync with localStorage whenever articles change
            useEffect(() => {
                localStorage.setItem('inventory_data_2026', JSON.stringify(articles));
            }, [articles]);

            const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
            const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));

            const monthLabel = currentDate.toLocaleString('id-ID', { month: 'long' }).toUpperCase();
            const yearLabel = currentDate.getFullYear();

            const daysInMonth = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const date = new Date(year, month, 1);
                const days = [];
                while (date.getMonth() === month) {
                    days.push(new Date(date));
                    date.setDate(date.getDate() + 1);
                }
                return days;
            }, [currentDate]);

            const handleSaveArticle = () => {
                if (!formData.brand || !formData.artikel) return;
                
                if (editingArticle) {
                    setArticles(articles.map(art => 
                        art.id === editingArticle.id ? { ...art, ...formData } : art
                    ));
                } else {
                    const newArticle = {
                        ...formData,
                        id: Date.now().toString(),
                        arrivals: {}
                    };
                    setArticles([...articles, newArticle]);
                }
                closeModal();
            };

            const handleDelete = (id) => {
                if (confirm('Hapus artikel ini?')) {
                    setArticles(articles.filter(art => art.id !== id));
                }
            };

            const handleArrivalChange = (articleId, dateKey, type, value) => {
                const qty = parseInt(value) || 0;
                setArticles(articles.map(art => {
                    if (art.id === articleId) {
                        const currentArrivals = art.arrivals || {};
                        const dayData = currentArrivals[dateKey] || { online: 0, offline: 0 };
                        return {
                            ...art,
                            arrivals: {
                                ...currentArrivals,
                                [dateKey]: { ...dayData, [type]: qty }
                            }
                        };
                    }
                    return art;
                }));
            };

            const openEdit = (art) => {
                setEditingArticle(art);
                setFormData({ 
                    brand: art.brand, 
                    artikel: art.artikel, 
                    color: art.color, 
                    size: art.size, 
                    qtyPo: art.qtyPo 
                });
                setIsModalOpen(true);
            };

            const closeModal = () => {
                setIsModalOpen(false);
                setEditingArticle(null);
                setFormData({ brand: '', artikel: '', color: '', size: '', qtyPo: 0 });
            };

            const calculateTotalArrival = (arrivals = {}) => {
                return Object.values(arrivals).reduce((total, dailyData) => {
                    return total + (dailyData.online || 0) + (dailyData.offline || 0);
                }, 0);
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-6 font-sans text-slate-900">
                    <div className="max-w-full mx-auto">
                        
                        {/* Header Section */}
                        <div className="mb-6 flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-indigo-600 p-3 rounded-2xl shadow-lg shadow-indigo-200 text-white">
                                    <Icon name="layout-dashboard" size={28} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black tracking-tight text-slate-800 uppercase leading-none">Inventory Tracker 2026</h1>
                                    <p className="text-slate-500 text-sm font-medium italic mt-1 underline decoration-indigo-200 uppercase">Local Storage Mode</p>
                                </div>
                            </div>
                            
                            <div className="flex flex-wrap items-center gap-4">
                                <div className="flex items-center bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                    <button onClick={prevMonth} className="p-2.5 hover:bg-slate-50 transition-colors border-r border-slate-200 text-slate-600">
                                        <Icon name="chevron-left" />
                                    </button>
                                    <div className="px-6 py-2 flex items-center gap-3 bg-white">
                                        <Icon name="calendar" className="text-indigo-600" />
                                        <span className="font-bold text-slate-700 min-w-[160px] text-center uppercase tracking-wider">{monthLabel} {yearLabel}</span>
                                    </div>
                                    <button onClick={nextMonth} className="p-2.5 hover:bg-slate-50 transition-colors border-l border-slate-200 text-slate-600">
                                        <Icon name="chevron-right" />
                                    </button>
                                </div>
                                
                                <button 
                                    onClick={() => setIsModalOpen(true)}
                                    className="flex items-center gap-2 bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 uppercase text-sm"
                                >
                                    <Icon name="plus" size={18} /> Tambah Artikel
                                </button>
                            </div>
                        </div>

                        {/* Table Container */}
                        <div className="bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden">
                            <div className="overflow-x-auto max-h-[75vh]">
                                <table className="w-full border-collapse text-[11px] table-fixed min-w-max">
                                    <thead className="sticky top-0 z-50">
                                        {/* Row 1: Header Titles */}
                                        <tr className="bg-slate-800 text-white uppercase">
                                            <th rowSpan="3" className="sticky sticky-col-1 bg-slate-800 border border-slate-700 p-2 text-center z-[60]">Aksi</th>
                                            <th rowSpan="3" className="sticky sticky-col-2 bg-slate-800 border border-slate-700 p-2 text-center z-[60]">Brand</th>
                                            <th rowSpan="3" className="sticky sticky-col-3 bg-slate-800 border border-slate-700 p-2 text-center z-[60]">Artikel</th>
                                            <th rowSpan="3" className="sticky sticky-col-4 bg-slate-800 border border-slate-700 p-2 text-center z-[60]">Color</th>
                                            <th rowSpan="3" className="sticky sticky-col-5 bg-slate-800 border border-slate-700 p-2 text-center z-[60]">Size</th>
                                            <th rowSpan="3" className="sticky sticky-col-6 bg-slate-800 border border-slate-700 p-2 text-center z-[60]">Qty PO</th>
                                            <th rowSpan="3" className="sticky sticky-col-7 bg-emerald-600 border border-emerald-500 p-2 text-center z-[60] freeze-border">Total Kedatangan</th>
                                            <th colSpan={daysInMonth.length * 2} className="border border-slate-700 p-2 text-center font-black bg-slate-900 tracking-[0.2em] italic text-xs">
                                                {monthLabel} {yearLabel}
                                            </th>
                                        </tr>
                                        {/* Row 2: Dates */}
                                        <tr className="bg-slate-50 text-slate-700 font-black">
                                            {daysInMonth.map(date => (
                                                <th key={date.toISOString()} colSpan="2" className="border border-slate-200 p-2 text-center text-sm min-w-[120px]">
                                                    {date.getDate()}
                                                </th>
                                            ))}
                                        </tr>
                                        {/* Row 3: Channels */}
                                        <tr className="bg-slate-100 uppercase">
                                            {daysInMonth.map(date => (
                                                <React.Fragment key={`sub-${date.toISOString()}`}>
                                                    <th className="border border-slate-200 p-1.5 text-center font-bold text-indigo-700 bg-indigo-50/50">ON</th>
                                                    <th className="border border-slate-200 p-1.5 text-center font-bold text-amber-700 bg-amber-50/50">OFF</th>
                                                </React.Fragment>
                                            ))}
                                        </tr>
                                    </thead>
                                    
                                    <tbody className="divide-y divide-slate-100">
                                        {articles.length === 0 ? (
                                            <tr>
                                                <td colSpan={7 + daysInMonth.length * 2} className="p-20 text-center text-slate-400 italic font-medium text-base">
                                                    Belum ada data artikel. Klik "Tambah Artikel" untuk memulai.
                                                </td>
                                            </tr>
                                        ) : articles.map((art, idx) => {
                                            const totalArrival = calculateTotalArrival(art.arrivals);
                                            const isCompleted = totalArrival >= art.qtyPo;
                                            const rowBg = idx % 2 === 0 ? 'bg-white' : 'bg-slate-50/40';
                                            
                                            return (
                                                <tr key={art.id} className={`${rowBg} hover:bg-indigo-50/40 transition-colors group`}>
                                                    {/* Sticky Cells (Frozen) */}
                                                    <td className={`sticky sticky-col-1 ${rowBg} group-hover:bg-indigo-50/60 p-1 text-center border border-slate-200 z-10`}>
                                                        <div className="flex flex-col gap-1 items-center">
                                                            <button onClick={() => openEdit(art)} className="text-blue-500 hover:bg-blue-100 p-1 rounded transition-colors">
                                                                <Icon name="pencil" size={14} />
                                                            </button>
                                                            <button onClick={() => handleDelete(art.id)} className="text-red-400 hover:bg-red-100 p-1 rounded transition-colors">
                                                                <Icon name="trash-2" size={14} />
                                                            </button>
                                                        </div>
                                                    </td>
                                                    <td className={`sticky sticky-col-2 ${rowBg} group-hover:bg-indigo-50/60 p-2 font-bold uppercase border border-slate-200 z-10 overflow-hidden text-ellipsis whitespace-nowrap`}>
                                                        {art.brand}
                                                    </td>
                                                    <td className={`sticky sticky-col-3 ${rowBg} group-hover:bg-indigo-50/60 p-2 font-semibold text-slate-700 border border-slate-200 z-10 overflow-hidden text-ellipsis whitespace-nowrap uppercase`}>
                                                        {art.artikel}
                                                    </td>
                                                    <td className={`sticky sticky-col-4 ${rowBg} group-hover:bg-indigo-50/60 p-2 text-slate-500 font-medium border border-slate-200 z-10 overflow-hidden text-ellipsis whitespace-nowrap uppercase`}>
                                                        {art.color}
                                                    </td>
                                                    <td className={`sticky sticky-col-5 ${rowBg} group-hover:bg-indigo-50/60 p-2 text-center font-mono font-bold text-slate-700 border border-slate-200 z-10`}>
                                                        {art.size}
                                                    </td>
                                                    <td className={`sticky sticky-col-6 ${rowBg} group-hover:bg-indigo-50/60 p-2 text-center font-bold text-slate-800 border border-slate-200 z-10`}>
                                                        {(art.qtyPo || 0).toLocaleString()}
                                                    </td>
                                                    <td className={`sticky sticky-col-7 ${isCompleted ? 'bg-emerald-50 text-emerald-700' : 'bg-indigo-50 text-indigo-800'} group-hover:bg-opacity-90 p-2 text-center font-black text-[13px] border border-slate-200 z-10 freeze-border`}>
                                                        {totalArrival.toLocaleString()}
                                                    </td>
                                                    
                                                    {/* Scrollable Input Cells */}
                                                    {daysInMonth.map(date => {
                                                        const dateKey = date.toISOString().split('T')[0];
                                                        return (
                                                            <React.Fragment key={`${art.id}-${dateKey}`}>
                                                                <td className="border border-slate-200 p-0 min-w-[60px]">
                                                                    <input 
                                                                        type="number" 
                                                                        className="w-full h-11 text-center bg-transparent focus:bg-white focus:ring-inset focus:ring-2 focus:ring-indigo-500 outline-none border-none transition-all font-bold text-indigo-700 placeholder-slate-200"
                                                                        value={art.arrivals?.[dateKey]?.online || ''}
                                                                        onChange={(e) => handleArrivalChange(art.id, dateKey, 'online', e.target.value)}
                                                                        placeholder="-"
                                                                    />
                                                                </td>
                                                                <td className="border border-slate-200 p-0 min-w-[60px]">
                                                                    <input 
                                                                        type="number" 
                                                                        className="w-full h-11 text-center bg-transparent focus:bg-white focus:ring-inset focus:ring-2 focus:ring-amber-500 outline-none border-none transition-all font-bold text-amber-700 placeholder-slate-200"
                                                                        value={art.arrivals?.[dateKey]?.offline || ''}
                                                                        onChange={(e) => handleArrivalChange(art.id, dateKey, 'offline', e.target.value)}
                                                                        placeholder="-"
                                                                    />
                                                                </td>
                                                            </React.Fragment>
                                                        );
                                                    })}
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* Modal Add/Edit */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden transform border border-white/20">
                                <div className="bg-indigo-600 p-8 text-white">
                                    <h3 className="text-2xl font-black flex items-center gap-3 italic uppercase tracking-tighter">
                                        <Icon name={editingArticle ? "edit" : "package"} size={24} /> 
                                        {editingArticle ? "Edit Artikel" : "Tambah Artikel"}
                                    </h3>
                                </div>
                                <div className="p-8 space-y-5 text-xs font-bold text-slate-500">
                                    <div className="space-y-1.5">
                                        <label className="uppercase ml-1">Brand</label>
                                        <input className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold uppercase" value={formData.brand} onChange={e => setFormData({...formData, brand: e.target.value.toUpperCase()})} />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="uppercase ml-1 text-indigo-600">Artikel</label>
                                        <input className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold uppercase" value={formData.artikel} onChange={e => setFormData({...formData, artikel: e.target.value.toUpperCase()})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1.5">
                                            <label className="uppercase ml-1">Warna</label>
                                            <input className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none" value={formData.color} onChange={e => setFormData({...formData, color: e.target.value.toUpperCase()})} />
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="uppercase ml-1">Size</label>
                                            <input className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-mono" value={formData.size} onChange={e => setFormData({...formData, size: e.target.value.toUpperCase()})} />
                                        </div>
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="uppercase ml-1 text-emerald-600">Quantity PO</label>
                                        <input type="number" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-black" value={formData.qtyPo} onChange={e => setFormData({...formData, qtyPo: parseInt(e.target.value) || 0})} />
                                    </div>
                                </div>
                                <div className="p-8 bg-slate-50 flex gap-4">
                                    <button onClick={closeModal} className="flex-1 p-4 bg-white border border-slate-200 rounded-2xl font-bold text-slate-500 hover:bg-slate-100 transition-colors uppercase tracking-widest text-[10px]">Batal</button>
                                    <button onClick={handleSaveArticle} className="flex-1 p-4 bg-indigo-600 text-white rounded-2xl font-black shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all uppercase tracking-widest text-[10px]">Simpan</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
