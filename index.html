<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Tracker 2026 - PT. NAD INTI DISTRIBUSI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .overflow-x-auto::-webkit-scrollbar { height: 8px; }
        .overflow-x-auto::-webkit-scrollbar-track { background: #f1f5f9; }
        .overflow-x-auto::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .overflow-x-auto::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .table-row-hover:hover td { background-color: #f8fafc !important; }
        .sticky-po { position: sticky; left: 0; background: white; z-index: 10; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // URL APPS SCRIPT TERBARU
        const SPREADSHEET_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwvv5Op0SHL3PODTm602j7g_KlgCiOO7AiZ3Pa1eppMEln6G_cGgJTURHQ4nQISLPUw/exec"; 

        const BRAND_LIST = ["HEYMALE", "PREPSTUDIO", "ZOMA BASIC", "HEYLOCAL", "SHUWA MODEST", "BOONABOO", "ANSHARIYA", "NOSTALGY"];
        const COLOR_LIST = ["ROSETTE", "SYCAMORE", "BLACK", "COLE", "BLUSH", "CLAY", "DAISY", "FLOYD", "GARNET", "JET BLACK", "POWDER", "IVORY", "BROWN", "NAVY", "GREY", "MIDNIGHT", "WHITE", "ASH GREY", "CARAMEL", "CASHMERE", "SAGE GREEN", "SAND", "VIOLET", "BUTTERSCOTCH", "CHARCOAL", "BEIGE", "COFFEE", "LIGHT TAUPE", "CREAM", "CANYON", "COASTAL", "LINEN", "ONYX", "PEONY", "ROYAL", "SEPHIA", "GOLD", "NUDE", "VANILLA", "LATTE", "BURGUNDY", "CHOCO", "TAUPE", "CORAL", "TEAL", "SAGE", "TERRACOTA", "GREIGE", "JADE", "PORCELAIN", "ROSEAT", "TRUFFLE", "FOREST", "LEAF", "SEASALT", "SUNDIAL", "STARLIGHT", "BLUE", "DENIM", "LIGHT GREY", "SKY BLUE", "ARMY", "DARK GREY", "MOCCA", "WINE", "DARK BLUE", "KELP", "OATMEAL", "DARK OLIVE", "MUSTARD", "OXIDE", "VERDIGN", "KHAKI", "RED WINE", "DARK BROWN", "FOREST GREEN", "GREEN", "MISTY", "PURPLE", "RED", "SEAGREEN", "YELLOW", "TAN", "CYAN", "LIGHT BLUE", "OLIVE", "STONE", "HAZELNUT", "ALL COLOUR", "DARK DENIM", "DARK CHOCO"];
        const SIZE_LIST = ["L", "XL", "LX", "S", "SX", "M", "ALL SIZE", "SQUARE", "MEDIUM", "36", "37", "38", "39", "40", "41", "MINI", "WALLET", "50 ML", "80 GR", "10 GR", "28", "29", "30", "31", "32", "33", "34", "115 CM", "6", "12", "8", "4", "10"];

        const toLocalDateString = (date) => {
            const d = new Date(date);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const SearchableDropdown = ({ label, options, value, onChange, placeholder }) => {
            const [search, setSearch] = useState('');
            const [isOpen, setIsOpen] = useState(false);
            const dropdownRef = useRef(null);
            const filteredOptions = useMemo(() => options.filter(opt => opt.toUpperCase().includes(search.toUpperCase())), [options, search]);

            useEffect(() => {
                const handleClickOutside = (e) => { if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setIsOpen(false); };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            return (
                <div className="relative" ref={dropdownRef}>
                    <label className="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 block">{label}</label>
                    <div className="w-full p-4 bg-slate-50 border rounded-2xl font-bold uppercase text-xs cursor-pointer flex justify-between items-center" onClick={() => setIsOpen(!isOpen)}>
                        <span className={value ? 'text-slate-900' : 'text-slate-400'}>{value || placeholder}</span>
                        <Icon name="chevron-down" size={14} className="text-slate-400" />
                    </div>
                    {isOpen && (
                        <div className="absolute top-full left-0 right-0 mt-2 bg-white border border-slate-200 rounded-2xl shadow-2xl z-[110] overflow-hidden animate-fade-in">
                            <div className="p-3 border-b bg-slate-50 sticky top-0">
                                <div className="relative">
                                    <Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input autoFocus className="w-full pl-9 pr-4 py-2 bg-white border border-slate-200 rounded-xl text-[10px] uppercase font-bold outline-none" placeholder="CARI..." value={search} onChange={(e) => setSearch(e.target.value)} />
                                </div>
                            </div>
                            <div className="max-h-[200px] overflow-y-auto custom-scrollbar">
                                {filteredOptions.map(opt => (
                                    <div key={opt} className="px-4 py-3 hover:bg-indigo-50 cursor-pointer text-[10px] font-black uppercase border-b border-slate-50" onClick={() => { onChange(opt); setIsOpen(false); setSearch(''); }}>{opt}</div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [dbStatus, setDbStatus] = useState('idle');
            // Menentukan bulan awal: Maret 2026
            const [currentDate, setCurrentDate] = useState(new Date(2026, 2, 1));
            const [articles, setArticles] = useState(() => {
                const saved = localStorage.getItem('inventory_data_2026_fixed');
                return saved ? JSON.parse(saved) : [];
            });

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isArrivalModalOpen, setIsArrivalModalOpen] = useState(false);
            const [formArticle, setFormArticle] = useState({ noPo: '', tglPo: '', brand: '', artikel: '', qtyPo: 0 });
            const [formArrival, setFormArrival] = useState({ targetPo: '', date: toLocalDateString(new Date()), color: '', size: '', online: 0, offline: 0 });

            // SINKRONISASI KE GOOGLE SHEETS
            const syncToSheets = async (latestData) => {
                if (!SPREADSHEET_WEB_APP_URL) return;
                setDbStatus('syncing');
                try {
                    const encodedData = encodeURIComponent(JSON.stringify(latestData));
                    const finalUrl = `${SPREADSHEET_WEB_APP_URL}?action=sync&data=${encodedData}`;
                    await fetch(finalUrl, { mode: 'no-cors' });
                    setDbStatus('connected');
                    setTimeout(() => setDbStatus('idle'), 3000);
                } catch (err) {
                    console.error("Sync Error:", err);
                    setDbStatus('error');
                }
            };

            useEffect(() => {
                localStorage.setItem('inventory_data_2026_fixed', JSON.stringify(articles));
            }, [articles]);

            const daysInMonth = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const date = new Date(year, month, 1);
                const days = [];
                while (date.getMonth() === month) {
                    days.push(new Date(date));
                    date.setDate(date.getDate() + 1);
                }
                return days;
            }, [currentDate]);

            const changeMonth = (offset) => {
                const newDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + offset, 1);
                setCurrentDate(newDate);
            };

            const calculateMetrics = (art) => {
                let online = 0, offline = 0;
                Object.values(art.arrivals || {}).forEach(d => {
                    online += (parseInt(d.online) || 0);
                    offline += (parseInt(d.offline) || 0);
                });
                const total = online + offline;
                const percentage = art.qtyPo > 0 ? (total / art.qtyPo) * 100 : 0;
                return { online, offline, total, percentage };
            };

            const handleSaveArticle = () => {
                if (!formArticle.noPo || !formArticle.brand || !formArticle.artikel) return;
                const newEntry = {
                    id: Date.now().toString(),
                    ...formArticle,
                    noPo: formArticle.noPo.toUpperCase(),
                    brand: formArticle.brand,
                    artikel: formArticle.artikel.toUpperCase(),
                    color: '-', 
                    size: '-',  
                    arrivals: {}
                };
                const updated = [...articles, newEntry];
                setArticles(updated);
                syncToSheets(updated);
                setIsModalOpen(false);
                setFormArticle({ noPo: '', tglPo: '', brand: '', artikel: '', qtyPo: 0 });
            };

            const handleUpdateArrival = () => {
                if (!formArrival.targetPo || !formArrival.color || !formArrival.size) return;
                const targetId = formArrival.targetPo;
                const articleToUpdate = articles.find(a => a.id === targetId);
                const inputColor = formArrival.color.toUpperCase();
                const inputSize = formArrival.size.toUpperCase();
                const arrivalDate = formArrival.date;

                let updatedArticles = [...articles];
                const existingIndex = articles.findIndex(a => a.noPo === articleToUpdate.noPo && a.artikel === articleToUpdate.artikel && a.color === inputColor && a.size === inputSize);

                if (existingIndex !== -1) {
                    const targetArt = { ...updatedArticles[existingIndex] };
                    const updatedArrivals = { ...targetArt.arrivals };
                    const existingDayData = updatedArrivals[arrivalDate] || { online: 0, offline: 0 };
                    updatedArrivals[arrivalDate] = { 
                        online: existingDayData.online + (parseInt(formArrival.online) || 0), 
                        offline: existingDayData.offline + (parseInt(formArrival.offline) || 0) 
                    };
                    updatedArticles[existingIndex] = { ...targetArt, arrivals: updatedArrivals };
                } else if (articleToUpdate.color === '-' && articleToUpdate.size === '-') {
                    updatedArticles = articles.map(art => art.id === targetId ? { 
                        ...art, 
                        color: inputColor, 
                        size: inputSize, 
                        arrivals: { [arrivalDate]: { online: parseInt(formArrival.online) || 0, offline: parseInt(formArrival.offline) || 0 } } 
                    } : art);
                } else {
                    const newEntry = { 
                        ...articleToUpdate, 
                        id: Date.now().toString(), 
                        color: inputColor, 
                        size: inputSize, 
                        arrivals: { [arrivalDate]: { online: parseInt(formArrival.online) || 0, offline: parseInt(formArrival.offline) || 0 } } 
                    };
                    updatedArticles = [...articles, newEntry];
                }
                
                setArticles(updatedArticles);
                syncToSheets(updatedArticles);
                setIsArrivalModalOpen(false);
                setFormArrival({ ...formArrival, color: '', size: '', online: 0, offline: 0 });
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-6 font-sans text-slate-900">
                    <div className="max-w-[98vw] mx-auto">
                        <div className="mb-6 flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-indigo-600 p-3 rounded-2xl shadow-lg text-white"><Icon name="package-check" size={28} /></div>
                                <div>
                                    <h1 className="text-2xl font-black uppercase tracking-tight leading-none mb-1 text-slate-800">Inventory Tracker 2026</h1>
                                    <p className="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em] flex items-center gap-2">
                                        PT. NAD INTI DISTRIBUSI 
                                        <span className={`px-2 py-0.5 rounded-full text-[8px] border transition-all ${dbStatus === 'connected' ? 'border-emerald-200 text-emerald-600 bg-emerald-50' : (dbStatus === 'syncing' ? 'border-indigo-200 text-indigo-600 bg-indigo-50 animate-pulse' : 'border-slate-200 text-slate-400')}`}>
                                            {dbStatus === 'syncing' ? 'MENGIRIM...' : dbStatus === 'connected' ? 'CLOUD SYNC OK' : 'LOCAL SAVED'}
                                        </span>
                                    </p>
                                </div>
                            </div>
                            
                            <div className="flex flex-wrap items-center gap-3">
                                {/* Navigasi Bulan */}
                                <div className="flex items-center bg-white p-1 rounded-xl border border-slate-200 shadow-sm mr-2">
                                    <button onClick={() => changeMonth(-1)} className="p-2 hover:bg-slate-100 rounded-lg text-slate-500"><Icon name="chevron-left" size={16}/></button>
                                    <span className="px-4 text-[10px] font-black uppercase text-slate-700 min-w-[120px] text-center">
                                        {currentDate.toLocaleString('id-ID', { month: 'long', year: 'numeric' })}
                                    </span>
                                    <button onClick={() => changeMonth(1)} className="p-2 hover:bg-slate-100 rounded-lg text-slate-500"><Icon name="chevron-right" size={16}/></button>
                                </div>

                                <div className="flex bg-white p-1 rounded-xl border border-slate-200 shadow-sm">
                                    <button onClick={() => setView('dashboard')} className={`px-6 py-2 rounded-lg text-[10px] font-black uppercase ${view === 'dashboard' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400'}`}>Kalender</button>
                                    <button onClick={() => setView('recap')} className={`px-6 py-2 rounded-lg text-[10px] font-black uppercase ${view === 'recap' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400'}`}>Rekap</button>
                                </div>
                                <button onClick={() => setIsModalOpen(true)} className="flex items-center gap-2 bg-white border-2 border-slate-800 text-slate-800 px-4 py-2.5 rounded-xl font-black text-[10px] uppercase hover:bg-slate-50 transition-colors">
                                    <Icon name="plus" size={14} /> Master PO
                                </button>
                                <button onClick={() => setIsArrivalModalOpen(true)} className="flex items-center gap-2 bg-indigo-600 text-white px-4 py-2.5 rounded-xl font-black shadow-lg text-[10px] uppercase hover:bg-indigo-700 transition-colors">
                                    <Icon name="truck" size={14} /> Input Arrival
                                </button>
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden animate-fade-in">
                            <div className="overflow-x-auto max-h-[70vh]">
                                <table className="w-full border-collapse text-[10px]">
                                    <thead className="sticky top-0 z-30">
                                        <tr className="bg-slate-800 text-white uppercase">
                                            <th rowSpan="3" className="w-32 border border-slate-700 p-3 sticky-po bg-slate-800">No. PO</th>
                                            <th rowSpan="3" className="w-28 border border-slate-700 p-3 bg-slate-800">Tgl PO</th>
                                            <th rowSpan="3" className="w-32 border border-slate-700 p-3 bg-slate-800">Brand</th>
                                            <th rowSpan="3" className="w-40 border border-slate-700 p-3 bg-slate-800">Artikel</th>
                                            <th rowSpan="3" className="w-32 border border-slate-700 p-3 bg-slate-800">Color</th>
                                            <th rowSpan="3" className="w-16 border border-slate-700 p-3 bg-slate-800">Size</th>
                                            <th rowSpan="3" className="w-20 border border-slate-700 p-3 bg-slate-800">Qty PO</th>
                                            {view === 'dashboard' ? (
                                                <th colSpan={daysInMonth.length * 2} className="border border-slate-700 p-2 text-center bg-slate-900">
                                                    Arrival {currentDate.toLocaleString('id-ID', { month: 'long', year: 'numeric' })}
                                                </th>
                                            ) : (
                                                <>
                                                    <th rowSpan="3" className="border border-slate-700 p-3 bg-indigo-900">Online</th>
                                                    <th rowSpan="3" className="border border-slate-700 p-3 bg-amber-900">Offline</th>
                                                    <th rowSpan="3" className="border border-slate-700 p-3 bg-emerald-800">Total</th>
                                                    <th rowSpan="3" className="border border-slate-700 p-3 bg-rose-900">Sisa</th>
                                                    <th rowSpan="3" className="border border-slate-700 p-3 bg-slate-900">%</th>
                                                </>
                                            )}
                                        </tr>
                                        {view === 'dashboard' && (
                                            <>
                                                <tr className="bg-slate-100 text-slate-700 font-black">
                                                    {daysInMonth.map(date => <th key={date.toISOString()} colSpan="2" className="border border-slate-200 p-1 text-center">{date.getDate()}</th>)}
                                                </tr>
                                                <tr className="bg-slate-50 text-[8px] font-black">
                                                    {daysInMonth.map(date => (
                                                        <React.Fragment key={`h-${date.toISOString()}`}>
                                                            <th className="border border-slate-200 p-1 text-indigo-600">ON</th>
                                                            <th className="border border-slate-200 p-1 text-amber-600">OFF</th>
                                                        </React.Fragment>
                                                    ))}
                                                </tr>
                                            </>
                                        )}
                                    </thead>
                                    <tbody>
                                        {articles.length === 0 ? (
                                            <tr>
                                                <td colSpan="100" className="p-20 text-center text-slate-300 font-black uppercase tracking-widest">Belum ada data artikel</td>
                                            </tr>
                                        ) : (
                                            articles.map((art) => {
                                                const m = calculateMetrics(art);
                                                return (
                                                    <tr key={art.id} className="table-row-hover">
                                                        <td className="border border-slate-200 p-3 font-bold sticky-po">{art.noPo}</td>
                                                        <td className="border border-slate-200 p-3 text-center">{art.tglPo || '-'}</td>
                                                        <td className="border border-slate-200 p-3 uppercase">{art.brand}</td>
                                                        <td className="border border-slate-200 p-3 uppercase font-black">{art.artikel}</td>
                                                        <td className="border border-slate-200 p-3 text-center uppercase text-slate-500 font-bold">{art.color}</td>
                                                        <td className="border border-slate-200 p-3 text-center font-black">{art.size}</td>
                                                        <td className="border border-slate-200 p-3 text-center font-bold bg-slate-50">{art.qtyPo}</td>
                                                        {view === 'dashboard' ? (
                                                            daysInMonth.map(date => {
                                                                const d = art.arrivals[toLocalDateString(date)] || { online: 0, offline: 0 };
                                                                return (
                                                                    <React.Fragment key={`${art.id}-${date}`}>
                                                                        <td className="border border-slate-100 p-1 text-center font-bold text-indigo-600">{d.online || ''}</td>
                                                                        <td className="border border-slate-100 p-1 text-center font-bold text-amber-600">{d.offline || ''}</td>
                                                                    </React.Fragment>
                                                                );
                                                            })
                                                        ) : (
                                                            <>
                                                                <td className="border border-slate-200 p-3 text-center text-indigo-700">{m.online}</td>
                                                                <td className="border border-slate-200 p-3 text-center text-amber-700">{m.offline}</td>
                                                                <td className="border border-slate-200 p-3 text-center bg-emerald-50 font-black">{m.total}</td>
                                                                <td className="border border-slate-200 p-3 text-center font-black text-rose-600 bg-rose-50">{art.qtyPo - m.total}</td>
                                                                <td className="border border-slate-200 p-3 text-center font-black">{m.percentage.toFixed(1)}%</td>
                                                            </>
                                                        )}
                                                    </tr>
                                                );
                                            })
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* MODAL MASTER PO */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-xl overflow-hidden animate-fade-in">
                                <div className="bg-indigo-600 p-6 text-white flex justify-between items-center">
                                    <h3 className="text-xl font-black uppercase">Tambah Master PO Baru</h3>
                                    <button onClick={() => setIsModalOpen(false)}><Icon name="x" size={24} /></button>
                                </div>
                                <div className="p-8 grid grid-cols-2 gap-5">
                                    <div className="col-span-1">
                                        <label className="text-[9px] font-black uppercase text-slate-400 ml-2">No. PO</label>
                                        <input placeholder="PO-XXXX" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold uppercase outline-indigo-600" value={formArticle.noPo} onChange={e => setFormArticle({...formArticle, noPo: e.target.value})} />
                                    </div>
                                    <div className="col-span-1">
                                        <label className="text-[9px] font-black uppercase text-slate-400 ml-2">Tgl PO</label>
                                        <input type="date" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-indigo-600" value={formArticle.tglPo} onChange={e => setFormArticle({...formArticle, tglPo: e.target.value})} />
                                    </div>
                                    <div className="col-span-2">
                                        <SearchableDropdown label="Brand" options={BRAND_LIST} value={formArticle.brand} onChange={v => setFormArticle({...formArticle, brand: v})} placeholder="PILIH BRAND" />
                                    </div>
                                    <div className="col-span-2">
                                        <label className="text-[9px] font-black uppercase text-slate-400 ml-2">Nama Artikel</label>
                                        <input placeholder="ARTIKEL" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold uppercase outline-indigo-600" value={formArticle.artikel} onChange={e => setFormArticle({...formArticle, artikel: e.target.value})} />
                                    </div>
                                    <div className="col-span-2">
                                        <label className="text-[9px] font-black uppercase text-slate-400 ml-2">Qty Target</label>
                                        <input type="number" className="w-full p-4 bg-emerald-50 border rounded-2xl font-black text-emerald-700 outline-emerald-600" value={formArticle.qtyPo || ''} onChange={e => setFormArticle({...formArticle, qtyPo: parseInt(e.target.value) || 0})} />
                                    </div>
                                    <button onClick={handleSaveArticle} className="col-span-2 p-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-[10px] mt-4 hover:bg-indigo-700 shadow-lg transition-all">Simpan Master & Sync</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL KEDATANGAN */}
                    {isArrivalModalOpen && (
                        <div className="fixed inset-0 bg-indigo-900/40 backdrop-blur-md flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden animate-fade-in">
                                <div className="p-6 border-b flex justify-between items-center text-indigo-600 font-black uppercase text-xs">
                                    <span>Input Detail Kedatangan</span>
                                    <button onClick={() => setIsArrivalModalOpen(false)}><Icon name="x" size={20} /></button>
                                </div>
                                <div className="p-8 space-y-4">
                                    <label className="text-[9px] font-black uppercase text-slate-400 ml-2">Pilih Master PO</label>
                                    <select className="w-full p-4 bg-indigo-50 border border-indigo-100 rounded-2xl font-black text-xs outline-indigo-600" value={formArrival.targetPo} onChange={e => setFormArrival({...formArrival, targetPo: e.target.value})}>
                                        <option value="">-- PILIH ARTIKEL --</option>
                                        {articles.map(a => <option key={a.id} value={a.id}>{a.noPo} - {a.artikel}</option>)}
                                    </select>
                                    <div className="grid grid-cols-2 gap-4">
                                        <SearchableDropdown label="Warna" options={COLOR_LIST} value={formArrival.color} onChange={v => setFormArrival({...formArrival, color: v})} placeholder="WARNA" />
                                        <SearchableDropdown label="Size" options={SIZE_LIST} value={formArrival.size} onChange={v => setFormArrival({...formArrival, size: v})} placeholder="SIZE" />
                                    </div>
                                    <label className="text-[9px] font-black uppercase text-slate-400 ml-2 block">Tgl Kedatangan</label>
                                    <input type="date" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-indigo-600" value={formArrival.date} onChange={e => setFormArrival({...formArrival, date: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[8px] font-black text-indigo-400 ml-2">QTY ONLINE</label>
                                            <input type="number" placeholder="ONLINE" className="w-full p-4 border-2 border-indigo-50 rounded-2xl font-black text-center outline-indigo-600" value={formArrival.online || ''} onChange={e => setFormArrival({...formArrival, online: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-[8px] font-black text-amber-400 ml-2">QTY OFFLINE</label>
                                            <input type="number" placeholder="OFFLINE" className="w-full p-4 border-2 border-amber-50 rounded-2xl font-black text-center outline-amber-600" value={formArrival.offline || ''} onChange={e => setFormArrival({...formArrival, offline: e.target.value})} />
                                        </div>
                                    </div>
                                    <button onClick={handleUpdateArrival} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-[10px] mt-4 hover:bg-indigo-700 shadow-lg">Simpan Kedatangan & Sync</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
