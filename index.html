<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Tracker 2026 - GitHub Ready</title>
    <!-- Tailwind CSS untuk styling cepat dan modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .overflow-x-auto::-webkit-scrollbar { height: 8px; }
        .overflow-x-auto::-webkit-scrollbar-track { background: #f1f5f9; }
        .overflow-x-auto::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        /* Definisi Lebar Kolom Sticky (dalam pixel) */
        :root {
            --w-aksi: 50px;
            --w-brand: 100px;
            --w-artikel: 160px;
            --w-color: 120px;
            --w-size: 60px;
            --w-qtypo: 80px;
            --w-total: 100px;
        }

        /* Kelas Sticky Custom untuk membekukan kolom */
        .sticky-col { position: sticky !important; z-index: 20; }
        .sticky-col-1 { left: 0; width: var(--w-aksi); }
        .sticky-col-2 { left: var(--w-aksi); width: var(--w-brand); }
        .sticky-col-3 { left: calc(var(--w-aksi) + var(--w-brand)); width: var(--w-artikel); }
        .sticky-col-4 { left: calc(var(--w-aksi) + var(--w-brand) + var(--w-artikel)); width: var(--w-color); }
        .sticky-col-5 { left: calc(var(--w-aksi) + var(--w-brand) + var(--w-artikel) + var(--w-color)); width: var(--w-size); }
        .sticky-col-6 { left: calc(var(--w-aksi) + var(--w-brand) + var(--w-artikel) + var(--w-color) + var(--w-size)); width: var(--w-qtypo); }
        .sticky-col-7 { left: calc(var(--w-aksi) + var(--w-brand) + var(--w-artikel) + var(--w-color) + var(--w-size) + var(--w-qtypo)); width: var(--w-total); border-right: 3px solid #cbd5e1 !important; }

        thead th.sticky-header { position: sticky; top: 0; z-index: 50; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div class="min-h-screen p-4 md:p-6">
        <div class="max-w-full mx-auto">
            
            <!-- Header -->
            <div class="mb-6 flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                <div class="flex items-center gap-4">
                    <div class="bg-indigo-600 p-3 rounded-2xl shadow-lg text-white">
                        <i data-lucide="layout-dashboard" size="28"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-black uppercase tracking-tight">Inventory Tracker 2026</h1>
                        <p class="text-slate-500 text-sm font-medium italic underline decoration-indigo-200">READY FOR GITHUB PAGES</p>
                    </div>
                </div>
                
                <div class="flex flex-wrap items-center gap-4">
                    <div class="flex items-center bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                        <button onclick="changeMonth(-1)" class="p-2.5 hover:bg-slate-50 transition-colors border-r border-slate-200 text-slate-600">
                            <i data-lucide="chevron-left"></i>
                        </button>
                        <div id="monthDisplay" class="px-6 py-2 font-bold text-slate-700 min-w-[160px] text-center uppercase tracking-wider">
                            MARET 2026
                        </div>
                        <button onclick="changeMonth(1)" class="p-2.5 hover:bg-slate-50 transition-colors border-l border-slate-200 text-slate-600">
                            <i data-lucide="chevron-right"></i>
                        </button>
                    </div>
                    
                    <button onclick="openModal()" class="flex items-center gap-2 bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg uppercase text-sm">
                        <i data-lucide="plus" size="18"></i> Tambah Artikel
                    </button>
                </div>
            </div>

            <!-- Table Container -->
            <div class="bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto max-h-[75vh]">
                    <table class="w-full border-collapse text-[11px] table-fixed min-w-max" id="inventoryTable">
                        <thead id="tableHeader">
                            <!-- Header akan diisi oleh JavaScript -->
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100">
                            <!-- Body akan diisi oleh JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Form -->
    <div id="formModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden transform border border-white/20">
            <div class="bg-indigo-600 p-6 text-white">
                <h3 id="modalTitle" class="text-xl font-black flex items-center gap-3 italic uppercase tracking-tighter">
                    Tambah Artikel
                </h3>
            </div>
            <form id="articleForm" class="p-6 space-y-4">
                <input type="hidden" id="editId">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold uppercase text-slate-400">Brand</label>
                    <input type="text" id="brand" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold uppercase">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold uppercase text-slate-400">Artikel</label>
                    <input type="text" id="artikel" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold uppercase text-indigo-600">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold uppercase text-slate-400">Warna</label>
                        <input type="text" id="color" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none uppercase">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold uppercase text-slate-400">Size</label>
                        <input type="text" id="size" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-mono uppercase">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold uppercase text-slate-400">Quantity PO</label>
                    <input type="number" id="qtyPo" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-black text-emerald-600">
                </div>
                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeModal()" class="flex-1 p-3 bg-slate-100 border border-slate-200 rounded-xl font-bold text-slate-500 hover:bg-slate-200 transition-colors uppercase text-[10px]">Batal</button>
                    <button type="submit" class="flex-1 p-3 bg-indigo-600 text-white rounded-xl font-black hover:bg-indigo-700 transition-all uppercase text-[10px] shadow-lg shadow-indigo-100">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // State Management
        let articles = JSON.parse(localStorage.getItem('inventory_github_2026')) || [];
        let currentDate = new Date(2026, 2, 1); // Default Maret 2026

        // Initialize Icons
        function refreshIcons() {
            if (window.lucide) window.lucide.createIcons();
        }

        // UI Functions
        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            render();
        }

        function openModal(id = null) {
            const modal = document.getElementById('formModal');
            const title = document.getElementById('modalTitle');
            const form = document.getElementById('articleForm');
            
            modal.classList.remove('hidden');
            if (id) {
                const art = articles.find(a => a.id == id);
                title.innerText = 'Edit Artikel';
                document.getElementById('editId').value = art.id;
                document.getElementById('brand').value = art.brand;
                document.getElementById('artikel').value = art.artikel;
                document.getElementById('color').value = art.color;
                document.getElementById('size').value = art.size;
                document.getElementById('qtyPo').value = art.qtyPo;
            } else {
                title.innerText = 'Tambah Artikel';
                form.reset();
                document.getElementById('editId').value = '';
            }
        }

        function closeModal() {
            document.getElementById('formModal').classList.add('hidden');
        }

        function deleteArticle(id) {
            if (confirm('Hapus artikel ini?')) {
                articles = articles.filter(a => a.id != id);
                saveAndRender();
            }
        }

        function updateArrival(articleId, dateKey, type, value) {
            const qty = parseInt(value) || 0;
            articles = articles.map(art => {
                if (art.id == articleId) {
                    if (!art.arrivals) art.arrivals = {};
                    if (!art.arrivals[dateKey]) art.arrivals[dateKey] = { online: 0, offline: 0 };
                    art.arrivals[dateKey][type] = qty;
                }
                return art;
            });
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('inventory_github_2026', JSON.stringify(articles));
            render();
        }

        function render() {
            const monthLabel = currentDate.toLocaleString('id-ID', { month: 'long' }).toUpperCase();
            const yearLabel = currentDate.getFullYear();
            document.getElementById('monthDisplay').innerText = `${monthLabel} ${yearLabel}`;

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const date = new Date(year, month, 1);
            const days = [];
            while (date.getMonth() === month) {
                days.push(new Date(date));
                date.setDate(date.getDate() + 1);
            }

            // Render Header
            let headerHtml = `
                <tr class="bg-slate-800 text-white uppercase">
                    <th rowSpan="3" class="sticky-col sticky-col-1 sticky-header bg-slate-800 border border-slate-700 p-2 text-center">Aksi</th>
                    <th rowSpan="3" class="sticky-col sticky-col-2 sticky-header bg-slate-800 border border-slate-700 p-2 text-center">Brand</th>
                    <th rowSpan="3" class="sticky-col sticky-col-3 sticky-header bg-slate-800 border border-slate-700 p-2 text-center">Artikel</th>
                    <th rowSpan="3" class="sticky-col sticky-col-4 sticky-header bg-slate-800 border border-slate-700 p-2 text-center">Color</th>
                    <th rowSpan="3" class="sticky-col sticky-col-5 sticky-header bg-slate-800 border border-slate-700 p-2 text-center">Size</th>
                    <th rowSpan="3" class="sticky-col sticky-col-6 sticky-header bg-slate-800 border border-slate-700 p-2 text-center">Qty PO</th>
                    <th rowSpan="3" class="sticky-col sticky-col-7 sticky-header bg-emerald-600 border border-emerald-500 p-2 text-center">Total</th>
                    <th colSpan="${days.length * 2}" class="border border-slate-700 p-2 text-center font-black bg-slate-900 tracking-widest italic text-xs">
                        KALENDER KEDATANGAN - ${monthLabel}
                    </th>
                </tr>
                <tr class="bg-slate-50 text-slate-700 font-black">
                    ${days.map(d => `<th colSpan="2" class="border border-slate-200 p-2 text-center text-sm min-w-[100px] sticky-header top-[35px] bg-slate-50">${d.getDate()}</th>`).join('')}
                </tr>
                <tr class="bg-slate-100 uppercase sticky-header top-[71px]">
                    ${days.map(d => `
                        <th class="border border-slate-200 p-1.5 text-center font-bold text-indigo-700 bg-indigo-50/50">ON</th>
                        <th class="border border-slate-200 p-1.5 text-center font-bold text-amber-700 bg-amber-50/50">OFF</th>
                    `).join('')}
                </tr>
            `;
            document.getElementById('tableHeader').innerHTML = headerHtml;

            // Render Body
            let bodyHtml = '';
            if (articles.length === 0) {
                bodyHtml = `<tr><td colspan="${7 + days.length * 2}" class="p-20 text-center text-slate-400 italic">Klik tombol "Tambah Artikel" untuk mengisi data pertama Anda.</td></tr>`;
            } else {
                articles.forEach((art, idx) => {
                    let totalArrival = 0;
                    if (art.arrivals) {
                        Object.values(art.arrivals).forEach(day => {
                            totalArrival += (day.online || 0) + (day.offline || 0);
                        });
                    }

                    const isCompleted = totalArrival >= art.qtyPo;
                    const rowBg = idx % 2 === 0 ? 'bg-white' : 'bg-slate-50/40';

                    bodyHtml += `
                        <tr class="${rowBg} hover:bg-indigo-50/40 transition-colors group">
                            <td class="sticky-col sticky-col-1 ${rowBg} group-hover:bg-indigo-50/60 p-1 border border-slate-200 text-center">
                                <div class="flex flex-col gap-1 items-center">
                                    <button onclick="openModal(${art.id})" class="text-blue-500 hover:bg-blue-100 p-1 rounded"><i data-lucide="pencil" size="14"></i></button>
                                    <button onclick="deleteArticle(${art.id})" class="text-red-400 hover:bg-red-100 p-1 rounded"><i data-lucide="trash-2" size="14"></i></button>
                                </div>
                            </td>
                            <td class="sticky-col sticky-col-2 ${rowBg} group-hover:bg-indigo-50/60 p-2 font-bold uppercase border border-slate-200 overflow-hidden text-ellipsis whitespace-nowrap">${art.brand}</td>
                            <td class="sticky-col sticky-col-3 ${rowBg} group-hover:bg-indigo-50/60 p-2 font-bold text-slate-700 border border-slate-200 uppercase">${art.artikel}</td>
                            <td class="sticky-col sticky-col-4 ${rowBg} group-hover:bg-indigo-50/60 p-2 text-slate-500 border border-slate-200 uppercase">${art.color}</td>
                            <td class="sticky-col sticky-col-5 ${rowBg} group-hover:bg-indigo-50/60 p-2 text-center font-mono font-bold border border-slate-200">${art.size}</td>
                            <td class="sticky-col sticky-col-6 ${rowBg} group-hover:bg-indigo-50/60 p-2 text-center font-black border border-slate-200">${art.qtyPo.toLocaleString()}</td>
                            <td class="sticky-col sticky-col-7 ${isCompleted ? 'bg-emerald-50 text-emerald-700' : 'bg-indigo-50 text-indigo-800'} p-2 text-center font-black text-xs border border-slate-200">${totalArrival.toLocaleString()}</td>
                            
                            ${days.map(d => {
                                const dKey = d.toISOString().split('T')[0];
                                const onVal = art.arrivals?.[dKey]?.online || '';
                                const offVal = art.arrivals?.[dKey]?.offline || '';
                                return `
                                    <td class="border border-slate-200 p-0">
                                        <input type="number" onchange="updateArrival(${art.id}, '${dKey}', 'online', this.value)" value="${onVal}" class="w-full h-10 text-center bg-transparent focus:bg-white outline-none font-bold text-indigo-700" placeholder="-">
                                    </td>
                                    <td class="border border-slate-200 p-0">
                                        <input type="number" onchange="updateArrival(${art.id}, '${dKey}', 'offline', this.value)" value="${offVal}" class="w-full h-10 text-center bg-transparent focus:bg-white outline-none font-bold text-amber-700" placeholder="-">
                                    </td>
                                `;
                            }).join('')}
                        </tr>
                    `;
                });
            }
            document.getElementById('tableBody').innerHTML = bodyHtml;
            refreshIcons();
        }

        // Form Submit
        document.getElementById('articleForm').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const data = {
                brand: document.getElementById('brand').value.toUpperCase(),
                artikel: document.getElementById('artikel').value.toUpperCase(),
                color: document.getElementById('color').value.toUpperCase(),
                size: document.getElementById('size').value.toUpperCase(),
                qtyPo: parseInt(document.getElementById('qtyPo').value) || 0
            };

            if (id) {
                articles = articles.map(a => a.id == id ? { ...a, ...data } : a);
            } else {
                articles.push({ ...data, id: Date.now(), arrivals: {} });
            }
            
            saveAndRender();
            closeModal();
        };

        // Initial Load
        window.onload = render;
    </script>
</body>
</html>
