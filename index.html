<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Tracker 2026 - PT. NAD INTI DISTRIBUSI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .overflow-x-auto::-webkit-scrollbar { height: 8px; }
        .overflow-x-auto::-webkit-scrollbar-track { background: #f1f5f9; }
        .overflow-x-auto::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .overflow-x-auto::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .table-row-hover:hover td { background-color: #f8fafc !important; }
        .sticky-po { position: sticky; left: 0; background: white; z-index: 10; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useMemo, useEffect, useRef } = React;

        const BRAND_LIST = ["HEYMALE", "PREPSTUDIO", "ZOMA BASIC", "HEYLOCAL", "SHUWA MODEST", "BOONABOO", "ANSHARIYA", "NOSTALGY"];
        const COLOR_LIST = ["ROSETTE", "SYCAMORE", "BLACK", "COLE", "BLUSH", "CLAY", "DAISY", "FLOYD", "GARNET", "JET BLACK", "POWDER", "IVORY", "BROWN", "MAROON", "NAVY", "GREY", "WHITE", "ASH GREY", "CARAMEL", "CASHMERE", "SAGE GREEN", "SAND", "CHARCOAL", "OAT", "BEIGE", "COFFEE", "CREAM", "ONYX", "PEONY", "GOLD", "VANILLA", "LATTE", "BURGUNDY", "CHOCO", "TAUPE", "CORAL", "TEAL", "SAGE", "TERRACOTA", "GREIGE", "JADE", "FOREST", "BLUE", "DENIM", "ARMY", "MOCCA", "WINE", "OATMEAL", "MUSTARD", "KHAKI", "PURPLE", "RED", "TAN", "OFF WHITE", "DEEP TAUPE", "BROKEN WHITE"];
        const SIZE_LIST = ["L", "XL", "S", "M", "ALL SIZE", "SQUARE", "MEDIUM", "36", "37", "38", "39", "40", "41", "MINI", "WALLET", "28", "29", "30", "31", "32", "33", "34"];

        const toLocalDateString = (date) => {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const SearchableDropdown = ({ label, options, value, onChange, placeholder }) => {
            const [search, setSearch] = useState('');
            const [isOpen, setIsOpen] = useState(false);
            const dropdownRef = useRef(null);
            const filteredOptions = useMemo(() => options.filter(opt => opt.toUpperCase().includes(search.toUpperCase())), [options, search]);

            useEffect(() => {
                const handleClickOutside = (e) => { if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setIsOpen(false); };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            return (
                <div className="relative" ref={dropdownRef}>
                    <label className="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 block">{label}</label>
                    <div className="w-full p-4 bg-slate-50 border rounded-2xl font-bold uppercase text-xs cursor-pointer flex justify-between items-center" onClick={() => setIsOpen(!isOpen)}>
                        <span className={value ? 'text-slate-900' : 'text-slate-400'}>{value || placeholder}</span>
                        <Icon name="chevron-down" size={14} className="text-slate-400" />
                    </div>
                    {isOpen && (
                        <div className="absolute top-full left-0 right-0 mt-2 bg-white border border-slate-200 rounded-2xl shadow-2xl z-[110] overflow-hidden animate-fade-in">
                            <div className="p-3 border-b bg-slate-50 sticky top-0">
                                <input autoFocus className="w-full px-4 py-2 bg-white border rounded-xl text-[10px] uppercase font-bold outline-none" placeholder="CARI..." value={search} onChange={(e) => setSearch(e.target.value)} />
                            </div>
                            <div className="max-h-[200px] overflow-y-auto custom-scrollbar">
                                {filteredOptions.map(opt => (
                                    <div key={opt} className="px-4 py-3 hover:bg-indigo-50 cursor-pointer text-[10px] font-black uppercase border-b border-slate-50 last:border-0" onClick={() => { onChange(opt); setIsOpen(false); setSearch(''); }}>{opt}</div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [articles, setArticles] = useState([]);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('dashboard');
            const [filterBrand, setFilterBrand] = useState('');
            const [filterArtikel, setFilterArtikel] = useState('');
            const [currentDate, setCurrentDate] = useState(new Date(2026, 2, 1)); 
            
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [isArrivalModalOpen, setIsArrivalModalOpen] = useState(false);

            const [formArticle, setFormArticle] = useState({ noPo: '', tglPo: '', brand: '', artikel: '', qtyPo: 0 });
            const [editData, setEditData] = useState(null);
            const [formArrival, setFormArrival] = useState({ targetPoId: '', date: toLocalDateString(new Date()), color: '', size: '', online: 0, offline: 0 });

            const dbRef = useRef(null);
            const authRef = useRef(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'inventory-tracker-v1';

            // ATURAN 3: Inisialisasi Auth & Firebase
            useEffect(() => {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                authRef.current = getAuth(app);
                dbRef.current = getFirestore(app);

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(authRef.current, __initial_auth_token);
                        } else {
                            await signInAnonymously(authRef.current);
                        }
                    } catch (e) { 
                        console.error("Auth Error:", e);
                        setLoading(false);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(authRef.current, (u) => {
                    setUser(u);
                    if (!u) setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // ATURAN 1 & 2: Fetching Data dengan Path yang Benar
            useEffect(() => {
                if (!user || !dbRef.current) return;
                
                // Menggunakan path /artifacts/{appId}/public/data/inventory
                const inventoryCol = collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'inventory');
                const q = query(inventoryCol);
                
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    setArticles(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setLoading(false);
                }, (error) => {
                    console.error("Firestore Error:", error);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            const daysInMonth = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const date = new Date(year, month, 1);
                const days = [];
                while (date.getMonth() === month) { days.push(new Date(date)); date.setDate(date.getDate() + 1); }
                return days;
            }, [currentDate]);

            const filteredArticles = useMemo(() => {
                return articles.filter(art => {
                    const matchBrand = !filterBrand || art.brand === filterBrand;
                    const matchArtikel = !filterArtikel || (art.artikel && art.artikel.toUpperCase().includes(filterArtikel.toUpperCase()));
                    return matchBrand && matchArtikel;
                });
            }, [articles, filterBrand, filterArtikel]);

            const handleSaveArticle = async () => {
                if (!user || !formArticle.noPo || !formArticle.brand || !formArticle.artikel) return;
                const newId = Date.now().toString();
                try {
                    await setDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'inventory', newId), {
                        ...formArticle,
                        noPo: formArticle.noPo.toUpperCase(),
                        artikel: formArticle.artikel.toUpperCase(),
                        color: '-', size: '-', arrivals: {}
                    });
                    setIsModalOpen(false);
                    setFormArticle({ noPo: '', tglPo: '', brand: '', artikel: '', qtyPo: 0 });
                } catch (e) { console.error("Save Error:", e); }
            };

            const handleUpdateArticle = async () => {
                if (!user || !editData) return;
                try {
                    await updateDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'inventory', editData.id), {
                        ...editData,
                        noPo: editData.noPo.toUpperCase(),
                        artikel: editData.artikel.toUpperCase()
                    });
                    setIsEditModalOpen(false);
                } catch (e) { console.error("Update Error:", e); }
            };

            const handleDeleteArticle = async (id) => {
                if (!user) return;
                try {
                    await deleteDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'inventory', id));
                } catch (e) { console.error("Delete Error:", e); }
            };

            const handleUpdateArrival = async () => {
                if (!user || !formArrival.targetPoId || !formArrival.color || !formArrival.size) return;
                try {
                    const parentArt = articles.find(a => a.id === formArrival.targetPoId);
                    const inputColor = formArrival.color.toUpperCase();
                    const inputSize = formArrival.size.toUpperCase();
                    
                    const existingVarian = articles.find(a => 
                        a.noPo === parentArt.noPo && a.artikel === parentArt.artikel && 
                        a.color === inputColor && a.size === inputSize
                    );

                    const targetDocId = existingVarian ? existingVarian.id : (parentArt.color === '-' ? parentArt.id : Date.now().toString());
                    const targetData = existingVarian || (parentArt.color === '-' ? parentArt : { ...parentArt, color: inputColor, size: inputSize, arrivals: {} });
                    
                    const updatedArrivals = { ...(targetData.arrivals || {}) };
                    const dateKey = formArrival.date;
                    const currentDay = updatedArrivals[dateKey] || { online: 0, offline: 0 };
                    
                    updatedArrivals[dateKey] = {
                        online: (Number(currentDay.online) || 0) + (Number(formArrival.online) || 0),
                        offline: (Number(currentDay.offline) || 0) + (Number(formArrival.offline) || 0)
                    };

                    await setDoc(doc(dbRef.current, 'artifacts', appId, 'public', 'data', 'inventory', targetDocId), {
                        ...targetData,
                        id: targetDocId,
                        color: inputColor,
                        size: inputSize,
                        arrivals: updatedArrivals
                    });

                    setIsArrivalModalOpen(false);
                    setFormArrival({ ...formArrival, color: '', size: '', online: 0, offline: 0 });
                } catch (e) { console.error("Arrival Error:", e); }
            };

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
                    <div className="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="font-black text-[10px] uppercase tracking-widest text-slate-400">Menyambungkan ke Sistem Cloud...</p>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-6 text-slate-900">
                    <div className="max-w-[98vw] mx-auto">
                        
                        {/* HEADER */}
                        <div className="mb-6 flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-indigo-600 p-3 rounded-2xl shadow-lg text-white"><Icon name="package-check" size={28} /></div>
                                <div>
                                    <h1 className="text-2xl font-black uppercase tracking-tight leading-none mb-1">Inventory Tracker 2026</h1>
                                    <p className="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em]">PT. NAD INTI DISTRIBUSI</p>
                                </div>
                            </div>
                            <div className="flex flex-wrap items-center gap-3">
                                <div className="flex bg-white p-1 rounded-xl border border-slate-200 shadow-sm">
                                    <button onClick={() => setView('dashboard')} className={`px-6 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${view === 'dashboard' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-600'}`}>Kalender</button>
                                    <button onClick={() => setView('recap')} className={`px-6 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${view === 'recap' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-600'}`}>Rekap</button>
                                </div>
                                <div className="flex items-center bg-white border rounded-xl overflow-hidden shadow-sm">
                                    <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1))} className="p-2 border-r hover:bg-slate-50"><Icon name="chevron-left" size={16}/></button>
                                    <div className="px-4 font-black text-[10px] uppercase min-w-[140px] text-center">{currentDate.toLocaleString('id-ID', { month: 'long', year: 'numeric' })}</div>
                                    <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1))} className="p-2 border-l hover:bg-slate-50"><Icon name="chevron-right" size={16}/></button>
                                </div>
                                <button onClick={() => setIsModalOpen(true)} className="bg-white border-2 border-slate-800 text-slate-800 px-4 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-slate-800 hover:text-white transition-all">+ Master</button>
                                <button onClick={() => setIsArrivalModalOpen(true)} className="bg-indigo-600 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg hover:bg-indigo-700">Input Kedatangan</button>
                            </div>
                        </div>

                        {/* FILTERS */}
                        <div className="mb-6 flex flex-wrap gap-3 bg-white p-4 rounded-2xl border shadow-sm">
                            <div className="w-48">
                                <select className="w-full bg-slate-50 border text-[10px] font-bold uppercase px-4 py-3 rounded-xl outline-none" value={filterBrand} onChange={e => setFilterBrand(e.target.value)}>
                                    <option value="">Semua Brand</option>
                                    {BRAND_LIST.map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                            </div>
                            <div className="flex-1 relative">
                                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="search" size={14}/></div>
                                <input placeholder="CARI ARTIKEL..." className="w-full bg-slate-50 border text-[10px] font-bold uppercase pl-10 pr-4 py-3 rounded-xl outline-none" value={filterArtikel} onChange={e => setFilterArtikel(e.target.value)} />
                            </div>
                        </div>

                        {/* TABLE */}
                        <div className="bg-white rounded-2xl shadow-xl border overflow-hidden">
                            <div className="overflow-x-auto max-h-[70vh] custom-scrollbar">
                                <table className="w-full text-[10px] border-collapse">
                                    <thead className="sticky top-0 z-30 bg-slate-800 text-white">
                                        <tr>
                                            <th rowSpan="3" className="border border-slate-700 p-3 bg-slate-900">AKSI</th>
                                            <th rowSpan="3" className="border border-slate-700 p-3 sticky-po bg-slate-900">NO. PO</th>
                                            <th rowSpan="3" className="border border-slate-700 p-3 bg-slate-900">BRAND</th>
                                            <th rowSpan="3" className="border border-slate-700 p-3 bg-slate-900">ARTIKEL</th>
                                            <th rowSpan="3" className="border border-slate-700 p-3 bg-slate-900">COLOR</th>
                                            <th rowSpan="3" className="border border-slate-700 p-3 bg-slate-900">SIZE</th>
                                            <th rowSpan="3" className="border border-slate-700 p-3 bg-slate-900">QTY PO</th>
                                            {view === 'dashboard' ? (
                                                <th colSpan={daysInMonth.length * 2} className="border border-slate-700 p-2 text-center uppercase tracking-widest bg-slate-800 italic">Data Monitoring Kedatangan</th>
                                            ) : (
                                                <>
                                                    <th rowSpan="3" className="border border-slate-700 p-3 bg-indigo-900">ONLINE</th>
                                                    <th rowSpan="3" className="border border-slate-700 p-3 bg-amber-900">OFFLINE</th>
                                                    <th rowSpan="3" className="border border-slate-700 p-3 bg-emerald-800 font-black">TOTAL</th>
                                                    <th rowSpan="3" className="border border-slate-700 p-3 bg-rose-900">SISA</th>
                                                </>
                                            )}
                                        </tr>
                                        {view === 'dashboard' && (
                                            <>
                                                <tr className="bg-slate-700 text-slate-100">
                                                    {daysInMonth.map(date => <th key={date.toISOString()} colSpan="2" className="border border-slate-600 p-1">{date.getDate()}</th>)}
                                                </tr>
                                                <tr className="bg-slate-600 text-[8px]">
                                                    {daysInMonth.map(date => (
                                                        <React.Fragment key={`h-${date.toISOString()}`}>
                                                            <th className="border border-slate-500 p-1 text-blue-200">ON</th>
                                                            <th className="border border-slate-500 p-1 text-amber-200">OFF</th>
                                                        </React.Fragment>
                                                    ))}
                                                </tr>
                                            </>
                                        )}
                                    </thead>
                                    <tbody className="bg-white">
                                        {filteredArticles.length === 0 ? (
                                            <tr><td colSpan="100" className="p-20 text-center font-black uppercase text-slate-300 tracking-[0.3em]">Data Tidak Ditemukan</td></tr>
                                        ) : filteredArticles.map(art => {
                                            let onlineTotal = 0, offlineTotal = 0;
                                            if (art.arrivals) {
                                                Object.values(art.arrivals).forEach(d => {
                                                    onlineTotal += (Number(d.online) || 0);
                                                    offlineTotal += (Number(d.offline) || 0);
                                                });
                                            }
                                            const total = onlineTotal + offlineTotal;
                                            
                                            return (
                                                <tr key={art.id} className="table-row-hover transition-colors border-b">
                                                    <td className="p-2 text-center bg-slate-50/50">
                                                        <div className="flex justify-center gap-1">
                                                            <button onClick={() => { setEditData(art); setIsEditModalOpen(true); }} className="p-2 text-blue-600 hover:bg-blue-100 rounded-lg transition-all"><Icon name="edit-3" size={14}/></button>
                                                            <button onClick={() => handleDeleteArticle(art.id)} className="p-2 text-red-600 hover:bg-red-100 rounded-lg transition-all"><Icon name="trash-2" size={14}/></button>
                                                        </div>
                                                    </td>
                                                    <td className="p-3 font-bold sticky-po shadow-sm z-10">{art.noPo}</td>
                                                    <td className="p-3 uppercase font-medium text-slate-500">{art.brand}</td>
                                                    <td className="p-3 uppercase font-bold text-slate-800">{art.artikel}</td>
                                                    <td className="p-3 text-center uppercase font-bold text-slate-400">{art.color}</td>
                                                    <td className="p-3 text-center font-black bg-slate-50/30">{art.size}</td>
                                                    <td className="p-3 text-center font-black bg-slate-100/50">{art.qtyPo}</td>
                                                    {view === 'dashboard' ? (
                                                        daysInMonth.map(date => {
                                                            const key = toLocalDateString(date);
                                                            const d = art.arrivals?.[key] || { online: 0, offline: 0 };
                                                            return (
                                                                <React.Fragment key={`${art.id}-${key}`}>
                                                                    <td className={`border-x p-1 text-center font-bold text-indigo-600 ${d.online > 0 ? 'bg-indigo-50' : ''}`}>{d.online || ''}</td>
                                                                    <td className={`border-x p-1 text-center font-bold text-amber-600 ${d.offline > 0 ? 'bg-amber-50' : ''}`}>{d.offline || ''}</td>
                                                                </React.Fragment>
                                                            );
                                                        })
                                                    ) : (
                                                        <>
                                                            <td className="p-3 text-center text-indigo-700 bg-indigo-50 font-bold">{onlineTotal}</td>
                                                            <td className="p-3 text-center text-amber-700 bg-amber-50 font-bold">{offlineTotal}</td>
                                                            <td className="p-3 text-center bg-emerald-50 text-emerald-700 font-black">{total}</td>
                                                            <td className={`p-3 text-center font-black ${art.qtyPo - total > 0 ? 'text-rose-600 bg-rose-50' : 'text-emerald-600 bg-emerald-100'}`}>{art.qtyPo - total}</td>
                                                        </>
                                                    )}
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* MODAL MASTER */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-lg overflow-hidden animate-fade-in shadow-2xl">
                                <div className="bg-indigo-600 p-8 text-white flex justify-between items-center">
                                    <h3 className="font-black uppercase text-lg leading-none">Artikel Master Baru</h3>
                                    <button onClick={() => setIsModalOpen(false)} className="bg-white/10 p-2 rounded-full"><Icon name="x"/></button>
                                </div>
                                <div className="p-8 space-y-5">
                                    <input placeholder="NO PO" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold uppercase outline-none focus:border-indigo-600" value={formArticle.noPo} onChange={e => setFormArticle({...formArticle, noPo: e.target.value})} />
                                    <select className="w-full p-4 bg-slate-50 border rounded-2xl font-bold uppercase outline-none focus:border-indigo-600" value={formArticle.brand} onChange={e => setFormArticle({...formArticle, brand: e.target.value})}>
                                        <option value="">PILIH BRAND</option>
                                        {BRAND_LIST.map(b => <option key={b} value={b}>{b}</option>)}
                                    </select>
                                    <input placeholder="ARTIKEL" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold uppercase outline-none focus:border-indigo-600" value={formArticle.artikel} onChange={e => setFormArticle({...formArticle, artikel: e.target.value})} />
                                    <input type="number" placeholder="QTY PO" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-indigo-600" value={formArticle.qtyPo || ''} onChange={e => setFormArticle({...formArticle, qtyPo: Number(e.target.value)})} />
                                    <button onClick={handleSaveArticle} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black uppercase text-[11px] tracking-widest shadow-xl shadow-indigo-200">Simpan ke Cloud</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL ARRIVAL */}
                    {isArrivalModalOpen && (
                        <div className="fixed inset-0 bg-indigo-900/60 backdrop-blur-md flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-xl overflow-hidden animate-fade-in shadow-2xl">
                                <div className="p-8 border-b bg-indigo-50 flex justify-between items-center text-indigo-700">
                                    <h3 className="font-black uppercase text-sm tracking-widest">Input Kedatangan Produk</h3>
                                    <button onClick={() => setIsArrivalModalOpen(false)}><Icon name="x" size={20}/></button>
                                </div>
                                <div className="p-8 space-y-6">
                                    <select className="w-full p-4 bg-indigo-50 border-2 border-indigo-100 rounded-2xl font-black text-xs outline-none" value={formArrival.targetPoId} onChange={e => setFormArrival({...formArrival, targetPoId: e.target.value})}>
                                        <option value="">-- PILIH ARTIKEL MASTER --</option>
                                        {articles.filter(a => a.color === '-').map(a => <option key={a.id} value={a.id}>{a.noPo} | {a.artikel}</option>)}
                                    </select>
                                    <div className="grid grid-cols-2 gap-4">
                                        <SearchableDropdown label="Warna" options={COLOR_LIST} value={formArrival.color} onChange={v => setFormArrival({...formArrival, color: v})} placeholder="CARI WARNA..."/>
                                        <SearchableDropdown label="Size" options={SIZE_LIST} value={formArrival.size} onChange={v => setFormArrival({...formArrival, size: v})} placeholder="CARI SIZE..."/>
                                    </div>
                                    <input type="date" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-xs" value={formArrival.date} onChange={e => setFormArrival({...formArrival, date: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-indigo-50 p-6 rounded-2xl border-2 border-indigo-100">
                                            <label className="text-[9px] font-black uppercase text-indigo-400 mb-2 block text-center">Online</label>
                                            <input type="number" className="w-full bg-transparent text-center font-black text-2xl text-indigo-700 outline-none" placeholder="0" value={formArrival.online || ''} onChange={e => setFormArrival({...formArrival, online: e.target.value})} />
                                        </div>
                                        <div className="bg-amber-50 p-6 rounded-2xl border-2 border-amber-100">
                                            <label className="text-[9px] font-black uppercase text-amber-400 mb-2 block text-center">Offline</label>
                                            <input type="number" className="w-full bg-transparent text-center font-black text-2xl text-amber-700 outline-none" placeholder="0" value={formArrival.offline || ''} onChange={e => setFormArrival({...formArrival, offline: e.target.value})} />
                                        </div>
                                    </div>
                                    <button onClick={handleUpdateArrival} className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black uppercase text-[11px] tracking-widest shadow-2xl">Simpan Data</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL EDIT */}
                    {isEditModalOpen && editData && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-lg overflow-hidden shadow-2xl">
                                <div className="bg-blue-600 p-8 text-white flex justify-between items-center">
                                    <h3 className="font-black uppercase tracking-widest">Update Data Artikel</h3>
                                    <button onClick={() => setIsEditModalOpen(false)}><Icon name="x"/></button>
                                </div>
                                <div className="p-8 space-y-4">
                                    <input className="w-full p-4 border bg-slate-50 rounded-2xl font-bold uppercase" value={editData.noPo} onChange={e => setEditData({...editData, noPo: e.target.value})} />
                                    <input className="w-full p-4 border bg-slate-50 rounded-2xl font-bold uppercase" value={editData.artikel} onChange={e => setEditData({...editData, artikel: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input className="w-full p-4 border bg-slate-50 rounded-2xl font-bold uppercase" value={editData.color} onChange={e => setEditData({...editData, color: e.target.value})} />
                                        <input className="w-full p-4 border bg-slate-50 rounded-2xl font-bold uppercase" value={editData.size} onChange={e => setEditData({...editData, size: e.target.value})} />
                                    </div>
                                    <input type="number" className="w-full p-4 border bg-slate-50 rounded-2xl font-bold" value={editData.qtyPo} onChange={e => setEditData({...editData, qtyPo: Number(e.target.value)})} />
                                    <button onClick={handleUpdateArticle} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black uppercase text-[11px] shadow-lg">Simpan Perubahan</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
