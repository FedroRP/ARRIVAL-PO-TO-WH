<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Tracker 2026</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom scrollbar for better UX */
        .overflow-x-auto::-webkit-scrollbar {
            height: 8px;
        }
        .overflow-x-auto::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .overflow-x-auto::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .overflow-x-auto::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Sticky Column Configuration (Freeze) */
        /* Urutan & Lebar: Aksi(80px) -> Brand(120px) -> Artikel(160px) -> Color(140px) -> Size(60px) -> QtyPO(80px) -> Total(100px) */
        .sticky-col-1 { left: 0px; z-index: 25; }    /* Aksi */
        .sticky-col-2 { left: 80px; z-index: 25; }   /* Brand */
        .sticky-col-3 { left: 200px; z-index: 25; }  /* Artikel */
        .sticky-col-4 { left: 360px; z-index: 25; }  /* Color */
        .sticky-col-5 { left: 500px; z-index: 25; }  /* Size */
        .sticky-col-6 { left: 560px; z-index: 25; }  /* Qty PO */
        .sticky-col-7 { left: 640px; z-index: 25; }  /* Total Datang */

        /* Ensuring header has higher z-index than body sticky columns */
        thead th.sticky { z-index: 40 !important; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-modal {
            animation: fadeIn 0.2s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Custom Icon Component to wrap Lucide
        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);

            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [articles, setArticles] = useState([
                {
                    id: '1',
                    brand: 'NIKE',
                    artikel: 'AIR MAX 90',
                    color: 'BLACK/RED',
                    size: '42',
                    qtyPo: 500,
                    arrivals: { 
                        '2026-01-01': { online: 50, offline: 50 },
                        '2026-01-02': { online: 20, offline: 30 }
                    }
                },
                {
                    id: '2',
                    brand: 'ADIDAS',
                    artikel: 'ULTRA BOOST',
                    color: 'TRIPLE WHITE',
                    size: '41',
                    qtyPo: 300,
                    arrivals: { 
                        '2026-01-01': { online: 10, offline: 0 }
                    }
                }
            ]);

            const [currentDate, setCurrentDate] = useState(new Date(2026, 0, 1)); 
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({ brand: '', artikel: '', color: '', size: '', qtyPo: 0 });

            const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
            const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));

            const monthLabel = currentDate.toLocaleString('id-ID', { month: 'long' }).toUpperCase();
            const yearLabel = currentDate.getFullYear();

            const daysInMonth = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const date = new Date(year, month, 1);
                const days = [];
                while (date.getMonth() === month) {
                    days.push(new Date(date));
                    date.setDate(date.getDate() + 1);
                }
                return days;
            }, [currentDate]);

            const handleArrivalChange = (articleId, dateKey, type, value) => {
                const qty = parseInt(value) || 0;
                setArticles(prev => prev.map(art => {
                    if (art.id === articleId) {
                        const currentArrival = art.arrivals[dateKey] || { online: 0, offline: 0 };
                        return {
                            ...art,
                            arrivals: { 
                                ...art.arrivals, 
                                [dateKey]: { ...currentArrival, [type]: qty } 
                            }
                        };
                    }
                    return art;
                }));
            };

            const calculateTotalArrival = (arrivals) => {
                return Object.values(arrivals).reduce((total, dailyData) => {
                    return total + (dailyData.online || 0) + (dailyData.offline || 0);
                }, 0);
            };

            const openAddModal = () => {
                setEditingId(null);
                setFormData({ brand: '', artikel: '', color: '', size: '', qtyPo: 0 });
                setIsModalOpen(true);
            };

            const openEditModal = (article) => {
                setEditingId(article.id);
                setFormData({ 
                    brand: article.brand, 
                    artikel: article.artikel, 
                    color: article.color, 
                    size: article.size, 
                    qtyPo: article.qtyPo 
                });
                setIsModalOpen(true);
            };

            // Perbaikan Fungsi Hapus
            const handleDeleteArticle = (id) => {
                // Konfirmasi sederhana sebelum menghapus
                const isConfirmed = window.confirm('Apakah Anda yakin ingin menghapus artikel ini? Semua data kedatangan akan ikut terhapus.');
                if (isConfirmed) {
                    setArticles(prev => prev.filter(art => art.id !== id));
                }
            };

            const handleSaveArticle = () => {
                if (!formData.brand || !formData.artikel) return;

                if (editingId) {
                    setArticles(prev => prev.map(art => 
                        art.id === editingId ? { ...art, ...formData } : art
                    ));
                } else {
                    setArticles(prev => [...prev, { 
                        ...formData, 
                        id: Date.now().toString(), 
                        arrivals: {} 
                    }]);
                }
                setIsModalOpen(false);
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-6 font-sans">
                    <div className="max-w-[98vw] mx-auto">
                        
                        {/* Header Section */}
                        <div className="mb-8 flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-indigo-600 p-3 rounded-2xl shadow-lg shadow-indigo-200 text-white">
                                    <Icon name="layout-dashboard" size={28} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black tracking-tight text-slate-800 uppercase leading-none">Inventory Tracker 2026</h1>
                                    <p className="text-slate-500 text-sm font-medium italic mt-1">Sistem Rekapitulasi Kedatangan Artikel</p>
                                </div>
                            </div>
                            
                            <div className="flex flex-wrap items-center gap-4">
                                <div className="flex items-center bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                    <button onClick={prevMonth} className="p-2.5 hover:bg-slate-50 transition-colors border-r border-slate-200 text-slate-600">
                                        <Icon name="chevron-left" />
                                    </button>
                                    <div className="px-6 py-2 flex items-center gap-3 bg-white">
                                        <Icon name="calendar" className="text-indigo-600" />
                                        <span className="font-bold text-slate-700 min-w-[160px] text-center uppercase tracking-wider">{monthLabel} {yearLabel}</span>
                                    </div>
                                    <button onClick={nextMonth} className="p-2.5 hover:bg-slate-50 transition-colors border-l border-slate-200 text-slate-600">
                                        <Icon name="chevron-right" />
                                    </button>
                                </div>
                                
                                <button 
                                    onClick={openAddModal}
                                    className="flex items-center gap-2 bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 uppercase text-sm"
                                >
                                    <Icon name="plus" size={18} /> Tambah Artikel
                                </button>
                            </div>
                        </div>

                        {/* Main Table */}
                        <div className="bg-white rounded-2xl shadow-2xl shadow-slate-200/60 border border-slate-200 overflow-hidden">
                            <div className="overflow-x-auto max-h-[75vh]">
                                <table className="w-full border-collapse text-[11px] table-fixed">
                                    <thead className="sticky top-0 z-40 shadow-sm">
                                        <tr className="bg-slate-800 text-white">
                                            {/* Header Frozen Columns */}
                                            <th rowSpan="3" className="w-[80px] border border-slate-700 p-4 text-center uppercase font-bold sticky sticky-col-1 bg-slate-800">Aksi</th>
                                            <th rowSpan="3" className="w-[120px] border border-slate-700 p-4 text-center uppercase font-bold sticky sticky-col-2 bg-slate-800">Brand</th>
                                            <th rowSpan="3" className="w-[160px] border border-slate-700 p-4 text-center uppercase font-bold sticky sticky-col-3 bg-slate-800">Artikel</th>
                                            <th rowSpan="3" className="w-[140px] border border-slate-700 p-3 text-center uppercase font-bold sticky sticky-col-4 bg-slate-800">Color</th>
                                            <th rowSpan="3" className="w-[60px] border border-slate-700 p-3 text-center uppercase font-bold sticky sticky-col-5 bg-slate-800">Size</th>
                                            <th rowSpan="3" className="w-[80px] border border-slate-700 p-3 text-center uppercase font-bold sticky sticky-col-6 bg-slate-800">Qty PO</th>
                                            <th rowSpan="3" className="w-[100px] border border-slate-700 p-3 text-center uppercase font-bold sticky sticky-col-7 bg-emerald-700 ring-1 ring-emerald-500">Total Datang</th>
                                            
                                            {/* Header Scrollable Days */}
                                            <th colSpan={daysInMonth.length * 2} className="border border-slate-700 p-2 text-center font-black bg-slate-900 tracking-[0.2em] italic text-xs">
                                                {monthLabel} {yearLabel}
                                            </th>
                                        </tr>
                                        <tr className="bg-slate-50 text-slate-700 font-black">
                                            {daysInMonth.map(date => (
                                                <th key={date.toISOString()} colSpan="2" className="border border-slate-200 p-2 text-center text-sm min-w-[110px]">
                                                    {date.getDate()}
                                                </th>
                                            ))}
                                        </tr>
                                        <tr className="bg-slate-100 uppercase">
                                            {daysInMonth.map(date => (
                                                <React.Fragment key={`sub-${date.toISOString()}`}>
                                                    <th className="border border-slate-200 p-1.5 text-center font-bold text-indigo-700 bg-indigo-50/50 min-w-[55px]">ON</th>
                                                    <th className="border border-slate-200 p-1.5 text-center font-bold text-amber-700 bg-amber-50/50 min-w-[55px]">OFF</th>
                                                </React.Fragment>
                                            ))}
                                        </tr>
                                    </thead>
                                    
                                    <tbody className="divide-y divide-slate-100">
                                        {articles.map((art, idx) => {
                                            const totalArrival = calculateTotalArrival(art.arrivals);
                                            const isCompleted = totalArrival >= art.qtyPo;
                                            const rowBg = idx % 2 === 0 ? 'bg-white' : 'bg-slate-50/40';
                                            
                                            return (
                                                <tr key={art.id} className={`${rowBg} hover:bg-indigo-50/40 transition-colors group`}>
                                                    {/* Frozen Action & Data Columns */}
                                                    <td className={`border border-slate-200 p-2 sticky sticky-col-1 ${rowBg} group-hover:bg-indigo-50 transition-colors text-center`}>
                                                        <div className="flex items-center justify-center gap-1">
                                                            <button 
                                                                onClick={() => openEditModal(art)}
                                                                className="p-1.5 bg-indigo-100 text-indigo-600 rounded-lg hover:bg-indigo-600 hover:text-white transition-all shadow-sm"
                                                                title="Edit"
                                                            >
                                                                <Icon name="pencil" size={14} />
                                                            </button>
                                                            <button 
                                                                onClick={() => handleDeleteArticle(art.id)}
                                                                className="p-1.5 bg-rose-100 text-rose-600 rounded-lg hover:bg-rose-600 hover:text-white transition-all shadow-sm"
                                                                title="Hapus"
                                                            >
                                                                <Icon name="trash-2" size={14} />
                                                            </button>
                                                        </div>
                                                    </td>
                                                    <td className={`border border-slate-200 p-3 font-bold uppercase sticky sticky-col-2 ${rowBg} group-hover:bg-indigo-50 transition-colors truncate`}>
                                                        {art.brand}
                                                    </td>
                                                    <td className={`border border-slate-200 p-3 font-semibold text-slate-700 sticky sticky-col-3 ${rowBg} group-hover:bg-indigo-50 transition-colors truncate`}>
                                                        {art.artikel}
                                                    </td>
                                                    <td className={`border border-slate-200 p-3 text-slate-500 font-medium sticky sticky-col-4 ${rowBg} group-hover:bg-indigo-50 transition-colors truncate`}>
                                                        {art.color}
                                                    </td>
                                                    <td className={`border border-slate-200 p-3 text-center font-mono font-bold text-slate-700 sticky sticky-col-5 ${rowBg} group-hover:bg-indigo-50 transition-colors`}>
                                                        {art.size}
                                                    </td>
                                                    <td className={`border border-slate-200 p-3 text-center font-bold text-slate-800 sticky sticky-col-6 ${rowBg} group-hover:bg-indigo-50 transition-colors`}>
                                                        {art.qtyPo.toLocaleString()}
                                                    </td>
                                                    <td className={`border border-slate-200 p-3 text-center font-black text-[13px] sticky sticky-col-7 ${isCompleted ? 'text-emerald-700 bg-emerald-50' : 'text-indigo-800 bg-indigo-50'} group-hover:bg-indigo-100 transition-colors border-r-2 border-r-slate-300`}>
                                                        {totalArrival.toLocaleString()}
                                                    </td>
                                                    
                                                    {/* Scrollable Input Columns */}
                                                    {daysInMonth.map(date => {
                                                        const dateKey = date.toISOString().split('T')[0];
                                                        return (
                                                            <React.Fragment key={`${art.id}-${dateKey}`}>
                                                                <td className="border border-slate-200 p-0">
                                                                    <input 
                                                                        type="number" 
                                                                        className="w-full h-11 text-center bg-transparent focus:bg-white focus:ring-inset focus:ring-2 focus:ring-indigo-500 outline-none border-none transition-all font-bold text-indigo-700 placeholder-slate-300"
                                                                        value={art.arrivals[dateKey]?.online || ''}
                                                                        onChange={(e) => handleArrivalChange(art.id, dateKey, 'online', e.target.value)}
                                                                        placeholder="-"
                                                                    />
                                                                </td>
                                                                <td className="border border-slate-200 p-0">
                                                                    <input 
                                                                        type="number" 
                                                                        className="w-full h-11 text-center bg-transparent focus:bg-white focus:ring-inset focus:ring-2 focus:ring-amber-500 outline-none border-none transition-all font-bold text-amber-700 placeholder-slate-300"
                                                                        value={art.arrivals[dateKey]?.offline || ''}
                                                                        onChange={(e) => handleArrivalChange(art.id, dateKey, 'offline', e.target.value)}
                                                                        placeholder="-"
                                                                    />
                                                                </td>
                                                            </React.Fragment>
                                                        );
                                                    })}
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Footer Legend */}
                        <div className="mt-6 flex flex-wrap items-center justify-end gap-6 text-[10px] font-black uppercase tracking-widest text-slate-400">
                            <div className="flex items-center gap-2">
                                <span className="w-3.5 h-3.5 rounded bg-indigo-500 shadow-sm shadow-indigo-200"></span> Online Channel
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="w-3.5 h-3.5 rounded bg-amber-500 shadow-sm shadow-amber-200"></span> Offline Channel
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="w-3.5 h-3.5 rounded bg-emerald-500 shadow-sm shadow-emerald-200"></span> Target Fulfilled
                            </div>
                        </div>
                    </div>

                    {/* Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden transform border border-white/20 animate-modal">
                                <div className="bg-indigo-600 p-8 text-white">
                                    <h3 className="text-2xl font-black flex items-center gap-3 italic uppercase tracking-tighter">
                                        <Icon name={editingId ? "pencil" : "package"} size={24} /> 
                                        {editingId ? "Edit Artikel" : "Tambah Artikel"}
                                    </h3>
                                    <p className="text-indigo-100 text-xs mt-1 font-medium italic">
                                        {editingId ? "Ubah detail data artikel" : "Input data detail artikel untuk po 2026"}
                                    </p>
                                </div>
                                <div className="p-8 space-y-5 text-xs font-bold text-slate-500">
                                    <div className="space-y-1.5">
                                        <label className="uppercase ml-1 tracking-wider">Nama Brand</label>
                                        <input 
                                            placeholder="NIKE / ADIDAS / PUMA"
                                            className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold uppercase transition-all" 
                                            value={formData.brand} 
                                            onChange={e => setFormData({...formData, brand: e.target.value.toUpperCase()})} 
                                        />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="uppercase ml-1 tracking-wider text-indigo-600">Nama Artikel</label>
                                        <input 
                                            placeholder="MODEL / KODE PRODUK"
                                            className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold uppercase transition-all" 
                                            value={formData.artikel} 
                                            onChange={e => setFormData({...formData, artikel: e.target.value.toUpperCase()})} 
                                        />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1.5">
                                            <label className="uppercase ml-1 tracking-wider">Warna</label>
                                            <input 
                                                placeholder="COLORWAY"
                                                className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold uppercase transition-all" 
                                                value={formData.color} 
                                                onChange={e => setFormData({...formData, color: e.target.value.toUpperCase()})} 
                                            />
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="uppercase ml-1 tracking-wider">Size</label>
                                            <input 
                                                placeholder="EU/US"
                                                className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-mono font-bold transition-all" 
                                                value={formData.size} 
                                                onChange={e => setFormData({...formData, size: e.target.value.toUpperCase()})} 
                                            />
                                        </div>
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="uppercase ml-1 tracking-wider text-emerald-600">Quantity PO</label>
                                        <input 
                                            type="number" 
                                            placeholder="Total Unit"
                                            className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 font-black transition-all" 
                                            value={formData.qtyPo || ''}
                                            onChange={e => setFormData({...formData, qtyPo: parseInt(e.target.value) || 0})} 
                                        />
                                    </div>
                                </div>
                                <div className="p-8 bg-slate-50 flex gap-4">
                                    <button onClick={() => setIsModalOpen(false)} className="flex-1 p-4 bg-white border border-slate-200 rounded-2xl font-bold text-slate-500 hover:bg-slate-100 transition-colors uppercase tracking-widest text-[10px]">Batal</button>
                                    <button onClick={handleSaveArticle} className="flex-1 p-4 bg-indigo-600 text-white rounded-2xl font-black shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all uppercase tracking-widest text-[10px]">{editingId ? "Update" : "Simpan"}</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
