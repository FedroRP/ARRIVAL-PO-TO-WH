<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Tracker 2026</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom scrollbar for better UX */
        .overflow-x-auto::-webkit-scrollbar {
            height: 8px;
        }
        .overflow-x-auto::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .overflow-x-auto::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .overflow-x-auto::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        /* Sticky Column shadows */
        .sticky-left-1 { left: 0; z-index: 20; }
        .sticky-left-2 { left: 128px; z-index: 20; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Custom Icon Component to wrap Lucide
        const Icon = ({ name, size = 18, className = "" }) => {
            const [iconSvg, setIconSvg] = useState("");

            useEffect(() => {
                // Initialize lucide icons after render
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, []);

            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [articles, setArticles] = useState([
                {
                    id: '1',
                    brand: 'NIKE',
                    artikel: 'AIR MAX 90',
                    color: 'BLACK/RED',
                    size: '42',
                    qtyPo: 500,
                    arrivals: { 
                        '2026-01-01': { online: 50, offline: 50 },
                        '2026-01-02': { online: 20, offline: 30 }
                    }
                },
                {
                    id: '2',
                    brand: 'ADIDAS',
                    artikel: 'ULTRA BOOST',
                    color: 'TRIPLE WHITE',
                    size: '41',
                    qtyPo: 300,
                    arrivals: { 
                        '2026-01-01': { online: 10, offline: 0 }
                    }
                }
            ]);

            const [currentDate, setCurrentDate] = useState(new Date(2026, 0, 1)); 
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [newArticle, setNewArticle] = useState({ brand: '', artikel: '', color: '', size: '', qtyPo: 0 });

            const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
            const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));

            const monthLabel = currentDate.toLocaleString('id-ID', { month: 'long' }).toUpperCase();
            const yearLabel = currentDate.getFullYear();

            const daysInMonth = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const date = new Date(year, month, 1);
                const days = [];
                while (date.getMonth() === month) {
                    days.push(new Date(date));
                    date.setDate(date.getDate() + 1);
                }
                return days;
            }, [currentDate]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [isModalOpen, currentDate]);

            const handleArrivalChange = (articleId, dateKey, type, value) => {
                const qty = parseInt(value) || 0;
                setArticles(prev => prev.map(art => {
                    if (art.id === articleId) {
                        const currentArrival = art.arrivals[dateKey] || { online: 0, offline: 0 };
                        return {
                            ...art,
                            arrivals: { 
                                ...art.arrivals, 
                                [dateKey]: { ...currentArrival, [type]: qty } 
                            }
                        };
                    }
                    return art;
                }));
            };

            const calculateTotalArrival = (arrivals) => {
                return Object.values(arrivals).reduce((total, dailyData) => {
                    return total + (dailyData.online || 0) + (dailyData.offline || 0);
                }, 0);
            };

            const addArticle = () => {
                if (!newArticle.brand || !newArticle.artikel) return;
                setArticles([...articles, { ...newArticle, id: Date.now().toString(), arrivals: {} }]);
                setNewArticle({ brand: '', artikel: '', color: '', size: '', qtyPo: 0 });
                setIsModalOpen(false);
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-6 font-sans text-slate-900">
                    <div className="max-w-[98vw] mx-auto">
                        
                        {/* Header Dashboard Section */}
                        <div className="mb-8 flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-indigo-600 p-3 rounded-2xl shadow-lg shadow-indigo-200 text-white">
                                    <Icon name="layout-dashboard" size={28} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black tracking-tight text-slate-800 uppercase leading-none">Inventory Tracker 2026</h1>
                                    <p className="text-slate-500 text-sm font-medium italic mt-1">Sistem Rekapitulasi Kedatangan Artikel</p>
                                </div>
                            </div>
                            
                            <div className="flex flex-wrap items-center gap-4">
                                <div className="flex items-center bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                    <button onClick={prevMonth} className="p-2.5 hover:bg-slate-50 transition-colors border-r border-slate-200 text-slate-600">
                                        <Icon name="chevron-left" />
                                    </button>
                                    <div className="px-6 py-2 flex items-center gap-3 bg-white">
                                        <Icon name="calendar" className="text-indigo-600" />
                                        <span className="font-bold text-slate-700 min-w-[160px] text-center uppercase tracking-wider">{monthLabel} {yearLabel}</span>
                                    </div>
                                    <button onClick={nextMonth} className="p-2.5 hover:bg-slate-50 transition-colors border-l border-slate-200 text-slate-600">
                                        <Icon name="chevron-right" />
                                    </button>
                                </div>
                                
                                <button 
                                    onClick={() => setIsModalOpen(true)}
                                    className="flex items-center gap-2 bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 uppercase text-sm"
                                >
                                    <Icon name="plus" size={18} /> Tambah Artikel
                                </button>
                            </div>
                        </div>

                        {/* Main Table Container */}
                        <div className="bg-white rounded-2xl shadow-2xl shadow-slate-200/60 border border-slate-200 overflow-hidden">
                            <div className="overflow-x-auto max-h-[75vh]">
                                <table className="w-full border-collapse text-[11px]">
                                    <thead className="sticky top-0 z-30 shadow-sm">
                                        <tr className="bg-slate-800 text-white">
                                            <th rowSpan="3" className="w-32 border border-slate-700 p-4 text-center uppercase font-bold sticky sticky-left-1 bg-slate-800">Brand</th>
                                            <th rowSpan="3" className="w-40 border border-slate-700 p-4 text-center uppercase font-bold sticky sticky-left-2 bg-slate-800">Artikel</th>
                                            <th rowSpan="3" className="w-32 border border-slate-700 p-3 text-center uppercase font-bold">Color</th>
                                            <th rowSpan="3" className="w-16 border border-slate-700 p-3 text-center uppercase font-bold">Size</th>
                                            <th rowSpan="3" className="w-20 border border-slate-700 p-3 text-center uppercase font-bold">Qty PO</th>
                                            <th rowSpan="3" className="w-28 border border-slate-700 p-3 text-center uppercase font-bold bg-emerald-600 ring-1 ring-emerald-500">Total Kedatangan</th>
                                            <th colSpan={daysInMonth.length * 2} className="border border-slate-700 p-2 text-center font-black bg-slate-900 tracking-[0.2em] italic text-xs">
                                                {monthLabel} {yearLabel}
                                            </th>
                                        </tr>
                                        <tr className="bg-slate-50 text-slate-700 font-black">
                                            {daysInMonth.map(date => (
                                                <th key={date.toISOString()} colSpan="2" className="border border-slate-200 p-2 text-center text-sm min-w-[110px]">
                                                    {date.getDate()}
                                                </th>
                                            ))}
                                        </tr>
                                        <tr className="bg-slate-100 uppercase">
                                            {daysInMonth.map(date => (
                                                <React.Fragment key={`sub-${date.toISOString()}`}>
                                                    <th className="border border-slate-200 p-1.5 text-center font-bold text-indigo-700 bg-indigo-50/50">ON</th>
                                                    <th className="border border-slate-200 p-1.5 text-center font-bold text-amber-700 bg-amber-50/50">OFF</th>
                                                </React.Fragment>
                                            ))}
                                        </tr>
                                    </thead>
                                    
                                    <tbody className="divide-y divide-slate-100">
                                        {articles.map((art, idx) => {
                                            const totalArrival = calculateTotalArrival(art.arrivals);
                                            const isCompleted = totalArrival >= art.qtyPo;
                                            const rowBg = idx % 2 === 0 ? 'bg-white' : 'bg-slate-50/40';
                                            
                                            return (
                                                <tr key={art.id} className={`${rowBg} hover:bg-indigo-50/40 transition-colors group`}>
                                                    <td className={`border border-slate-200 p-3 font-bold uppercase sticky sticky-left-1 ${rowBg} group-hover:bg-indigo-50/60 transition-colors`}>
                                                        {art.brand}
                                                    </td>
                                                    <td className={`border border-slate-200 p-3 font-semibold text-slate-700 sticky sticky-left-2 ${rowBg} group-hover:bg-indigo-50/60 transition-colors`}>
                                                        {art.artikel}
                                                    </td>
                                                    <td className="border border-slate-200 p-3 text-slate-500 font-medium">{art.color}</td>
                                                    <td className="border border-slate-200 p-3 text-center font-mono font-bold text-slate-700">{art.size}</td>
                                                    <td className="border border-slate-200 p-3 text-center font-bold text-slate-800">{art.qtyPo.toLocaleString()}</td>
                                                    
                                                    <td className={`border border-slate-200 p-3 text-center font-black text-[13px] ${isCompleted ? 'text-emerald-700 bg-emerald-50' : 'text-indigo-800 bg-indigo-50/50'}`}>
                                                        {totalArrival.toLocaleString()}
                                                    </td>
                                                    
                                                    {daysInMonth.map(date => {
                                                        const dateKey = date.toISOString().split('T')[0];
                                                        return (
                                                            <React.Fragment key={`${art.id}-${dateKey}`}>
                                                                <td className="border border-slate-200 p-0">
                                                                    <input 
                                                                        type="number" 
                                                                        className="w-full h-11 text-center bg-transparent focus:bg-white focus:ring-inset focus:ring-2 focus:ring-indigo-500 outline-none border-none transition-all font-bold text-indigo-700 placeholder-slate-300"
                                                                        value={art.arrivals[dateKey]?.online || ''}
                                                                        onChange={(e) => handleArrivalChange(art.id, dateKey, 'online', e.target.value)}
                                                                        placeholder="-"
                                                                    />
                                                                </td>
                                                                <td className="border border-slate-200 p-0">
                                                                    <input 
                                                                        type="number" 
                                                                        className="w-full h-11 text-center bg-transparent focus:bg-white focus:ring-inset focus:ring-2 focus:ring-amber-500 outline-none border-none transition-all font-bold text-amber-700 placeholder-slate-300"
                                                                        value={art.arrivals[dateKey]?.offline || ''}
                                                                        onChange={(e) => handleArrivalChange(art.id, dateKey, 'offline', e.target.value)}
                                                                        placeholder="-"
                                                                    />
                                                                </td>
                                                            </React.Fragment>
                                                        );
                                                    })}
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Table Legend Footer */}
                        <div className="mt-6 flex flex-wrap items-center justify-end gap-6 text-[10px] font-black uppercase tracking-widest text-slate-400">
                            <div className="flex items-center gap-2">
                                <span className="w-3.5 h-3.5 rounded bg-indigo-500 shadow-sm shadow-indigo-200"></span> Online Channel
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="w-3.5 h-3.5 rounded bg-amber-500 shadow-sm shadow-amber-200"></span> Offline Channel
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="w-3.5 h-3.5 rounded bg-emerald-500 shadow-sm shadow-emerald-200"></span> Target Fulfilled
                            </div>
                        </div>
                    </div>

                    {/* Add Article Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden transform border border-white/20 scale-100 animate-in fade-in zoom-in duration-200">
                                <div className="bg-indigo-600 p-8 text-white">
                                    <h3 className="text-2xl font-black flex items-center gap-3 italic uppercase tracking-tighter">
                                        <Icon name="package" size={24} /> Tambah Artikel
                                    </h3>
                                    <p className="text-indigo-100 text-xs mt-1 font-medium">Input data detail artikel untuk po 2026</p>
                                </div>
                                
                                <div className="p-8 space-y-5 text-xs font-bold text-slate-500">
                                    <div className="space-y-1.5">
                                        <label className="uppercase ml-1 tracking-wider">Nama Brand</label>
                                        <input 
                                            placeholder="NIKE / ADIDAS / PUMA"
                                            className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold uppercase transition-all" 
                                            value={newArticle.brand} 
                                            onChange={e => setNewArticle({...newArticle, brand: e.target.value.toUpperCase()})} 
                                        />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="uppercase ml-1 tracking-wider text-indigo-600">Nama Artikel</label>
                                        <input 
                                            placeholder="MODEL / KODE PRODUK"
                                            className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold uppercase transition-all" 
                                            value={newArticle.artikel} 
                                            onChange={e => setNewArticle({...newArticle, artikel: e.target.value.toUpperCase()})} 
                                        />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1.5">
                                            <label className="uppercase ml-1 tracking-wider">Warna</label>
                                            <input 
                                                placeholder="COLORWAY"
                                                className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold uppercase transition-all" 
                                                value={newArticle.color} 
                                                onChange={e => setNewArticle({...newArticle, color: e.target.value.toUpperCase()})} 
                                            />
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="uppercase ml-1 tracking-wider">Size</label>
                                            <input 
                                                placeholder="EU/US"
                                                className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-mono font-bold transition-all" 
                                                value={newArticle.size} 
                                                onChange={e => setNewArticle({...newArticle, size: e.target.value.toUpperCase()})} 
                                            />
                                        </div>
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="uppercase ml-1 tracking-wider text-emerald-600">Quantity PO</label>
                                        <input 
                                            type="number" 
                                            placeholder="Total Unit"
                                            className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 font-black transition-all" 
                                            onChange={e => setNewArticle({...newArticle, qtyPo: parseInt(e.target.value) || 0})} 
                                        />
                                    </div>
                                </div>
                                
                                <div className="p-8 bg-slate-50 flex gap-4">
                                    <button 
                                        onClick={() => setIsModalOpen(false)} 
                                        className="flex-1 p-4 bg-white border border-slate-200 rounded-2xl font-bold text-slate-500 hover:bg-slate-100 transition-colors uppercase tracking-widest text-[10px]"
                                    >
                                        Batal
                                    </button>
                                    <button 
                                        onClick={addArticle} 
                                        className="flex-1 p-4 bg-indigo-600 text-white rounded-2xl font-black shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all uppercase tracking-widest text-[10px]"
                                    >
                                        Simpan
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
