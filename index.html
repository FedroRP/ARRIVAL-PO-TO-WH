<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Tracker 2026 - PT. NAD INTI DISTRIBUSI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .overflow-x-auto::-webkit-scrollbar { height: 8px; }
        .overflow-x-auto::-webkit-scrollbar-track { background: #f1f5f9; }
        .overflow-x-auto::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .overflow-x-auto::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .table-row-hover:hover td { background-color: #f8fafc !important; }
        .sticky-po { position: sticky; left: 0; background: white; z-index: 10; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // URL GOOGLE APPS SCRIPT BARU
        const SPREADSHEET_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyBanLrYC5qrAN1E6c0Gy8zMIkZfPt9RJrhb1N5-hV4-NYWR9zPeM4MdIHcHcTmpZ1M/exec"; 

        const BRAND_LIST = ["HEYMALE", "PREPSTUDIO", "ZOMA BASIC", "HEYLOCAL", "SHUWA MODEST", "BOONABOO", "ANSHARIYA", "NOSTALGY"];
        const COLOR_LIST = ["ROSETTE", "SYCAMORE", "BLACK", "COLE", "BLUSH", "CLAY", "DAISY", "FLOYD", "GARNET", "JET BLACK", "POWDER", "IVORY", "BROWN", "NAVY", "GREY", "MIDNIGHT", "WHITE", "ASH GREY", "CARAMEL", "CASHMERE", "SAGE GREEN", "SAND", "VIOLET", "BUTTERSCOTCH", "CHARCOAL", "BEIGE", "COFFEE", "LIGHT TAUPE", "CREAM", "CANYON", "COASTAL", "LINEN", "ONYX", "PEONY", "ROYAL", "SEPHIA", "GOLD", "NUDE", "VANILLA", "LATTE", "BURGUNDY", "CHOCO", "TAUPE", "CORAL", "TEAL", "SAGE", "TERRACOTA", "GREIGE", "JADE", "PORCELAIN", "ROSEAT", "TRUFFLE", "FOREST", "LEAF", "SEASALT", "SUNDIAL", "STARLIGHT", "BLUE", "DENIM", "LIGHT GREY", "SKY BLUE", "ARMY", "DARK GREY", "MOCCA", "WINE", "DARK BLUE", "KELP", "OATMEAL", "DARK OLIVE", "MUSTARD", "OXIDE", "VERDIGN", "KHAKI", "RED WINE", "DARK BROWN", "FOREST GREEN", "GREEN", "MISTY", "PURPLE", "RED", "SEAGREEN", "YELLOW", "TAN", "CYAN", "LIGHT BLUE", "OLIVE", "STONE", "HAZELNUT", "ALL COLOUR", "DARK DENIM", "DARK CHOCO"];
        const SIZE_LIST = ["L", "XL", "LX", "S", "SX", "M", "ALL SIZE", "SQUARE", "MEDIUM", "36", "37", "38", "39", "40", "41", "MINI", "WALLET", "50 ML", "80 GR", "10 GR", "28", "29", "30", "31", "32", "33", "34", "115 CM", "6", "12", "8", "4", "10"];

        const toLocalDateString = (date) => {
            const d = new Date(date);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const SearchableDropdown = ({ label, options, value, onChange, placeholder }) => {
            const [search, setSearch] = useState('');
            const [isOpen, setIsOpen] = useState(false);
            const dropdownRef = useRef(null);
            const filteredOptions = useMemo(() => options.filter(opt => opt.toUpperCase().includes(search.toUpperCase())), [options, search]);

            useEffect(() => {
                const handleClickOutside = (e) => { if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setIsOpen(false); };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            return (
                <div className="relative" ref={dropdownRef}>
                    <label className="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 block">{label}</label>
                    <div className="w-full p-4 bg-slate-50 border rounded-2xl font-bold uppercase text-xs cursor-pointer flex justify-between items-center" onClick={() => setIsOpen(!isOpen)}>
                        <span className={value ? 'text-slate-900' : 'text-slate-400'}>{value || placeholder}</span>
                        <Icon name="chevron-down" size={14} className="text-slate-400" />
                    </div>
                    {isOpen && (
                        <div className="absolute top-full left-0 right-0 mt-2 bg-white border border-slate-200 rounded-2xl shadow-2xl z-[110] overflow-hidden animate-fade-in">
                            <div className="p-3 border-b bg-slate-50 sticky top-0">
                                <div className="relative">
                                    <Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input autoFocus className="w-full pl-9 pr-4 py-2 bg-white border border-slate-200 rounded-xl text-[10px] uppercase font-bold outline-none" placeholder="CARI..." value={search} onChange={(e) => setSearch(e.target.value)} />
                                </div>
                            </div>
                            <div className="max-h-[200px] overflow-y-auto custom-scrollbar">
                                {filteredOptions.map(opt => (
                                    <div key={opt} className="px-4 py-3 hover:bg-indigo-50 cursor-pointer text-[10px] font-black uppercase border-b border-slate-50" onClick={() => { onChange(opt); setIsOpen(false); setSearch(''); }}>{opt}</div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [dbStatus, setDbStatus] = useState('idle');
            const [currentDate, setCurrentDate] = useState(new Date());
            const [articles, setArticles] = useState([]);

            // Load Data
            const fetchDataFromSheets = async () => {
                setDbStatus('loading');
                try {
                    const response = await fetch(`${SPREADSHEET_WEB_APP_URL}?action=read`);
                    const text = await response.text();
                    
                    try {
                        const result = JSON.parse(text);
                        if (Array.isArray(result)) {
                            setArticles(result);
                            localStorage.setItem('inventory_data_2026_fixed', JSON.stringify(result));
                            setDbStatus('connected');
                        } else {
                            setArticles([]);
                            setDbStatus('connected');
                        }
                    } catch (jsonErr) {
                        console.warn("Response bukan JSON valid:", text);
                        const saved = localStorage.getItem('inventory_data_2026_fixed');
                        if (saved) setArticles(JSON.parse(saved));
                        setDbStatus('error');
                    }
                } catch (err) {
                    console.error("Fetch Error:", err);
                    const saved = localStorage.getItem('inventory_data_2026_fixed');
                    if (saved) setArticles(JSON.parse(saved));
                    setDbStatus('error');
                }
            };

            useEffect(() => { fetchDataFromSheets(); }, []);

            // Sync Data
            const syncToSheets = async (latestData) => {
                if (!SPREADSHEET_WEB_APP_URL) return;
                setDbStatus('syncing');
                try {
                    const payload = encodeURIComponent(JSON.stringify(latestData));
                    // Menggunakan no-cors untuk menghindari isu pre-flight Apps Script saat proses sync
                    await fetch(`${SPREADSHEET_WEB_APP_URL}?action=sync&data=${payload}`, { 
                        method: 'GET',
                        mode: 'no-cors' 
                    });
                    
                    setDbStatus('connected');
                    setTimeout(() => setDbStatus('idle'), 2000);
                } catch (err) {
                    console.error("Sync Error:", err);
                    setDbStatus('error');
                }
            };

            const daysInMonth = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const date = new Date(year, month, 1);
                const days = [];
                while (date.getMonth() === month) {
                    days.push(new Date(date));
                    date.setDate(date.getDate() + 1);
                }
                return days;
            }, [currentDate]);

            const changeMonth = (offset) => {
                setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + offset, 1));
            };

            const calculateMetrics = (art) => {
                let online = 0, offline = 0;
                if (art.arrivals) {
                    Object.values(art.arrivals).forEach(d => {
                        online += (parseInt(d.online) || 0);
                        offline += (parseInt(d.offline) || 0);
                    });
                }
                const total = online + offline;
                const percentage = art.qtyPo > 0 ? (total / art.qtyPo) * 100 : 0;
                return { online, offline, total, percentage };
            };

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isArrivalModalOpen, setIsArrivalModalOpen] = useState(false);
            const [formArticle, setFormArticle] = useState({ noPo: '', tglPo: '', brand: '', artikel: '', qtyPo: 0 });
            const [formArrival, setFormArrival] = useState({ targetPo: '', date: toLocalDateString(new Date()), color: '', size: '', online: 0, offline: 0 });

            const handleSaveArticle = () => {
                if (!formArticle.noPo || !formArticle.brand || !formArticle.artikel) return;
                const newEntry = {
                    id: Date.now().toString(),
                    ...formArticle,
                    noPo: formArticle.noPo.toUpperCase(),
                    brand: formArticle.brand,
                    artikel: formArticle.artikel.toUpperCase(),
                    color: '-', 
                    size: '-',  
                    arrivals: {}
                };
                const updated = [...articles, newEntry];
                setArticles(updated);
                localStorage.setItem('inventory_data_2026_fixed', JSON.stringify(updated));
                syncToSheets(updated);
                setIsModalOpen(false);
                setFormArticle({ noPo: '', tglPo: '', brand: '', artikel: '', qtyPo: 0 });
            };

            const handleUpdateArrival = () => {
                if (!formArrival.targetPo || !formArrival.color || !formArrival.size) return;
                const targetId = formArrival.targetPo;
                const articleToUpdate = articles.find(a => a.id === targetId);
                const inputColor = formArrival.color.toUpperCase();
                const inputSize = formArrival.size.toUpperCase();
                const arrivalDate = formArrival.date;

                let updatedArticles = [...articles];
                const existingIndex = articles.findIndex(a => a.noPo === articleToUpdate.noPo && a.artikel === articleToUpdate.artikel && a.color === inputColor && a.size === inputSize);

                if (existingIndex !== -1) {
                    const targetArt = { ...updatedArticles[existingIndex] };
                    const updatedArrivals = { ...targetArt.arrivals };
                    const existingDayData = updatedArrivals[arrivalDate] || { online: 0, offline: 0 };
                    updatedArrivals[arrivalDate] = { 
                        online: (parseInt(existingDayData.online) || 0) + (parseInt(formArrival.online) || 0), 
                        offline: (parseInt(existingDayData.offline) || 0) + (parseInt(formArrival.offline) || 0) 
                    };
                    updatedArticles[existingIndex] = { ...targetArt, arrivals: updatedArrivals };
                } else if (articleToUpdate.color === '-' && articleToUpdate.size === '-') {
                    updatedArticles = articles.map(art => art.id === targetId ? { 
                        ...art, 
                        color: inputColor, 
                        size: inputSize, 
                        arrivals: { [arrivalDate]: { online: parseInt(formArrival.online) || 0, offline: parseInt(formArrival.offline) || 0 } } 
                    } : art);
                } else {
                    const newEntry = { 
                        ...articleToUpdate, 
                        id: Date.now().toString(), 
                        color: inputColor, 
                        size: inputSize, 
                        arrivals: { [arrivalDate]: { online: parseInt(formArrival.online) || 0, offline: parseInt(formArrival.offline) || 0 } } 
                    };
                    updatedArticles = [...articles, newEntry];
                }
                
                setArticles(updatedArticles);
                localStorage.setItem('inventory_data_2026_fixed', JSON.stringify(updatedArticles));
                syncToSheets(updatedArticles);
                setIsArrivalModalOpen(false);
                setFormArrival({ ...formArrival, color: '', size: '', online: 0, offline: 0 });
            };

            return (
                <div className="min-h-screen p-4 md:p-6 font-sans">
                    <div className="max-w-[98vw] mx-auto">
                        {/* Header */}
                        <div className="mb-8 flex flex-col lg:flex-row lg:items-center justify-between gap-6">
                            <div className="flex items-center gap-5">
                                <div className="bg-indigo-600 p-4 rounded-[2rem] shadow-xl text-white">
                                    <Icon name="cloud-lightning" size={32} />
                                </div>
                                <div>
                                    <h1 className="text-3xl font-black uppercase tracking-tighter text-slate-900 leading-none">Inventory Cloud 2026</h1>
                                    <div className="flex items-center gap-2 mt-2">
                                        <span className={`w-2 h-2 rounded-full ${
                                            dbStatus === 'connected' ? 'bg-emerald-500' : 
                                            dbStatus === 'syncing' ? 'bg-indigo-500 animate-bounce' : 
                                            dbStatus === 'loading' ? 'bg-amber-500 animate-pulse' : 
                                            dbStatus === 'error' ? 'bg-rose-500' : 'bg-slate-300'
                                        }`}></span>
                                        <p className="text-slate-500 text-[10px] font-black uppercase tracking-widest">
                                            Status: {dbStatus.toUpperCase()} 
                                        </p>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex flex-wrap items-center gap-3 bg-white p-2 rounded-[1.5rem] shadow-sm border border-slate-100">
                                <div className="flex items-center bg-slate-50 rounded-xl px-2">
                                    <button onClick={() => changeMonth(-1)} className="p-2 hover:bg-white rounded-lg transition-all text-slate-400 hover:text-indigo-600"><Icon name="chevron-left" size={16}/></button>
                                    <span className="px-4 text-[11px] font-black uppercase text-slate-700 min-w-[140px] text-center">
                                        {currentDate.toLocaleString('id-ID', { month: 'long', year: 'numeric' })}
                                    </span>
                                    <button onClick={() => changeMonth(1)} className="p-2 hover:bg-white rounded-lg transition-all text-slate-400 hover:text-indigo-600"><Icon name="chevron-right" size={16}/></button>
                                </div>

                                <div className="h-8 w-[1px] bg-slate-100"></div>

                                <button onClick={() => setView('dashboard')} className={`px-5 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${view === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`}>Kalender</button>
                                <button onClick={() => setView('recap')} className={`px-5 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${view === 'recap' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`}>Rekap</button>
                                
                                <button onClick={fetchDataFromSheets} className="p-2 bg-slate-50 rounded-xl text-slate-400 hover:text-indigo-600 transition-all border border-transparent hover:border-indigo-100">
                                    <Icon name="refresh-cw" size={18} className={dbStatus === 'loading' || dbStatus === 'syncing' ? 'animate-spin' : ''}/>
                                </button>
                            </div>

                            <div className="flex gap-3">
                                <button onClick={() => setIsModalOpen(true)} className="flex items-center gap-2 bg-white border-2 border-slate-900 text-slate-900 px-6 py-3 rounded-2xl font-black text-[10px] uppercase hover:bg-slate-900 hover:text-white transition-all shadow-md">
                                    <Icon name="file-plus" size={14} /> Master PO
                                </button>
                                <button onClick={() => setIsArrivalModalOpen(true)} className="flex items-center gap-2 bg-indigo-600 text-white px-6 py-3 rounded-2xl font-black shadow-xl text-[10px] uppercase hover:bg-indigo-700 transition-all">
                                    <Icon name="truck" size={14} /> Kedatangan
                                </button>
                            </div>
                        </div>

                        {/* Main Table */}
                        <div className="bg-white rounded-[2rem] shadow-2xl border border-slate-200 overflow-hidden animate-fade-in">
                            <div className="overflow-x-auto max-h-[72vh] custom-scrollbar">
                                <table className="w-full border-collapse text-[10px]">
                                    <thead className="sticky top-0 z-30">
                                        <tr className="bg-slate-900 text-white uppercase tracking-tighter">
                                            <th rowSpan="3" className="w-32 border border-slate-800 p-4 sticky-po bg-slate-900">Nomor PO</th>
                                            <th rowSpan="3" className="w-28 border border-slate-800 p-4 bg-slate-900">Tanggal</th>
                                            <th rowSpan="3" className="w-32 border border-slate-800 p-4 bg-slate-900">Brand</th>
                                            <th rowSpan="3" className="w-44 border border-slate-800 p-4 bg-slate-900 text-left">Nama Artikel</th>
                                            <th rowSpan="3" className="w-32 border border-slate-800 p-4 bg-slate-900">Warna</th>
                                            <th rowSpan="3" className="w-16 border border-slate-800 p-4 bg-slate-900">Size</th>
                                            <th rowSpan="3" className="w-20 border border-slate-800 p-4 bg-slate-900 text-indigo-400">Qty PO</th>
                                            {view === 'dashboard' ? (
                                                <th colSpan={daysInMonth.length * 2} className="border border-slate-800 p-2 text-center bg-slate-950">
                                                    Timeline Kedatangan - {currentDate.toLocaleString('id-ID', { month: 'long' })}
                                                </th>
                                            ) : (
                                                <>
                                                    <th rowSpan="3" className="border border-slate-800 p-4 bg-indigo-950 text-indigo-300">Online</th>
                                                    <th rowSpan="3" className="border border-slate-800 p-4 bg-amber-950 text-amber-300">Offline</th>
                                                    <th rowSpan="3" className="border border-slate-800 p-4 bg-emerald-900 text-emerald-300">Total</th>
                                                    <th rowSpan="3" className="border border-slate-800 p-4 bg-rose-950 text-rose-300">Sisa</th>
                                                    <th rowSpan="3" className="border border-slate-800 p-4 bg-slate-950">%</th>
                                                </>
                                            )}
                                        </tr>
                                        {view === 'dashboard' && (
                                            <>
                                                <tr className="bg-slate-100 text-slate-500 font-black">
                                                    {daysInMonth.map(date => <th key={date.toISOString()} colSpan="2" className="border border-slate-200 p-1 text-center">{date.getDate()}</th>)}
                                                </tr>
                                                <tr className="bg-slate-50 text-[8px] font-black">
                                                    {daysInMonth.map(date => (
                                                        <React.Fragment key={`h-${date.toISOString()}`}>
                                                            <th className="border border-slate-200 p-1 text-indigo-500 bg-indigo-50/50">ON</th>
                                                            <th className="border border-slate-200 p-1 text-amber-600 bg-amber-50/50">OFF</th>
                                                        </React.Fragment>
                                                    ))}
                                                </tr>
                                            </>
                                        )}
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {articles.length === 0 ? (
                                            <tr>
                                                <td colSpan="100" className="p-24 text-center">
                                                    <div className="flex flex-col items-center gap-3 opacity-20">
                                                        <Icon name="database" size={48} />
                                                        <p className="font-black uppercase tracking-[0.3em]">
                                                            {dbStatus === 'error' ? 'Gagal Memuat Cloud (Cek Apps Script)' : 'Belum Ada Data'}
                                                        </p>
                                                    </div>
                                                </td>
                                            </tr>
                                        ) : (
                                            articles.map((art) => {
                                                const m = calculateMetrics(art);
                                                return (
                                                    <tr key={art.id} className="table-row-hover group transition-colors">
                                                        <td className="border border-slate-100 p-4 font-black sticky-po group-hover:bg-slate-50">{art.noPo}</td>
                                                        <td className="border border-slate-100 p-4 text-center text-slate-400 font-bold">{art.tglPo || '-'}</td>
                                                        <td className="border border-slate-100 p-4 uppercase font-bold text-slate-600">{art.brand}</td>
                                                        <td className="border border-slate-100 p-4 uppercase font-black text-indigo-600">{art.artikel}</td>
                                                        <td className="border border-slate-100 p-4 text-center uppercase text-slate-400 font-bold">{art.color}</td>
                                                        <td className="border border-slate-100 p-4 text-center font-black">{art.size}</td>
                                                        <td className="border border-slate-100 p-4 text-center font-black bg-indigo-50/30 text-indigo-700">{art.qtyPo}</td>
                                                        {view === 'dashboard' ? (
                                                            daysInMonth.map(date => {
                                                                const dStr = toLocalDateString(date);
                                                                const val = (art.arrivals && art.arrivals[dStr]) || { online: 0, offline: 0 };
                                                                return (
                                                                    <React.Fragment key={`${art.id}-${dStr}`}>
                                                                        <td className="border border-slate-50 p-1 text-center font-black text-indigo-600 bg-white group-hover:bg-indigo-50/20">{val.online || ''}</td>
                                                                        <td className="border border-slate-50 p-1 text-center font-black text-amber-600 bg-white group-hover:bg-amber-50/20">{val.offline || ''}</td>
                                                                    </React.Fragment>
                                                                );
                                                            })
                                                        ) : (
                                                            <>
                                                                <td className="border border-slate-100 p-4 text-center text-indigo-700 font-bold">{m.online}</td>
                                                                <td className="border border-slate-100 p-4 text-center text-amber-700 font-bold">{m.offline}</td>
                                                                <td className="border border-slate-100 p-4 text-center bg-emerald-50 font-black text-emerald-700">{m.total}</td>
                                                                <td className="border border-slate-100 p-4 text-center font-black text-rose-600 bg-rose-50/50">{art.qtyPo - m.total}</td>
                                                                <td className="border border-slate-100 p-4 text-center font-black text-slate-400">{m.percentage.toFixed(1)}%</td>
                                                            </>
                                                        )}
                                                    </tr>
                                                );
                                            })
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* Modal Master PO */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xl flex items-center justify-center z-[100] p-4 animate-fade-in">
                            <div className="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-xl overflow-hidden">
                                <div className="bg-slate-900 p-8 text-white flex justify-between items-center">
                                    <div>
                                        <h3 className="text-2xl font-black uppercase tracking-tight">Master PO Baru</h3>
                                        <p className="text-slate-400 text-[10px] font-bold uppercase mt-1">Input data artikel utama</p>
                                    </div>
                                    <button onClick={() => setIsModalOpen(false)} className="bg-white/10 p-2 rounded-full hover:bg-white/20 transition-all"><Icon name="x" size={24} /></button>
                                </div>
                                <div className="p-8 grid grid-cols-2 gap-6">
                                    <div className="col-span-1">
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-2 mb-2 block">Nomor PO</label>
                                        <input placeholder="PO-2026-001" className="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-indigo-600 rounded-2xl font-black uppercase outline-none transition-all" value={formArticle.noPo} onChange={e => setFormArticle({...formArticle, noPo: e.target.value})} />
                                    </div>
                                    <div className="col-span-1">
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-2 mb-2 block">Tanggal PO</label>
                                        <input type="date" className="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-indigo-600 rounded-2xl font-black outline-none transition-all" value={formArticle.tglPo} onChange={e => setFormArticle({...formArticle, tglPo: e.target.value})} />
                                    </div>
                                    <div className="col-span-2">
                                        <SearchableDropdown label="Pilih Brand" options={BRAND_LIST} value={formArticle.brand} onChange={v => setFormArticle({...formArticle, brand: v})} placeholder="CARI BRAND..." />
                                    </div>
                                    <div className="col-span-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-2 mb-2 block">Nama Artikel</label>
                                        <input placeholder="MASUKKAN NAMA PRODUK" className="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-indigo-600 rounded-2xl font-black uppercase outline-none transition-all" value={formArticle.artikel} onChange={e => setFormArticle({...formArticle, artikel: e.target.value})} />
                                    </div>
                                    <div className="col-span-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-2 mb-2 block tracking-widest">Qty Target (Total)</label>
                                        <input type="number" className="w-full p-5 bg-indigo-50 border-2 border-indigo-100 focus:border-indigo-600 rounded-2xl font-black text-2xl text-indigo-700 outline-none transition-all" value={formArticle.qtyPo || ''} onChange={e => setFormArticle({...formArticle, qtyPo: parseInt(e.target.value) || 0})} />
                                    </div>
                                    <button onClick={handleSaveArticle} className="col-span-2 py-5 bg-indigo-600 text-white rounded-[1.5rem] font-black uppercase text-xs mt-4 hover:bg-indigo-700 shadow-xl shadow-indigo-200 transition-all flex items-center justify-center gap-3">
                                        <Icon name="save" size={18} /> Simpan Ke Database Cloud
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Kedatangan */}
                    {isArrivalModalOpen && (
                        <div className="fixed inset-0 bg-indigo-950/60 backdrop-blur-xl flex items-center justify-center z-[100] p-4 animate-fade-in">
                            <div className="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-md overflow-hidden">
                                <div className="p-8 border-b border-slate-50 flex justify-between items-center bg-indigo-50/50">
                                    <div>
                                        <h3 className="text-xl font-black uppercase text-indigo-900 leading-none">Input Kedatangan</h3>
                                        <p className="text-[9px] font-bold text-indigo-400 uppercase tracking-widest mt-2">Update stok harian</p>
                                    </div>
                                    <button onClick={() => setIsArrivalModalOpen(false)} className="text-slate-400 hover:text-rose-500 transition-all"><Icon name="x" size={24} /></button>
                                </div>
                                <div className="p-8 space-y-5">
                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-2 mb-2 block">Pilih Artikel PO</label>
                                        <select className="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-indigo-600 rounded-2xl font-black text-[11px] outline-none transition-all" value={formArrival.targetPo} onChange={e => setFormArrival({...formArrival, targetPo: e.target.value})}>
                                            <option value="">-- PILIH LIST ARTIKEL --</option>
                                            {articles.map(a => <option key={a.id} value={a.id}>{a.noPo} | {a.artikel}</option>)}
                                        </select>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <SearchableDropdown label="Warna" options={COLOR_LIST} value={formArrival.color} onChange={v => setFormArrival({...formArrival, color: v})} placeholder="PILIH..." />
                                        <SearchableDropdown label="Size" options={SIZE_LIST} value={formArrival.size} onChange={v => setFormArrival({...formArrival, size: v})} placeholder="PILIH..." />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-2 mb-2 block">Tanggal Kedatangan</label>
                                        <input type="date" className="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-indigo-600 rounded-2xl font-black outline-none transition-all" value={formArrival.date} onChange={e => setFormArrival({...formArrival, date: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] font-black uppercase text-indigo-400 ml-2 mb-2 block">Qty Online</label>
                                            <input type="number" placeholder="0" className="w-full p-4 bg-white border-2 border-indigo-100 focus:border-indigo-600 rounded-2xl font-black text-center text-lg text-indigo-600 transition-all" value={formArrival.online || ''} onChange={e => setFormArrival({...formArrival, online: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black uppercase text-amber-500 ml-2 mb-2 block">Qty Offline</label>
                                            <input type="number" placeholder="0" className="w-full p-4 bg-white border-2 border-amber-100 focus:border-amber-600 rounded-2xl font-black text-center text-lg text-amber-600 transition-all" value={formArrival.offline || ''} onChange={e => setFormArrival({...formArrival, offline: e.target.value})} />
                                        </div>
                                    </div>
                                    <button onClick={handleUpdateArrival} className="w-full py-5 bg-indigo-600 text-white rounded-[1.5rem] font-black uppercase text-xs mt-4 hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all">
                                        Update Kedatangan Cloud
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
